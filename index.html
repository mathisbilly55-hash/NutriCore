<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;--c1:#161616;--c2:#202020;--c3:#2a2a2a;
  --pink:#FF2D55;--green:#AAFF00;--cyan:#00D4E8;--orange:#FF9F0A;
  --blue:#0A84FF;--purple:#BF5AF2;--yellow:#FFD60A;
  --t1:#F0F0F0;--t2:rgba(240,240,240,.5);--t3:rgba(240,240,240,.2);--bd:rgba(255,255,255,.08)
}
html,body{width:100%;height:100%;margin:0;padding:0;overflow:hidden}body{background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:14px}
#app{position:fixed;top:0;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:flex;flex-direction:column;overflow:hidden;padding-top:env(safe-area-inset-top,0px)}
.wrap{display:flex;flex-direction:column;height:100%;overflow:hidden}
.sc{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:max(80px,calc(68px + env(safe-area-inset-bottom,14px)));-webkit-overflow-scrolling:touch;scrollbar-width:none;overscroll-behavior-y:contain}
.sc::-webkit-scrollbar{display:none}
/* NAV always fixed */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(5,5,5,.96);backdrop-filter:blur(24px);border-top:1px solid var(--bd);display:flex;padding:6px 0 env(safe-area-inset-bottom,10px);z-index:200}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:1px}
.ni.on .nico,.ni.on .nl{color:var(--cyan)}
.nico{width:20px;height:20px;color:rgba(255,255,255,.35)}
.nico svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nl{font-size:9px;color:rgba(255,255,255,.35);font-weight:500}
.nc{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer}
.ncc{width:42px;height:42px;border-radius:50%;background:var(--pink);display:flex;align-items:center;justify-content:center;margin-top:-11px;box-shadow:0 4px 18px rgba(255,55,95,.4)}
.ncc svg{width:19px;height:19px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round}
.nc .nl{color:var(--pink)}
/* HEADERS */
.hdr{padding:12px 14px 2px;display:flex;align-items:center;justify-content:space-between}
.ht{font-family:'Bebas Neue','Syne',sans-serif;font-size:36px;font-weight:400;letter-spacing:.04em;cursor:pointer}
.hs{font-size:12px;color:var(--t2);margin-top:1px}
.ha{display:flex;gap:6px}
.ib{width:33px;height:33px;border-radius:50%;background:var(--c1);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ib svg{width:14px;height:14px;stroke:var(--t2);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.bh{padding:11px 14px 7px;display:flex;align-items:center;position:relative;min-height:44px}
.bk{display:flex;align-items:center;color:var(--cyan);font-size:14px;font-weight:500;cursor:pointer;background:none;border:none;z-index:1;padding:4px 0}
.bk svg{width:19px;height:19px;stroke:var(--cyan);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.bht{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap}
/* DATE ROW */
.dr{display:flex;align-items:stretch;margin:2px 14px 9px;background:var(--c1);border-radius:14px;overflow:hidden}
.dn{width:46px;border:none;cursor:pointer;color:var(--cyan);font-size:22px;display:flex;align-items:center;justify-content:center;background:transparent;flex-shrink:0;-webkit-user-select:none;user-select:none}
.dn:active{background:var(--c2)}
.dn.dis{color:var(--t3)}
.dl{flex:1;text-align:center;padding:10px 4px}
.dl-main{font-size:13px;font-weight:600}
.dl-sub{font-size:11px;color:var(--t2);margin-top:2px}
/* RINGS */
.rw{display:flex;justify-content:center;padding:4px 14px 0;position:relative}
.rm{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.rb{font-family:'Bebas Neue','Syne',sans-serif;font-size:28px;font-weight:400;line-height:1;letter-spacing:.04em}
.rl{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.09em;margin-top:2px}
.rr{font-size:11px;margin-top:2px;font-weight:700}
/* MACROS */
.macs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:6px 14px 8px}
.mac{background:var(--c1);border-radius:11px;padding:9px 7px;text-align:center}
.ml{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.mv{font-family:'Bebas Neue','Syne',sans-serif;font-size:20px;font-weight:400;letter-spacing:.03em}
.mg{font-size:10px;color:var(--t3);margin-top:1px}
.mb{height:3px;background:var(--c3);border-radius:3px;overflow:hidden;margin-top:5px}
.mf{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.4,0,.2,1)}
/* BALANCE */
.bc{margin:0 14px 8px;background:var(--c1);border-radius:18px;overflow:hidden}
.bch{display:flex;align-items:center;justify-content:space-between;padding:10px 12px 7px}
.bct{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--t2)}
.bce{font-size:12px;color:var(--cyan);font-weight:500;background:none;border:none;cursor:pointer}
.bcb{padding:0 12px 9px;display:flex;flex-direction:column;gap:5px}
.bcr{display:flex;align-items:center;justify-content:space-between}
.bcl{font-size:12px;color:var(--t2)}
.bcv{font-size:12px;font-weight:600}
.bcd{height:1px;background:var(--bd);margin:2px 0}
.bn{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--c2)}
.bnl{font-size:13px;font-weight:600}
.bnv{font-family:'Bebas Neue','Syne',sans-serif;font-size:20px;font-weight:400;letter-spacing:.04em}
.bp{padding:6px 12px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:4px}
/* MEALS */
.mb2{margin:0 14px 6px;background:var(--c1);border-radius:18px;overflow:hidden}
.mh2{display:flex;align-items:center;justify-content:space-between;padding:10px 11px;cursor:pointer;-webkit-user-select:none;user-select:none}
.mh2:active{background:var(--c2)}
.md{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.mt2{font-size:13px;font-weight:600}
.ms{font-size:11px;color:var(--t2);margin-top:1px}
.mp2{width:26px;height:26px;border-radius:50%;border:none;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mis{padding:0 10px 10px;display:flex;flex-direction:column;gap:5px}
.fi{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--c2);border-radius:10px}
.fn{font-size:13px;font-weight:500}
.fsb{font-size:11px;color:var(--t2);margin-top:1px}
.fr{display:flex;align-items:center;gap:5px;flex-shrink:0}
.fk{font-size:12px;font-weight:700;color:var(--orange)}
.dx{width:19px;height:19px;border-radius:50%;background:rgba(255,59,48,.12);border:none;cursor:pointer;color:#FF3B30;font-size:13px;display:flex;align-items:center;justify-content:center}
/* OBJECTIVES */
.obj-section{margin:0 14px 8px}
.obj-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:8px}
.obj-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
.obj-card{background:var(--c1);border-radius:13px;padding:12px 11px;cursor:pointer;position:relative;overflow:hidden}
.obj-card:active{background:var(--c2)}
.obj-card-lbl{font-size:11px;color:var(--t2);margin-bottom:5px}
.obj-card-val{font-family:'Syne',sans-serif;font-size:18px;font-weight:800}
.obj-card-sub{font-size:10px;color:var(--t2);margin-top:2px}
.obj-bar{height:3px;background:var(--c3);border-radius:3px;overflow:hidden;margin-top:8px}
.obj-fill{height:100%;border-radius:3px;transition:width .6s ease}
.obj-pct{font-size:10px;font-weight:700;position:absolute;top:12px;right:11px}
/* FOOD SEARCH */
.sb{margin:5px 14px 8px;background:var(--c1);border-radius:11px;display:flex;align-items:center;padding:9px 12px;gap:7px}
.sb svg{width:15px;height:15px;stroke:var(--t2);fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0}
.sb input{background:none;border:none;color:var(--t1);font-size:14px;font-family:'DM Sans',sans-serif;flex:1;outline:none}
.sb input::placeholder{color:var(--t3)}
.cs{display:flex;gap:5px;padding:0 14px 7px;overflow-x:auto;scrollbar-width:none}
.cs::-webkit-scrollbar{display:none}
.cc{padding:5px 10px;border-radius:15px;font-size:11px;font-weight:500;white-space:nowrap;cursor:pointer;border:1px solid var(--bd);color:var(--t2);background:var(--c1);flex-shrink:0;transition:all .12s}
.cc.on{background:var(--cyan);color:#000;border-color:var(--cyan)}
.fl{padding:0 14px;display:flex;flex-direction:column;gap:5px}
.frow{display:flex;align-items:center;padding:8px 10px;background:var(--c1);border-radius:11px;cursor:pointer;gap:0}
.frow:active{background:var(--c2)}
.frl{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.fic{width:33px;height:33px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:700;text-align:center;line-height:1}
.fname{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fmeta{font-size:11px;color:var(--t2);margin-top:1px}
.fkcal{font-size:12px;font-weight:700;color:var(--t2);flex-shrink:0;margin:0 4px}
.star{width:24px;height:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:none;border:none;font-size:14px;flex-shrink:0}
/* QTY */
.qh{margin:7px 14px;background:var(--c1);border-radius:14px;padding:16px 14px;text-align:center}
.qbg{display:inline-block;padding:3px 8px;border-radius:7px;font-size:10px;font-weight:700;margin-bottom:7px;text-transform:uppercase;letter-spacing:.07em}

// ── DATE HELPERS ────────────────────────────────────────
function today(){
  const n=new Date();
  return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
}
function addDays(dateStr,n){
  const [y,m,d]=dateStr.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  dt.setDate(dt.getDate()+n);
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
}
function fmtD(d){
  const [y,m,dn]=d.split('-').map(Number);
  const td=today();
  const diff=Math.round((new Date(today().split('-')[0],today().split('-')[1]-1,today().split('-')[2])-new Date(y,m-1,dn))/864e5);
  if(diff===0)return["Aujourd'hui",""];
  if(diff===1)return["Hier",""];
  if(diff===-1)return["Demain",""];
  const dt=new Date(y,m-1,dn);
  return[dt.toLocaleDateString('fr-FR',{weekday:'long'}),dt.toLocaleDateString('fr-FR',{day:'numeric',month:'long'})];
}
function monthLabel(ym){
  const [y,m]=ym.split('-').map(Number);
  const dt=new Date(y,m-1,1);
  return dt.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
}
function daysInMonth(ym){
  const [y,m]=ym.split('-').map(Number);
  return new Date(y,m,0).getDate();
}
function firstDowOfMonth(ym){
  const [y,m]=ym.split('-').map(Number);
  return(new Date(y,m-1,1).getDay()+6)%7;
}
function calcBMR(pr){return Math.round(10*pr.w+6.25*pr.h-5*pr.age+5)}

function editQtyPreview(foodId,qty){
  const fd=FOODS.find(x=>x.id===foodId);if(!fd)return;
  const q=parseInt(qty)||0;
  const k=Math.round(fd.p.k*q/100);
  const el=document.getElementById('edit-qty-prev');
  if(el)el.textContent=k+' kcal · P:'+Math.round(fd.p.p*q/10)/10+'g G:'+Math.round(fd.p.g*q/10)/10+'g L:'+Math.round(fd.p.f*q/10)/10+'g';
}
function confirmEditFood(date,slot,idx){
  const qty=parseInt(document.getElementById('edit-qty-in')?.value)||0;
  const it=getDay(date)[slot][idx];
  const fd=FOODS.find(x=>x.id===it.foodId);
  if(qty>0)it.qty=qty;
  if(fd&&fd.cheatMeal){
    const note=document.getElementById('edit-cheat-note')?.value?.trim();
    const ens=document.getElementById('edit-cheat-enseigne')?.value?.trim();
    const cost=parseFloat(document.getElementById('edit-cheat-cost')?.value)||0;
    if(note)it.note=note; else delete it.note;
    if(ens)it.enseigne=ens; else delete it.enseigne;
    if(cost>0)it.cost=cost; else delete it.cost;
  }
  saveS();closeM("editmodal");render();
}

// ── Core merge: combine logs from two devices without losing data ──
function _mergeDay(local, remote){
  if(!local)return remote;
  if(!remote)return local;
  const slots=['breakfast','lunch','dinner','snacks','drinks'];
  const merged=Object.assign({},local);
  slots.forEach(function(s){
    const lItems=local[s]||[];
    const rItems=remote[s]||[];
    if(lItems.length===0&&rItems.length>0){merged[s]=rItems;return;}
    if(rItems.length===0){return;}
    // Both have items: append remote items that don't exist locally
    const lIds=lItems.map(function(x){return x.foodId+':'+x.qty;});
    const toAdd=rItems.filter(function(ri){return !lIds.includes(ri.foodId+':'+ri.qty);});
    merged[s]=lItems.concat(toAdd);
  });
  // Take whichever has more sessions/steps/sleep
  if((remote.sessions||[]).length>(local.sessions||[]).length)merged.sessions=remote.sessions;
  if((remote.steps||0)>(local.steps||0))merged.steps=remote.steps;
  if((remote.sleep||0)>(local.sleep||0))merged.sleep=remote.sleep;
  // Keep most recent _savedAt
  merged._savedAt=Math.max(local._savedAt||0, remote._savedAt||0)||undefined;
  return merged;
}
function _mergeLogs(localLog, remoteLog){
  const result=Object.assign({},localLog);
  Object.keys(remoteLog||{}).forEach(function(day){
    result[day]=_mergeDay(result[day], remoteLog[day]);
  });
  return result;
}
async function syncToSupabase(){
  if(!S.user?.id)return false;
  return new Promise(function(resolve){
    initSB(async function(client){
      if(!client){resolve(false);return;}
      try{
        // 1. Lire Supabase
        const{data:row}=await client.from('nutricore_data')
          .select('data').eq('user_id',S.user.id).single()
          .catch(function(){return{data:null};});
        // 2. Merger (combiner sans perdre)
        if(row&&row.data){
          try{
            const rd=JSON.parse(row.data);
            if(rd.log)S.log=_mergeLogs(S.log,rd.log);
          }catch(e){}
        }
        // 3. Pousser le résultat fusionné
        const{error}=await client.from('nutricore_data').upsert({
          user_id:S.user.id,
          data:JSON.stringify({log:S.log,cm:S.cm,goals:S.goals,profile:S.profile,
            fav:S.fav,objectives:S.objectives,autoMeals:S.autoMeals,dietMode:S.dietMode}),
          updated_at:new Date().toISOString()
        },{onConflict:'user_id'});
        if(error){console.error('[AutoSync]',error.message);resolve(false);}
        else{
          // 4. Sauver localement
          localStorage.setItem('nc_v6',JSON.stringify({log:S.log,cm:S.cm,goals:S.goals,
            profile:S.profile,fav:S.fav,objectives:S.objectives,autoMeals:S.autoMeals,
            user:S.user,dietMode:S.dietMode}));
          resolve(true);
        }
      }catch(e){console.error('[AutoSync]',e.message);resolve(false);}
    });
  });
}
async function loadFromSupabase(){
  if(!sbClient||!S.user?.id)return false;
  try{
    const{data,error}=await sbClient.from('nutricore_data').select('data').eq('user_id',S.user.id).single();
    if(error||!data)return false;
    const d=JSON.parse(data.data);
    if(d.log)S.log=_mergeLogs(S.log,d.log);
    if(d.cm&&d.cm.length)S.cm=d.cm;
    if(d.goals)S.goals=d.goals;
    if(d.profile)S.profile=d.profile;
    if(d.fav)S.fav=d.fav;
    if(d.objectives)S.objectives=d.objectives;
    if(d.autoMeals)S.autoMeals=d.autoMeals;
    if(d.dietMode)S.dietMode=d.dietMode;
    localStorage.setItem('nc_v6',JSON.stringify({log:S.log,cm:S.cm,goals:S.goals,profile:S.profile,fav:S.fav,objectives:S.objectives,autoMeals:S.autoMeals,user:S.user,dietMode:S.dietMode}));

}

function calcM(items){
  let k=0,p=0,g=0,f=0;
  (items||[]).forEach(it=>{const fd=FOODS.find(x=>x.id===it.foodId);if(!fd)return;const m=it.qty/100;k+=fd.p.k*m;p+=fd.p.p*m;g+=fd.p.g*m;f+=fd.p.f*m;});
  return{k:Math.round(k),p:Math.round(p*10)/10,g:Math.round(g*10)/10,f:Math.round(f*10)/10};
}

  const l=getDay(d);

}

function p01(v,g){return g>0?Math.min(1,v/g):0}
function getSportSteps(date){
  // Returns steps already covered via sport sessions
  // to subtract from manual steps to avoid double-counting kcal
  const sess=getDay(date).sessions||[];
  let total=0;
  sess.forEach(s=>{
    if(s.type==='cardio'&&s.distance>0){
      total+=Math.round(s.distance*1350);
    } else if(s.type==='stair'&&s.steps>0){
      total+=s.steps;
    } else if(s.type==='strength'&&s.hasCardio&&s.cardioKm>0){
      // Cardio portion of strength session also generates steps
      total+=Math.round(s.cardioKm*1350);
    }
  });
  return total;
}

  // Steps to display and use for kcal calc (excluding sport steps already counted)
  const raw=getDay(date).steps||0;
  const sportSt=getSportSteps(date);

}

// Success % logic: within ±10% = 100%, proportional otherwise
function successPct(val,goal){
  if(goal<=0)return 100;
  const ratio=val/goal;
  if(ratio>=0.9&&ratio<=1.1)return 100;
  if(ratio<0.9)return Math.round(ratio*100/0.9);
  // Over by more than 10%
  return Math.max(0,Math.round(200-ratio*100));
}
function calRingColor(val,goal){
  const r=val/(goal||1);
  if(r>=0.8&&r<=1.1) return'#1E8B1E';  // vert forêt
  if((r>=0.7&&r<0.8)||(r>1.1&&r<=1.25)) return'#FF6600'; // orange vif
  return'#8B0000'; // rouge sang
}

function applyAutoMeals(date){
  if(!S.autoMeals||!S.autoMeals.length)return;
  const dow=(new Date(date+'T00:00:00').getDay()+6)%7;
  S.autoMeals.forEach(am=>{
    if(!am.active||!am.days||!am.days.includes(dow))return;
    const cm=S.cm.find(c=>c.id===am.cmId);if(!cm)return;
    const day=getDay(date);
    const slot=am.slot||'lunch';
    // Check if already applied (avoid duplicates)
    const alreadyApplied=day[slot]&&day[slot].length>0&&day._autoApplied&&day._autoApplied.includes(am.id);
    if(!alreadyApplied){
      cm.items.forEach(it=>day[slot].push({...it,_auto:am.id}));
      if(!day._autoApplied)day._autoApplied=[];
      day._autoApplied.push(am.id);
    }
  });
}

function renderCoursesSection(){
  const _allCourses=getLastCourses();
  // Only show courses on or before S.date (no future courses)
  const allCourses=_allCourses?_allCourses.filter(function(info){return info.date<=S.date;}):null;
  const ym=S.date.slice(0,7);
  const monthTotal=getMonthCoursesTotal(ym);
  const isOpen=S.openSlots.includes('courses');
  const curDate=S.date;

  const header='<div style="display:flex;align-items:center;justify-content:space-between;margin:0 14px 8px" onclick="toggleSlot(\'courses\')" style="cursor:pointer">'+
    '<div style="display:flex;align-items:center;gap:8px;cursor:pointer">'+
      '<div class="sec" style="margin:0">Mes courses</div>'+
      '<div style="font-size:11px;color:var(--t2)">'+monthTotal.toFixed(2)+'€ ce mois</div>'+
    '</div>'+
    '<div style="display:flex;align-items:center;gap:6px">'+
      '<button onclick="showCoursesModal(S.date);event.stopPropagation()" style="font-size:11px;color:var(--cyan);font-weight:600;background:none;border:none;cursor:pointer;padding:2px 6px">+</button>'+
      '<div style="font-size:11px;color:var(--t3)">'+(isOpen?'\u25be':'\u25b8')+'</div>'+
    '</div>'+
  '</div>';

  if(!isOpen) return header;
  if(!allCourses||!allCourses.length){
    return header+'<div style="margin:0 14px 8px;background:var(--c1);border-radius:12px;padding:11px 13px;font-size:12px;color:var(--t2);text-align:center">Aucune course — tape + pour ajouter</div>';
  }

  var maxShow=3;
  var hasMore=allCourses.length>maxShow;
  var coursesToShow=hasMore?allCourses.slice(0,maxShow):allCourses;
  var cards=coursesToShow.map(function(info){
    const dt=new Date(info.date+'T12:00:00');
    const dateStr=dt.getDate()+'/'+(dt.getMonth()+1);
    const isCurrentDay=info.date===curDate;
    const enseignes=[...new Set(info.courses.map(function(cr){return cr.enseigne;}))].join(', ');
    // Gap label: relative to S.date (not today)
    const daysFromCurDate=Math.round((new Date(S.date+'T00:00:00')-new Date(info.date+'T00:00:00'))/(864e5));
    const gapLbl=daysFromCurDate===0?'Ce jour':
                 daysFromCurDate===1?'Hier':
                 'Il y a '+daysFromCurDate+'j';
    // Duration: how long these courses lasted (between this purchase and the next)
    const durLbl=info.durationDays>0?'↔ '+info.durationDays+' jours':'';
    return'<div style="background:'+(isCurrentDay?'rgba(48,213,200,.1)':'var(--c2)')+';border-radius:12px;padding:10px 11px;cursor:pointer;border:'+(isCurrentDay?'1px solid rgba(48,213,200,.4)':'1px solid transparent')+'" onclick="showCoursesModal(\''+info.date+'\')">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">'+
        '<div style="display:flex;align-items:center;gap:6px">'+
          '<div style="font-family:Syne,sans-serif;font-size:15px;font-weight:800;color:var(--t1)">'+dateStr+'</div>'+
          '<div style="font-size:10px;color:var(--cyan);background:rgba(48,213,200,.1);border-radius:6px;padding:2px 6px">'+gapLbl+'</div>'+
          (durLbl?'<div style="font-size:10px;color:var(--t2)">'+durLbl+'</div>':'')+
        '</div>'+
        '<div style="font-size:15px;font-weight:800;color:var(--cyan)">'+info.total.toFixed(2)+'€</div>'+
      '</div>'+
      '<div style="font-size:11px;color:var(--t2)">'+enseignes+'</div>'+
    '</div>';
  }).join('');

  var voirPlusHtml=hasMore?'<div style="margin:0 14px 4px;text-align:center"><button onclick="navigateToHistory()" style="font-size:11px;color:var(--cyan);font-weight:600;background:none;border:none;cursor:pointer;padding:4px 0">Voir tout l’historique ('+allCourses.length+' pleins) →</button></div>':'';
  return header+'<div style="margin:0 14px 8px;display:flex;flex-direction:column;gap:6px">'+cards+'</div>'+voirPlusHtml;
}
function renderObjectives(){
  const log=getDay(S.date);
  const objOpen=S.openSlots.includes('objectives');
  const data=[
    {id:'steps', l:'Pas',      v:log.steps||0,     g:S.objectives.steps,   u:'pas',     col:'var(--green)'},
    {id:'muscu', l:'Muscu',    v:(log.sessions||[]).filter(s=>s.type==='strength').length, g:S.objectives.muscu, u:'séance(s)', col:'var(--pink)'},
    {id:'sleep', l:'Sommeil',  v:log.sleep||0,     g:S.objectives.sleep,   u:'h',       col:'var(--purple)'},
    {id:'learn', l:'Learning', v:log.learning||0,  g:S.objectives.learning/7, u:'h',   col:'var(--yellow)'},
  ];
  const grid=objOpen?data.map(o=>{
    const pct=Math.min(100,p01(o.v,o.g)*100);
    const ok=o.v>=o.g;
    const disp=o.id==='steps'?(o.v).toLocaleString('fr'):o.v;
    const target=o.id==='steps'?(o.g).toLocaleString('fr'):o.g;
    return`<div class="obj-card"onclick="editObj('${o.id}')">
    <div class="obj-pct"style="color:${ok?'var(--green)':'var(--t3)'}">${ok?'\u2713':Math.round(pct)+'%'}</div>
    <div class="obj-card-lbl">${o.l}</div>
    <div class="obj-card-val"style="color:${o.col}">${disp}</div>
    <div class="obj-card-sub">/ ${target} ${o.u}</div>
    <div class="obj-bar"><div class="obj-fill"style="width:${pct}%;background:${o.col}"></div></div>
  </div>`;
  }).join(''):'';
  return`<div class="obj-section">
<div style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;margin-bottom:${objOpen?8:0}px"onclick="toggleSlot('objectives')">
  <div class="obj-title" style="margin:0">Objectifs du jour</div>

</div>
${objOpen?'<div class="obj-grid">'+grid+'</div>':''}
</div>`;
}

function updateFL(){
  const el=document.getElementById('fl');if(!el)return;
  const q=S.sq.toLowerCase(),cat=S.sc;
  const slot=S.vd?.slot,isCm=slot==='__cm__';
  const _filtered=FOODS.filter(fd=>(!q||fd.n.toLowerCase().includes(q))&&(cat==='all'||fd.c===cat));
  // Priority: startsWith first, then includes
  const filtered=q?[
    ..._filtered.filter(fd=>fd.n.toLowerCase().startsWith(q)),
    ..._filtered.filter(fd=>!fd.n.toLowerCase().startsWith(q))
  ]:_filtered;
  const favs=!q&&cat==='all'?S.fav.map(id=>FOODS.find(x=>x.id===id)).filter(Boolean):[];
  let html='';
  if(favs.length){

    html+=favs.map(fd=>frow(fd,slot,isCm)).join('');

  html+=filtered.length?filtered.map(fd=>frow(fd,slot,isCm)).join(''):`<div class="empty">Aucun résultat</div>`;
  el.innerHTML=html;
  const t=document.getElementById('food-sec-title');if(t)t.textContent=S.sq?'Résultats':'Aliments';

    el2.classList.toggle('on',el2.textContent.trim()===CATS.find(c=>c.id===S.sc)?.l);

function cfgStep(idx,delta){
  const fd=FOODS.find(x=>x.id===S.configItems[idx].foodId);if(!fd)return;
  if(fd.perUnit){
    const u=Math.max(1,Math.round(S.configItems[idx].qty/fd.perUnit.g)+delta);
    S.configItems[idx].qty=u*fd.perUnit.g;
  } else {
    const step=fd.dq>=100?50:fd.dq>=30?10:5;
    S.configItems[idx].qty=Math.max(step,S.configItems[idx].qty+delta*step);
  }
  // Update row DOM
  const row=document.getElementById('cfgr_'+idx);
  if(row){
    const m=calcM([S.configItems[idx]]);
    const kcalEl=row.querySelector('.cfg-kcal');
    if(kcalEl)kcalEl.textContent=m.k+' kcal';
    const qEl=row.querySelector('.cfg-qty');
    if(qEl){
      if(fd.perUnit){
        const u=Math.round(S.configItems[idx].qty/fd.perUnit.g);
        qEl.textContent=`${u} ${u===1?fd.perUnit.l:fd.perUnit.lp} · ${S.configItems[idx].qty}g`;
      } else qEl.textContent=S.configItems[idx].qty+'g';
    }
    const valEl=row.querySelector('.cfg-val');
    if(valEl)valEl.textContent=fd.perUnit?Math.round(S.configItems[idx].qty/fd.perUnit.g):S.configItems[idx].qty;
  }
  // Update total
  const tot=calcM(S.configItems);
  const totEl=document.getElementById('cfg-total');
  if(totEl)totEl.innerHTML=`<span style="font-family:Syne,sans-serif;font-size:26px;font-weight:800;color:var(--cyan)">${tot.k}</span> kcal · P:${tot.p}g G:${tot.g}g L:${tot.f}g`;

// Calcul automatique des objectifs selon profil et mode
function calcGoals(){
  const w=S.profile.w||70, h=S.profile.h||170, age=S.profile.age||24;
  const mode=S.dietMode||'fatLoss';
  // Mifflin BMR
  const bmr=Math.round(10*w + 6.25*h - 5*age + 5);
  // TDEE (activité modérée x1.5)
  const tdee=Math.round(bmr*1.5);
  let kcal,p,f,g;
  if(mode==='fatLoss'){
    kcal=Math.round(tdee*0.8);           // déficit 20%
    p=Math.round(w*2.2);                 // 2.2g/kg
    f=Math.round(kcal*0.25/9);           // 25% lipides
    g=Math.round((kcal - p*4 - f*9)/4); // reste glucides
  } else {
    kcal=Math.round(tdee*1.1);           // surplus 10%
    p=Math.round(w*2.0);                 // 2.0g/kg
    f=Math.round(kcal*0.25/9);
    g=Math.round((kcal - p*4 - f*9)/4);
  }
  return {kcal:Math.max(1200,kcal), p:Math.max(80,p), f:Math.max(30,f), g:Math.max(50,g)};
}
function applyGoals(){
  const g=calcGoals();
  S.goals.kcal=g.kcal; S.goals.p=g.p; S.goals.f=g.f; S.goals.c=g.g;
  saveS(); render();
}
function setDietMode(m){
  S.dietMode=m;
  applyGoals();
}

async function showSyncDiag(){
  const localKB=Math.round((localStorage.getItem('nc_v6')||'').length/1024);
  const localDays=Object.keys(S.log||{}).sort().reverse().slice(0,5);
  const localInfo=localDays.map(function(d){

    const n=(l.breakfast||[]).length+(l.lunch||[]).length+(l.dinner||[]).length+(l.snacks||[]).length;
    return d+': '+n+' aliments';
  }).join('\n')||'Aucune donnée locale';
  
  if(!S.user?.id){
    alert('LOCAL SEULEMENT (non connecté)\n'+localKB+'KB\n'+localInfo);return;
  }
  
  alert('Diagnostic en cours...\nConnecté: '+S.user.email);
  
  initSB(async function(client){
    if(!client){alert('\u26a0\ufe0f Supabase CDN non chargé\nVérifiez votre connexion internet');return;}
    sbClient=client;
    try{
      const{data:row,error}=await client.from('nutricore_data')
        .select('data,updated_at').eq('user_id',S.user.id).single();
      
      let remoteInfo='';
      if(error){
        if(error.code==='PGRST116'){
          remoteInfo='SUPABASE: Aucune donnée (table vide pour cet utilisateur)\n→ Cliquez Sync pour créer votre entrée';
        } else {
          remoteInfo='ERREUR SUPABASE: '+error.message+'\nCode: '+error.code+'\n→ Voir instructions ci-dessous';
        }
      } else if(row&&row.data){
        try{
          const rd=JSON.parse(row.data);
          const remDays=Object.keys(rd.log||{}).sort().reverse().slice(0,5);
          const remDayInfo=remDays.map(function(d){
            const l=rd.log[d];
            const n=(l.breakfast||[]).length+(l.lunch||[]).length+(l.dinner||[]).length+(l.snacks||[]).length;
            return d+': '+n+' aliments';
          }).join('\n')||'Aucun jour';
          const updAt=row.updated_at?new Date(row.updated_at).toLocaleString('fr-FR'):'?';
          remoteInfo='SUPABASE OK ('+Math.round(row.data.length/1024)+'KB)\nDernière mise à jour: '+updAt+'\n'+remDayInfo;
        }catch(e){remoteInfo='SUPABASE: Données corrompues';}
      }
      
      const msg=[
        '=== DIAGNOSTIC SYNC ===',

        '',
        '--- LOCAL ('+localKB+'KB) ---',
        localInfo,
        '',

      alert(msg);

function renderStepsGauge(days30){
  const goal=S.objectives.steps||7000;
  const maxSteps=Math.max(goal*1.2,...days30.map(d=>(getDay(d).steps||0)));
  const w=290,barH=8,gap=3;
  let bars='';
  const td=today();
  window._barTipsGlobal=[];
  // days displayed top(today) to bottom(30 days ago)
  const days30r=[...days30].reverse();
  days30r.forEach((d,i)=>{
    const steps=getDay(d).steps||0;
    window._barTipsGlobal.push(steps>0?d.slice(5)+' · '+steps+' pas':'');
    if(steps===0)return;
    const ratio=Math.min(1,steps/maxSteps);
    const goalRatio=Math.min(1,goal/maxSteps);
    const y=i*(barH+gap);
    const barW=Math.max(4,ratio*w);
    const pct=steps/goal;
    const col=pct>=1?'#A8FF3E':pct>=0.7?'#FFD60A':'#FF375F';
    const stepsLbl=steps>=1000?(steps/1000).toFixed(1)+'k':String(steps);
    bars+='<rect x="0" y="'+y+'" width="'+barW.toFixed(1)+'" height="'+barH+'" rx="'+(barH/2)+'" fill="'+col+'" style="cursor:pointer" onclick="showStepTip(event,'+i+')" />';
    bars+='<line x1="'+(goalRatio*w).toFixed(1)+'" y1="'+y+'" x2="'+(goalRatio*w).toFixed(1)+'" y2="'+(y+barH)+'" stroke="rgba(255,255,255,.35)" stroke-width="1.5"/>';
    const lblX=barW>70?(barW-5).toFixed(1):(barW+5).toFixed(1);
    const anchor=barW>70?'end':'start';
    bars+='<text x="'+lblX+'" y="'+(y+barH-1)+'" text-anchor="'+anchor+'" font-size="7" font-weight="700" fill="'+(barW>70?'#000':col)+'" font-family="DM Sans,sans-serif">'+stepsLbl+'</text>';
  });
  const totalH=(barH+gap)*30+4;
  const weekSteps=days30.slice(-7).reduce((a,d)=>a+(getDay(d).steps||0),0);
  const daysHit=days30.filter(d=>(getDay(d).steps||0)>=goal).length;
  const avgDay=Math.round(days30.filter(d=>getDay(d).steps>0).reduce((a,d)=>a+(getDay(d).steps||0),0)/Math.max(1,days30.filter(d=>getDay(d).steps>0).length));
  return'<div class="chart-wrap">'+
  '<div style="font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px">Historique 30 jours · Touche une barre</div>'+
  '<div style="display:flex;gap:7px;margin-bottom:9px">'+
    '<div style="flex:1;background:var(--c2);border-radius:10px;padding:8px;text-align:center"><div style="font-size:15px;font-weight:800;color:var(--green)">'+stKcal(weekSteps,S.profile.w)+'</div><div style="font-size:10px;color:var(--t2);margin-top:1px">kcal/sem</div></div>'+
    '<div style="flex:1;background:var(--c2);border-radius:10px;padding:8px;text-align:center"><div style="font-size:15px;font-weight:800;color:var(--yellow)">'+daysHit+'</div><div style="font-size:10px;color:var(--t2);margin-top:1px">jours ≥'+Math.round(goal/1000)+'k</div></div>'+
    '<div style="flex:1;background:var(--c2);border-radius:10px;padding:8px;text-align:center"><div style="font-size:15px;font-weight:800;color:var(--cyan)">'+(avgDay>=1000?(avgDay/1000).toFixed(1)+'k':avgDay||'—')+'</div><div style="font-size:10px;color:var(--t2);margin-top:1px">moy./jour</div></div>'+
  '</div>'+
  '<svg width="100%" viewBox="0 0 '+w+' '+totalH+'" preserveAspectRatio="xMidYMid meet">'+bars+'</svg>'+
  '</div>';
}

function renderChart(data,unit,col){
  if(!data||!data.length)return'';
  const w=280,h=60,pad=8;
  const max=Math.max(...data.map(d=>d.v),1);
  const xStep=(w-pad*2)/(data.length-1||1);
  const yv=v=>h-pad-(v/max)*(h-pad*2);
  const pts=data.map((d,i)=>(pad+i*xStep).toFixed(1)+','+yv(d.v).toFixed(1)).join(' ');
  return'<svg width="100%" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" overflow="visible">'+
    '<polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="2" stroke-linecap="round"/>'+
  '</svg>';
}

function renderSimpleChart(data,unit,col){
  if(!data||data.length<2)return'';
  const w=280,h=80,pad=8;
  const maxV=Math.max(...data.map(function(d){return d.v;}),1);
  const minV=Math.min(...data.map(function(d){return d.v;}));
  const best=data.reduce(function(a,d){return d.v>a.v?d:a;},data[0]);
  const avg=Math.round(data.reduce(function(a,d){return a+d.v;},0)/data.length*10)/10;
  const xStep=(w-pad*2)/(data.length-1||1);
  function yv(v){return h-pad-(v-minV*0.9)/(maxV-minV*0.9+0.01)*(h-pad*2);}

  // Build gradient area + line
  const pts=data.map(function(d,i){return(pad+i*xStep).toFixed(1)+','+yv(d.v).toFixed(1);}).join(' ');
  const areaBase=h-pad;
  const areaPts=pts+' '+(pad+(data.length-1)*xStep).toFixed(1)+','+areaBase+' '+pad+','+areaBase;

  // Dots with click
  let dots='';
  data.forEach(function(d,i){
    const x=pad+i*xStep,y=yv(d.v);
    const isBest=d===best;
    dots+='<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+(isBest?4:3)+'" fill="'+(isBest?col:'rgba(255,255,255,.6)')+'" stroke="'+col+'" stroke-width="1.5" style="cursor:pointer" onclick="showActivityTip(event,\''+d.d+'\','+d.v+',\''+unit+'\')"/>';
  });

  // X labels (every ~5 entries or at boundaries)
  let xlbls='';
  data.forEach(function(d,i){
    if(i===0||i===data.length-1||i===Math.floor(data.length/2)){
      const x=pad+i*xStep;
      const dn=new Date(d.d+'T12:00:00').getDate();
      xlbls+='<text x="'+x.toFixed(1)+'" y="'+(h+10)+'" text-anchor="middle" font-size="7" fill="rgba(255,255,255,.3)" font-family="DM Sans,sans-serif">'+dn+'</text>';
    }
  });

  const bestLbl=unit==='km/h'?
    (function(){var p=60/(best.v||1);return Math.floor(p)+"'"+String(Math.round((p%1)*60)).padStart(2,'0')+"''";})()
    :String(Math.round(best.v));
  const avgLbl=unit==='km/h'?
    (function(){var p=60/(avg||1);return Math.floor(p)+"'"+String(Math.round((p%1)*60)).padStart(2,'0')+"''";})()
    :String(Math.round(avg));

  const unitLabel=unit==='km/h'?' /km':' '+unit;

  return'<div style="background:var(--c1);border-radius:14px;padding:11px 13px;margin-bottom:6px">'+
    '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">'+
      '<div style="font-size:13px;font-weight:700;color:'+col+'">Meilleur: '+bestLbl+unitLabel+'</div>'+
      '<div style="font-size:11px;color:var(--t2)">Moy: '+avgLbl+unitLabel+'</div>'+
    '</div>'+
    '<svg width="100%" viewBox="0 0 '+w+' '+(h+14)+'" preserveAspectRatio="none" overflow="visible">'+
      '<defs>'+
        '<linearGradient id="cg_'+unit+'" x1="0" y1="0" x2="0" y2="1">'+
          '<stop offset="0%" stop-color="'+col+'" stop-opacity="0.25"/>'+
          '<stop offset="100%" stop-color="'+col+'" stop-opacity="0.03"/>'+
        '</linearGradient>'+
      '</defs>'+
      '<polygon points="'+areaPts+'" fill="url(#cg_'+unit+')"/>'+
      '<polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'+
      dots+xlbls+
    '</svg>'+
    '<div style="text-align:center;font-size:10px;color:var(--t3);margin-top:4px">Touche un point pour voir le détail</div>'+
  '</div>';
}

    '<div style="height:24px"></div>'+
  '</div>'+nav('activity');
}

function switchSportTab(t){S.stab=t;S.sdur='';S.sspd='';S.skcal='';S.shc=false;S.scdur='';S.scspd='';S.smType=null;render()}

function onSI(key,val){S[key]=val;updateSPrev()}

function onMuscle(id,kcal){
  S.smType=id;S.skcal=kcal.toString();
  document.querySelectorAll('.mtype').forEach(el=>el.classList.toggle('sel',el.dataset.id===id));
  const kin=document.getElementById('si_skcal');if(kin)kin.value=kcal;
  updateSPrev();
}

function onStrToggle(){
  S.shc=!S.shc;
  const sub=document.getElementById('cardio-sub');if(sub)sub.style.display=S.shc?'block':'none';
  const tog=document.getElementById('str-tog');
  if(tog){tog.className=`tog ${S.shc?'on':'off'}`;tog.querySelector('.togk').style.left=S.shc?'20px':'2px';}
  updateSPrev();
}

function updateSPrev(){
  const pv=document.getElementById('sport-prev');
  const btn=document.getElementById('sport-add');
  if(!pv)return;
  const w=S.profile.w,tab=S.stab;
  if(tab==='cardio'){
    const dur=parseFloat(S.sdur)||0,spd=parseFloat(S.sspd)||0;
    if(dur>0&&spd>0){
      const kcal=Math.round(getRunMET(spd)*w*(dur/60));
      const dist=parseFloat((spd*dur/60).toFixed(2));
      const pace=60/spd,pm=Math.floor(pace),ps=Math.round((pace%1)*60);
      pv.style.display='block';
      pv.innerHTML=`<div class="pgrid">
        <div><div class="pv"style="color:var(--pink)">${kcal}</div><div class="pl">kcal</div></div>
        <div><div class="pv"style="color:var(--cyan)">${dist} km</div><div class="pl">distance</div></div>
        <div><div class="pv"style="color:var(--green)">${pm}'${String(ps).padStart(2,'0')}''</div><div class="pl">allure /km</div></div>
      </div>`;
      if(btn){btn.style.display='block';btn.onclick=()=>saveCardio(dur,spd,kcal,dist);}
    }else{pv.style.display='none';if(btn)btn.style.display='none';}
  } else if(tab==='stair'){
    const dur=parseFloat(S.sdur)||0;
    const marches=parseInt(S.smarches)||0;
    if(dur>0){
      const kcal=Math.round(8*w*(dur/60));
      const vw=Math.round(3.5*w*(dur/60));
      pv.style.display='block';
      pv.innerHTML='<div class="pgrid">'+
        '<div><div class="pv" style="color:var(--yellow)">'+kcal+'</div><div class="pl">kcal</div></div>'+
        '<div><div class="pv" style="color:var(--cyan)">'+(marches||'—')+'</div><div class="pl">marches</div></div>'+
        '<div><div class="pv" style="color:var(--green)">'+Math.round(dur)+' min</div><div class="pl">durée</div></div>'+
      '</div>';
      if(btn){btn.style.display='block';btn.style.background='var(--yellow)';btn.style.color='#000';btn.onclick=function(){saveStair();};}
    }else{pv.style.display='none';if(btn)btn.style.display='none';}
  } else {
    const dur=parseFloat(S.sdur)||0,kcal=parseFloat(S.skcal)||0;
    const hc=S.shc,cdur=parseFloat(S.scdur)||0,cspd=parseFloat(S.scspd)||0;
    const ckcal=hc&&cdur>0&&cspd>0?Math.round(getRunMET(cspd)*w*(cdur/60)):0;
    const cdist=hc&&cdur>0&&cspd>0?parseFloat((cspd*cdur/60).toFixed(2)):0;
    const cpace=cspd>0?60/cspd:0,cpm=Math.floor(cpace),cps=Math.round((cpace%1)*60);
    const tot2=kcal+(hc?ckcal:0);
    if(dur>0&&kcal>0){
      pv.style.display='block';
      pv.innerHTML=`<div class="pgrid">
        <div><div class="pv"style="color:var(--pink)">${tot2}</div><div class="pl">kcal</div></div>
        <div><div class="pv"style="color:var(--purple)">${dur}</div><div class="pl">min</div></div>
        ${hc&&cdist?`<div><div class="pv"style="color:var(--cyan)">${cdist}km</div><div class="pl">cardio</div></div>`:'<div></div>'}
      </div>${hc&&cspd>0?`<div style="text-align:center;font-size:11px;color:var(--t2);margin-top:6px">${cpm}'${String(cps).padStart(2,'0')}'' /km</div>`:''}`;
      if(btn){btn.style.display='block';btn.style.background='var(--pink)';btn.style.color='#fff';btn.onclick=()=>saveStr(dur,kcal,hc,cdur,cspd,ckcal,cdist);}
    }else{pv.style.display='none';if(btn)btn.style.display='none';}
  }
}

function navigateToHistory(){go('courses-history');}
function vCoursesHistory(){
  // Initialise month to most recent courses month or today
  if(!S.coursesHistMonth){
    var allD=Object.keys(S.log).filter(function(d){return S.log[d].courses&&S.log[d].courses.length>0;}).sort().reverse();
    S.coursesHistMonth=allD.length?allD[0].slice(0,7):today().slice(0,7);
  }
  var ym=S.coursesHistMonth;
  var todayYM=today().slice(0,7);
  var parts=ym.split('-').map(Number);
  var prevYM=(function(){var d=new Date(parts[0],parts[1]-2,1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');})();
  var nextYM=(function(){var d=new Date(parts[0],parts[1],1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');})();
  var canNext=nextYM<=todayYM;
  var monthName=new Date(parts[0],parts[1]-1,1).toLocaleDateString('fr-FR',{month:'long',year:'numeric'});

  // Get all courses for this month
  var allDays=Object.keys(S.log).filter(function(d){
    return d.slice(0,7)===ym&&S.log[d].courses&&S.log[d].courses.length>0;
  }).sort().reverse();

  var monthTotal=allDays.reduce(function(a,d){
    return a+(S.log[d].courses||[]).reduce(function(b,cr){return b+(cr.prix||0);},0);
  },0);

  var rows=allDays.length?allDays.map(function(d){
    var courses=S.log[d].courses||[];
    var total=Math.round(courses.reduce(function(a,cr){return a+(cr.prix||0);},0)*100)/100;
    var dt=new Date(d+'T12:00:00');
    var dateStr=dt.getDate()+'/'+(dt.getMonth()+1);
    var enseignes=[...new Set(courses.map(function(cr){return cr.enseigne;}))].join(', ');
    var items=courses.map(function(cr){
      return'<div style="font-size:11px;color:var(--t2);margin-top:1px">'+(cr.enseigne||'')+
        (cr.objet?' \xb7 '+cr.objet:'')+' \u2014 '+cr.prix.toFixed(2)+'\u20ac</div>';
    }).join('');
    return'<div style="padding:9px 0;border-bottom:1px solid var(--bd);cursor:pointer" onclick="showCoursesModal(this.dataset.d)" data-d="'+d+'">'+
      '<div style="display:flex;justify-content:space-between;align-items:center">'+
        '<div style="font-family:Syne,sans-serif;font-size:15px;font-weight:700">'+dateStr+'</div>'+
        '<div style="font-size:15px;font-weight:700;color:var(--cyan)">'+total.toFixed(2)+'\u20ac</div>'+
      '</div>'+
      '<div style="font-size:12px;color:var(--t2);margin-top:1px">'+enseignes+'</div>'+items+
    '</div>';
  }).join(''):'<div style="padding:20px 0;text-align:center;font-size:12px;color:var(--t2)">Aucune course ce mois</div>';

  return'<div class="sc">'+
    '<div class="bh"><button class="bk" onclick="back()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Retour</button>'+
    '<div class="bht">Historique de mes courses</div></div>'+
    '<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 14px 8px">'+
      '<button onclick="S.coursesHistMonth=\''+prevYM+'\';render()" style="background:none;border:none;color:var(--cyan);font-size:22px;cursor:pointer;padding:4px 8px">\u2039</button>'+
      '<div style="font-family:Syne,sans-serif;font-size:15px;font-weight:700;text-transform:capitalize">'+monthName+'</div>'+
      (canNext?'<button onclick="S.coursesHistMonth=\''+nextYM+'\';render()" style="background:none;border:none;color:var(--cyan);font-size:22px;cursor:pointer;padding:4px 8px">\u203a</button>':'<div style="width:40px"></div>')+
    '</div>'+
    '<div style="background:var(--c1);border-radius:14px;margin:0 14px 8px;overflow:hidden">'+
      '<div style="padding:10px 13px 4px;display:flex;justify-content:space-between">'+
        '<div style="font-size:11px;color:var(--t2)">Total du mois</div>'+
        '<div style="font-size:15px;font-weight:800;color:var(--cyan)">'+Math.round(monthTotal*100)/100+'\u20ac</div>'+
      '</div>'+
      '<div style="padding:0 13px 10px">'+rows+'</div>'+
    '</div>'+
    '<div style="height:16px"></div>'+
  '</div>'+nav('calendar');
}
function vCalendar(){
  const ym=S.calMonth||today().slice(0,7);
  const[yr,mo]=ym.split('-').map(Number);
  const dInM=new Date(yr,mo,0).getDate();
  const firstDow=(new Date(yr,mo-1,1).getDay()+6)%7;
  const todayYM=today().slice(0,7);
  const canNext=ym<todayYM;
  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push(null);
  for(let dd=1;dd<=dInM;dd++) cells.push(yr+'-'+String(mo).padStart(2,'0')+'-'+String(dd).padStart(2,'0'));
  while(cells.length%7!==0)cells.push(null);
  const sz=42,rv=17,cxv=sz/2,cyv=sz/2;
  const calGrid=cells.map(d=>{
    if(!d)return'<div></div>';
    const mv=dayM(d),hasData=mv.k>0;
    const ratio=mv.k/S.goals.kcal;
    const pct=Math.round(ratio*100);
    const rcol=calRingColor(mv.k,S.goals.kcal);
    const dn=parseInt(d.split('-')[2]);
    const isTd=d===today();
    const isSel=d===S.date;
    const hasCourses=(getDay(d).courses||[]).length>0;
    const circ=2*Math.PI*rv,off=circ*(1-Math.min(1,ratio));
    // Day number always in center (no bold), pct% white above circle
    const dnFill=isTd?'#fff':hasData?'#fff':'rgba(255,255,255,.25)';
    const innerTxt='<text x="'+cxv+'" y="'+(cyv+4)+'" text-anchor="middle" font-size="11" font-weight="400" fill="'+dnFill+'" font-family="system-ui,sans-serif">'+dn+'</text>';
    // pct% : white, small, no bold, sits just above the ring top
    const pctY=(cyv-rv-1).toFixed(1);
    const dayLbl=hasData?'<text x="'+cxv+'" y="'+pctY+'" text-anchor="middle" font-size="6.5" font-weight="400" fill="rgba(255,255,255,.75)" font-family="system-ui,sans-serif">'+pct+'%</text>':'';
    return'<div class="cal-day" onclick="gotoDate(\''+d+'\')" style="padding:1px">'+
      '<svg width="100%" viewBox="0 0 '+sz+' '+sz+'" overflow="visible">'+
      (isTd?'<circle cx="'+cxv+'" cy="'+cyv+'" r="'+(rv+2)+'" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="1.5"/>':'')+
      (hasCourses?'<circle cx="'+cxv+'" cy="'+cyv+'" r="'+(rv+3)+'" fill="none" stroke="rgba(48,213,200,.7)" stroke-width="2"/>':'')+
      (isSel&&!isTd?'<circle cx="'+cxv+'" cy="'+cyv+'" r="'+(rv+2)+'" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="1.5"/>':'')+
      '<circle cx="'+cxv+'" cy="'+cyv+'" r="'+rv+'" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="5.5"/>'+
      (hasData?'<circle cx="'+cxv+'" cy="'+cyv+'" r="'+rv+'" fill="none" stroke="'+rcol+'" stroke-width="5.5" stroke-linecap="round" stroke-dasharray="'+circ.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'" transform="rotate(-90 '+cxv+' '+cyv+')"/>':'')+
      innerTxt+dayLbl+'</svg></div>';
  }).join('');
  const days30=[];for(let i=29;i>=0;i--)days30.push(addDays(today(),-i));
  const last7=days30.slice(-7).filter(d=>dayM(d).k>0);
  const avg7=last7.length?Math.round(last7.reduce((a,d)=>a+dayM(d).k,0)/last7.length):0;
  const streak=calcStreak(days30);
  const goalDays=days30.filter(d=>{const m=dayM(d);return m.k>0&&m.k>=S.goals.kcal*0.8;}).length;
  return'<div class="sc">'+
    '<div class="bh"><button class="bk" onclick="back()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Retour</button><div class="bht">Calendrier</div></div>'+
    '<div class="cal-stats">'+
      '<div class="cstat"><div class="cstat-v" style="color:var(--green)">'+streak+'</div><div class="cstat-l">Streak</div></div>'+
      '<div class="cstat"><div class="cstat-v" style="color:var(--cyan)">'+(avg7||'\u2014')+'</div><div class="cstat-l">Moy. 7j</div></div>'+
      '<div class="cstat"><div class="cstat-v" style="color:var(--yellow)">'+goalDays+'</div><div class="cstat-l">\u226580%/30j</div></div>'+
    '</div>'+
    '<div style="display:flex;align-items:center;justify-content:space-between;padding:0 14px 4px">'+
      '<button onclick="calMonth(-1)" style="background:none;border:none;color:var(--cyan);font-size:22px;cursor:pointer;padding:4px 8px">\u2039</button>'+
      '<div style="font-family:Syne,sans-serif;font-size:15px;font-weight:700">'+monthLabel(ym)+'</div>'+
      (canNext?'<button onclick="calMonth(1)" style="background:none;border:none;color:var(--cyan);font-size:22px;cursor:pointer;padding:4px 8px">\u203a</button>':'<div style="width:40px"></div>')+
    '</div>'+
    '<div class="cal-dow"><span>L</span><span>M</span><span>M</span><span>J</span><span>V</span><span>S</span><span>D</span></div>'+
    '<div class="cal-grid">'+calGrid+'</div>'+
    '<div class="cal-legend">'+
      '<div class="leg"><div class="legdot" style="background:var(--green)"></div>\u226590%</div>'+
      '<div class="leg"><div class="legdot" style="background:var(--yellow)"></div>80-90%</div>'+
      '<div class="leg"><div class="legdot" style="background:var(--pink)"></div>&lt;80%</div>'+
      '<div class="leg"><div style="width:7px;height:7px;border-radius:50%;border:2px solid rgba(48,213,200,.7)"></div>Courses</div>'+
    '</div>'+
    '<div style="margin:2px 14px 4px;display:flex;justify-content:flex-end">'+
      '<button onclick="navigateToHistory()" style="font-size:12px;color:var(--cyan);font-weight:600;background:none;border:none;cursor:pointer">Historique de mes courses →</button>'+
    '</div>'+
    renderMonthBalance(ym)+
    '<div style="height:16px"></div>'+
  '</div>'+nav('calendar');

// ── Supabase Realtime: mise à jour automatique quand l'autre appareil sync ──
var _realtimeChannel=null;
function startRealtime(){
  if(_realtimeChannel||!sbClient||!S.user?.id)return;
  try{
    _realtimeChannel=sbClient
      .channel('nutricore-'+S.user.id)
      .on('postgres_changes',{
        event:'UPDATE',schema:'public',table:'nutricore_data',
        filter:'user_id=eq.'+S.user.id
      },function(payload){
        // L'autre appareil a mis à jour Supabase → on merge et on re-render
        if(!payload.new||!payload.new.data)return;
        try{
          const rd=JSON.parse(payload.new.data);
          if(rd.log)S.log=_mergeLogs(S.log,rd.log);
          if(rd.cm&&rd.cm.length)S.cm=rd.cm;
          if(rd.goals)S.goals=rd.goals;
          if(rd.profile)S.profile=rd.profile;
          localStorage.setItem('nc_v6',JSON.stringify({
            log:S.log,cm:S.cm,goals:S.goals,profile:S.profile,
            fav:S.fav,objectives:S.objectives,autoMeals:S.autoMeals,
            user:S.user,dietMode:S.dietMode
          }));
          render();
        }catch(e){console.warn('[Realtime]',e);}
      })
      .subscribe();
  }catch(e){console.warn('[Realtime start]',e);}
}
function stopRealtime(){
  if(_realtimeChannel&&sbClient){
    try{sbClient.removeChannel(_realtimeChannel);}catch(e){}
    _realtimeChannel=null;
  }
}
async function doLogin(){
  const email=document.getElementById('auth-email')?.value;
  const pw=document.getElementById('auth-pw')?.value;
  if(!email||!pw){setAuthErr('Remplis tous les champs');return;}
  initSB(async function(client){
    if(!client){setAuthErr('Service indisponible — vérifiez votre connexion');return;}
    try{
    const{data,error}=await client.auth.signInWithPassword({email,password:pw});
    if(error)throw error;
    S.user={email:data.user.email,id:data.user.id};
    // Push local data first (preserve what was done offline)
    saveS(); // saves to localStorage
    toast('Synchronisation...');

    await new Promise(function(r){setTimeout(r,800);});
    const loaded=await loadFromSupabase();
    toast(loaded?'Synchronisé ✓':'Connecté ✓');if(window._startSyncPoll)window._startSyncPoll();startRealtime();goHome();

async function manualSync(){
  if(!S.user?.id){toast('Connecte-toi d\u2019abord');return;}
  toast('\u23f3 Synchronisation\u2026');
  return new Promise(function(resolve){
    initSB(async function(client){
      if(!client){toast('\u26a0\ufe0f Supabase CDN non charg\xe9 \u2014 v\xe9rifie ta connexion');resolve(false);return;}
      sbClient=client;
      // PULL first (ne pas \xe9craser les donn\xe9es de l'autre appareil)
      toast('\u2193 Lecture\u2026');
      try{
        const{data:row,error:e1}=await client.from('nutricore_data')
          .select('data').eq('user_id',S.user.id).single();
        if(!e1&&row&&row.data){
          try{
            const rd=JSON.parse(row.data);
            if(rd.log)S.log=_mergeLogs(S.log,rd.log);
            if(rd.cm&&rd.cm.length)S.cm=rd.cm;
            if(rd.goals)S.goals=rd.goals;
            if(rd.profile)S.profile=rd.profile;
          }catch(parseErr){}
        }
      }catch(e){}
      // PUSH merged result
      toast('\u2191 Envoi\u2026');
      try{
        const{error:e2}=await client.from('nutricore_data').upsert({
          user_id:S.user.id,
          data:JSON.stringify({log:S.log,cm:S.cm,goals:S.goals,profile:S.profile,
            fav:S.fav,objectives:S.objectives,autoMeals:S.autoMeals,dietMode:S.dietMode}),
          updated_at:new Date().toISOString()
        },{onConflict:'user_id'});
        if(e2){toast('\u26a0\ufe0f '+e2.message);resolve(false);return;}
      }catch(e){toast('\u26a0\ufe0f Erreur r\xe9seau: '+e.message);resolve(false);return;}
      // Save merged locally
      localStorage.setItem('nc_v6',JSON.stringify({log:S.log,cm:S.cm,goals:S.goals,
        profile:S.profile,fav:S.fav,objectives:S.objectives,autoMeals:S.autoMeals,
        user:S.user,dietMode:S.dietMode}));
      toast('\u2713 Synchronis\xe9');
      render();resolve(true);
    });
  });
}

// ── WATER TRACKER ─────────────────────────────────────────────────────────────
const WATER_START='2025-04-01';
const WATER_MILESTONES=[50,100,500,1000,1500,5000,10000];
function getDayWaterLiters(date){
  const log=getDay(date);
  let ml=0;
  const allItems=[...(log.breakfast||[]),...(log.lunch||[]),...(log.dinner||[]),...(log.snacks||[]),...(log.drinks||[])];
  allItems.forEach(it=>{
    if(it.foodId===101)ml+=it.qty;
    else if(it.foodId===100)ml+=it.qty*0.5;
    else if(it.foodId===13)ml+=600;
    else if(it.foodId===102)ml+=it.qty;
  });
  return ml/1000;
}
function getTotalWaterLiters(){
  const start=new Date(WATER_START+'T00:00:00');
  const now=new Date();
  let total=0;
  const cur=new Date(start);
  while(cur<=now){
    const d=cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');
    total+=getDayWaterLiters(d);
    cur.setDate(cur.getDate()+1);
  }
  return Math.round(total*100)/100;
}
function renderWaterCounter(){
  const total=getTotalWaterLiters();
  const start=new Date(WATER_START+'T00:00:00');
  const days=Math.max(1,Math.round((new Date()-start)/(864e5))+1);
  const avg=Math.round(total/days*100)/100;
  const MS=WATER_MILESTONES;
  const nextMs=MS.find(m=>m>total);
  const prevMs=[...MS].reverse().find(m=>m<=total)||0;
  const progress=nextMs?Math.min(1,(total-prevMs)/(nextMs-prevMs)):1;
  const bubbles=MS.map(lv=>{
    const done=total>=lv;
    const partial=!done&&lv===nextMs;
    const pct=partial?Math.min(1,(total-prevMs)/(lv-prevMs)):done?1:0;
    const sz=36,r=16,cx=sz/2,cy=sz/2;

    '<div style="padding:12px 13px 8px;display:flex;align-items:baseline;gap:8px">'+

      '<div style="font-size:11px;color:var(--blue);font-weight:600">'+days+'j · '+avg+'L/j</div>'+
    '</div>'+
    '<div style="padding:0 13px 10px;display:flex;align-items:baseline;gap:5px">'+
      '<div style="font-family:Syne,sans-serif;font-size:36px;font-weight:800;color:var(--blue);line-height:1">'+total+'</div>'+
      '<div style="font-size:13px;color:var(--t2);margin-bottom:2px">litres</div>'+
    '</div>'+
    (nextMs?'<div style="padding:0 13px 9px">'+
      '<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--t2);margin-bottom:4px">'+
        '<span>'+prevMs+'L atteint</span><span>Prochain: '+nextMs+'L</span>'+
      '</div>'+
      '<div style="height:4px;background:var(--c3);border-radius:4px;overflow:hidden">'+
        '<div style="height:100%;border-radius:4px;background:var(--blue);width:'+Math.min(100,progress*100).toFixed(1)+'%"></div>'+
      '</div>'+
      '<div style="font-size:10px;color:var(--t3);margin-top:3px">'+Math.round(progress*100)+'% · encore '+(nextMs-total).toFixed(1)+'L</div>'+
    '</div>':'<div style="padding:0 13px 9px;font-size:11px;color:var(--green);font-weight:600">Tous les paliers atteints</div>')+
    '<div style="padding:4px 10px 12px"><div style="display:flex;gap:5px">'+bubbles+'</div></div>'+
  '</div>';
}


function renderMacroExpand(ym,monthDays,last30){
  const gT=S.goals.c||210,pT=S.goals.p||155,fT=S.goals.f||70;
  const logged30=last30.filter(function(d){return dayM(d).k>0;});
  const avgG30=logged30.length?Math.round(logged30.reduce(function(a,d){return a+dayM(d).g;},0)/logged30.length):0;
  const avgP30=logged30.length?Math.round(logged30.reduce(function(a,d){return a+dayM(d).p;},0)/logged30.length):0;
  const avgF30=logged30.length?Math.round(logged30.reduce(function(a,d){return a+dayM(d).f;},0)/logged30.length):0;
  var _today=today();
  var last7d=[];for(var _i=6;_i>=0;_i--)last7d.push(addDays(_today,-_i));
  const data7=last7d.map(function(d){var mv=dayM(d);return{d:d,g:mv.g||0,p:mv.p||0,f:mv.f||0,has:mv.k>0};});
  const w=280,h=80,pad=8;
  const maxV=Math.max(gT*1.2,pT*1.2,fT*1.2,...data7.map(function(d){return Math.max(d.g,d.p,d.f);}));
  const xStep=(w-pad*2)/6;
  function yv(v){return h-pad-(v/maxV)*(h-pad*2);}
  const gLY=yv(gT),pLY=yv(pT),fLY=yv(fT);
  function pts(key){return data7.map(function(d,i){return(pad+i*xStep).toFixed(1)+','+yv(d[key]).toFixed(1);}).join(' ');}
  function dots(key,col){return data7.map(function(d,i){if(!d.has)return'';var x=(pad+i*xStep).toFixed(1),y=yv(d[key]).toFixed(1);return'<circle cx="'+x+'" cy="'+y+'" r="2.5" fill="'+col+'"/>';}).join('');}
  const dayLbls=data7.map(function(d,i){var dn=parseInt(d.d.split('-')[2]);var x=(pad+i*xStep).toFixed(1);return'<text x="'+x+'" y="'+(h+2)+'" text-anchor="middle" font-size="7" fill="rgba(255,255,255,.3)" font-family="DM Sans,sans-serif">'+dn+'</text>';}).join('');
  const svg='<svg width="100%" viewBox="0 0 '+w+' '+(h+8)+'" preserveAspectRatio="none" overflow="visible">'+
    '<line x1="'+pad+'" y1="'+gLY.toFixed(1)+'" x2="'+(w-pad)+'" y2="'+gLY.toFixed(1)+'" stroke="var(--yellow)" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>'+
    '<line x1="'+pad+'" y1="'+pLY.toFixed(1)+'" x2="'+(w-pad)+'" y2="'+pLY.toFixed(1)+'" stroke="var(--green)" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>'+
    '<line x1="'+pad+'" y1="'+fLY.toFixed(1)+'" x2="'+(w-pad)+'" y2="'+fLY.toFixed(1)+'" stroke="var(--orange)" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>'+
    '<polyline points="'+pts('g')+'" fill="none" stroke="var(--yellow)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'+
    '<polyline points="'+pts('p')+'" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'+
    '<polyline points="'+pts('f')+'" fill="none" stroke="var(--orange)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'+
    dots('g','var(--yellow)')+dots('p','var(--green)')+dots('f','var(--orange)')+dayLbls+'</svg>';
  function statCard(lbl,avg,target,col){var diff=avg-target,pct2=Math.round(avg/target*100);var dcol=Math.abs(diff/target)<0.1?'var(--green)':diff>0?'var(--pink)':'var(--t2)';return'<div style="flex:1;text-align:center;padding:8px 4px"><div style="font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px">'+lbl+'</div><div style="font-size:15px;font-weight:700;color:'+col+'">'+pct2+'%</div><div style="font-size:10px;color:'+dcol+';margin-top:1px">'+(diff>0?'+':'')+diff+'g</div><div style="font-size:9px;color:var(--t3)">moy. '+avg+'g / obj '+target+'g</div></div>';}
  return'<div style="border-top:1px solid var(--bd)"><div style="display:flex;border-bottom:1px solid var(--bd)">'+statCard('Glucides',avgG30,gT,'var(--yellow)')+'<div style="width:1px;background:var(--bd)"></div>'+statCard('Protéines',avgP30,pT,'var(--green)')+'<div style="width:1px;background:var(--bd)"></div>'+statCard('Lipides',avgF30,fT,'var(--orange)')+'</div><div style="padding:10px 12px 4px"><div style="font-size:10px;color:var(--t2);margin-bottom:6px">7 derniers jours — — — objectif</div>'+svg+'</div><div style="display:flex;gap:12px;padding:4px 12px 10px"><div style="display:flex;align-items:center;gap:3px"><div style="width:8px;height:2px;border-radius:1px;background:var(--yellow)"></div><span style="font-size:9px;color:var(--t2)">Glucides</span></div><div style="display:flex;align-items:center;gap:3px"><div style="width:8px;height:2px;border-radius:1px;background:var(--green)"></div><span style="font-size:9px;color:var(--t2)">Protéines</span></div><div style="display:flex;align-items:center;gap:3px"><div style="width:8px;height:2px;border-radius:1px;background:var(--orange)"></div><span style="font-size:9px;color:var(--t2)">Lipides</span></div></div></div>';
}
function renderDepensesExpand(ym,monthDays,depItems,depTotal){
  var byDate={};
  depItems.forEach(function(it){if(!byDate[it.date])byDate[it.date]=[];byDate[it.date].push(it);});
  const dates=Object.keys(byDate).sort().reverse();
  const rows=dates.length?dates.map(function(d){
    var dayItems=byDate[d];
    var dayTotal=Math.round(dayItems.reduce(function(a,it){return a+(it.cost||0);},0)*100)/100;
    var dn=new Date(d+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
    var detail=dayItems.map(function(it){var fd=FOODS.find(function(f){return f.id===it.foodId;});var nm=it.note?'Cheat Meal : '+it.note:(fd?fd.n:'?');var ens=it.enseigne?' · '+it.enseigne:'';return'<div style="font-size:11px;color:var(--t2);margin-top:2px">'+nm+ens+'</div>';}).join('');

  }).join(''):'<div style="text-align:center;font-size:12px;color:var(--t2);padding:8px">Aucune dépense ce mois</div>';

function miniRing(pct,sz){
  const r=(sz-6)/2,cx=sz/2,cy=sz/2,circ=2*Math.PI*r;
  const col=pct>=90?'var(--green)':pct>=60?'var(--yellow)':'var(--pink)';
  const off=circ*(1-pct/100);
  return'<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 '+sz+' '+sz+'">'+
    '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="4"/>'+
    '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="4" stroke-linecap="round" stroke-dasharray="'+circ.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'" transform="rotate(-90 '+cx+' '+cy+')"/>'+
    '<text x="'+cx+'" y="'+(cy+4)+'" text-anchor="middle" font-size="10" font-weight="700" fill="'+col+'" font-family="DM Sans,sans-serif">'+pct+'</text>'+
  '</svg>';
}

function navSuivi(d){
  const ym=S.suiviMonth||today().slice(0,7);
  const[y,m]=ym.split('-').map(Number);
  const dt=new Date(y,m-1+d,1);
  const nYM=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');
  if(nYM>today().slice(0,7))return;
  S.suiviMonth=nYM;S.suiviOpen=null;render();
}
function vSuivi(){
  const ym=S.suiviMonth||today().slice(0,7);
  const td=today();
  const todayYM=td.slice(0,7);
  const [yr,mo]=ym.split('-').map(Number);
  const dInM=new Date(yr,mo,0).getDate();
  const lastDay=ym===todayYM?parseInt(td.split('-')[2]):dInM;
  const monthDays=[];
  for(let d=1;d<=lastDay;d++)
    monthDays.push(yr+'-'+String(mo).padStart(2,'0')+'-'+String(d).padStart(2,'0'));
  const last30=[];for(let i=29;i>=0;i--)last30.push(addDays(td,-i));

  // Cal stats
  const calLogged=monthDays.filter(d=>dayM(d).k>0);
  const calOk=monthDays.filter(d=>{const m=dayM(d);return m.k>0&&m.k>=S.goals.kcal*0.8;});
  const calPct=calLogged.length?Math.round(calOk.length/calLogged.length*100):0;
  // Sleep
  const sleepLogged=monthDays.filter(d=>(getDay(d).sleep||0)>0);
  const sleepOk=monthDays.filter(d=>(getDay(d).sleep||0)>=S.objectives.sleep);
  const sleepPct=sleepLogged.length?Math.round(sleepOk.length/sleepLogged.length*100):0;
  // Muscu
  const muscuTotal=monthDays.reduce((a,d)=>(getDay(d).sessions||[]).filter(s=>s.type==='strength').length+a,0);
  const weekCount=Math.ceil(lastDay/7);
  const muscuTarget=Math.round(lastDay*0.8);
  const muscuPct=muscuTarget>0?Math.min(100,Math.round(muscuTotal/muscuTarget*100)):0;
  const muscuByType=[];
  const MTYPES_local=[{id:'shoulders',l:'Épaules',col:'var(--pink)'},{id:'chest',l:'Pectoraux',col:'var(--orange)'},{id:'back',l:'Dos',col:'var(--cyan)'},{id:'arms',l:'Bras',col:'var(--yellow)'},{id:'legs',l:'Jambes',col:'var(--purple)'},{id:'abs',l:'Abdos',col:'var(--green)'}];
  MTYPES_local.forEach(mt=>{
    const count=monthDays.reduce((a,d)=>(getDay(d).sessions||[]).filter(s=>s.type==='strength'&&((s.muscles&&s.muscles.includes(mt.id))||(s.muscleType===mt.id))).length+a,0);
    if(count>0)muscuByType.push({l:mt.l,col:mt.col,count});
  });
  // Learning
  const workTotal=monthDays.reduce((a,d)=>a+(getDay(d).learning||0),0);
  const workTarget=S.objectives.learning*weekCount;
  const workPct=Math.min(100,workTarget>0?Math.round(workTotal/workTarget*100):0);
  // Depenses
  const depItems=monthDays.flatMap(function(d){
    return [...(getDay(d).breakfast||[]),...(getDay(d).lunch||[]),...(getDay(d).dinner||[]),...(getDay(d).snacks||[]),...(getDay(d).drinks||[])].filter(function(it){return it.cost>0;}).map(function(it){return Object.assign({},it,{date:d});});
  });
  const depTotal=Math.round(depItems.reduce(function(a,it){return a+(it.cost||0);},0)*100)/100;

  const cards=[
    {id:'cal',    label:'Alimentation',  pct:calPct,   sub:calOk.length+'/'+calLogged.length+' jours ≥80%'},
    {id:'sleep',  label:'Sommeil',        pct:sleepPct, sub:sleepOk.length+'/'+sleepLogged.length+' jours ≥'+S.objectives.sleep+'h'},
    {id:'muscu',  label:'Musculation',          pct:muscuPct, sub:muscuTotal+'/'+muscuTarget+' séances · obj. 80%'},
    {id:'work',   label:'Learning',       pct:workPct,  sub:workTotal.toFixed(1)+'h / '+workTarget+'h ('+weekCount+' sem.)'},
    {id:'macros', label:'Macronutriments',pct:-1,       sub:'Courbes glucides · protéines · lipides'},
    {id:'depenses',label:'Mes Dépenses', pct:-1,       sub:depTotal.toFixed(2)+'€ ce mois · '+depItems.length+' achats'},
  ];

  function cardExpand(id){
    if(id==='muscu'){
      const muscuByTypeHtml=muscuByType.length?muscuByType.map(function(mt){
        return'<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bd)">'+
          '<span style="font-size:13px">'+mt.l+'</span>'+
          '<span style="font-size:14px;font-weight:700;color:'+mt.col+'">'+mt.count+' séance'+(mt.count!==1?'s':'')+'</span>'+
        '</div>';
      }).join(''):'<div style="text-align:center;font-size:12px;color:var(--t2);padding:12px">Aucune séance ce mois</div>';
      return'<div style="padding:10px 12px;border-top:1px solid var(--bd)">'+
        '<div style="font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">Répartition sur 30 jours</div>'+
        muscuByTypeHtml+
        '<div style="margin-top:8px;font-size:11px;color:var(--t3)">Total : '+muscuTotal+' séance'+(muscuTotal!==1?'s':'')+' sur '+lastDay+' jours</div>'+
      '</div>';
    }
    if(id==='macros'){return renderMacroExpand(ym,monthDays,last30);}
    if(id==='depenses'){return renderDepensesExpand(ym,monthDays,depItems,depTotal);}
    if(id==='work'){
      var last7d=[];for(var _j=6;_j>=0;_j--)last7d.push(addDays(td,-_j));
      var wkTotal=last7d.reduce(function(a,d2){return a+(getDay(d2).learning||0);},0);
      var boxes=last7d.map(function(d2){
        var v2=getDay(d2).learning||0;
        var dn2=parseInt(d2.split('-')[2]),mo2=parseInt(d2.split('-')[1]);
        var bg2=v2<=0?'rgba(255,255,255,.06)':v2>=2?'#145214':v2>=1?'var(--green)':'var(--pink)';
        var tc2=v2<=0?'rgba(255,255,255,.25)':v2>=1?'#000':'#fff';
        var bdr=d2===td?'outline:2px solid var(--cyan);outline-offset:1px;':'';
        var lbl=v2>0?'<div style="font-size:10px;color:'+tc2+';margin-top:1px">'+v2+'h</div>':'<div style="font-size:9px;color:rgba(255,255,255,.2);margin-top:1px">—</div>';
        return'<div onclick="gotoDate(\'"+d2+"\'");" style="flex:1;padding:7px 4px;background:'+bg2+';border-radius:8px;text-align:center;cursor:pointer;'+bdr+'"><div style="font-size:10px;font-weight:700;color:'+tc2+'">'+dn2+'/'+mo2+'</div>'+lbl+'</div>';

      var aeHtml=aes.length?aes.map(function(e){var dn3=e.date.slice(5).replace('-','/');return'<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bd)"><div><div style="font-size:13px;font-weight:500">'+(e.subject||'—')+'</div><div style="font-size:11px;color:var(--t2);margin-top:1px">'+dn3+'</div></div><div style="font-size:13px;font-weight:700;color:var(--yellow)">'+e.hours+'h</div></div>';}).join(''):'<div style="text-align:center;font-size:12px;color:var(--t2);padding:8px">Aucun cours enregistré</div>';
      return'<div style="padding:10px 12px;border-top:1px solid var(--bd)"><div style="font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">7 derniers jours</div><div style="display:flex;gap:5px;margin-bottom:10px">'+boxes+'</div><div style="background:var(--c2);border-radius:9px;padding:8px 11px;display:flex;justify-content:space-between;margin-bottom:10px"><span style="font-size:12px;color:var(--t2)">Total semaine</span><span style="font-size:13px;font-weight:700;color:var(--yellow)">'+wkTotal+'h / '+S.objectives.learning+'h</span></div><div style="font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">Historique</div>'+aeHtml+'</div>';
    }
    if(id==='sleep'){
      var sleepDays=last30.filter(function(d2){return(getDay(d2).sleep||0)>0;});
      var sleepAvg=sleepDays.length?Math.round(sleepDays.reduce(function(a,d2){return a+(getDay(d2).sleep||0);},0)/sleepDays.length*10)/10:0;
      var sleepOkCnt=last30.filter(function(d2){return(getDay(d2).sleep||0)>=S.objectives.sleep;}).length;
      var last7s=[];for(var _s=6;_s>=0;_s--)last7s.push(addDays(td,-_s));
      var sBoxes=last7s.map(function(d2){
        var v2=getDay(d2).sleep||0;
        var dn2=parseInt(d2.split('-')[2]),mo2=parseInt(d2.split('-')[1]);
        var bg2=v2<=0?'rgba(255,255,255,.06)':v2>=7?'var(--green)':v2>=5.5?'var(--orange)':'var(--pink)';
        var tc2=v2<=0?'rgba(255,255,255,.25)':'#fff';
        var bdr=d2===td?'outline:2px solid var(--cyan);outline-offset:1px;':'';
        return'<div onclick="gotoDate(\'"+d2+"\'");" style="flex:1;padding:7px 4px;background:'+bg2+';border-radius:8px;text-align:center;cursor:pointer;'+bdr+'"><div style="font-size:10px;font-weight:700;color:'+tc2+'">'+dn2+'/'+mo2+'</div>'+(v2>0?'<div style="font-size:10px;color:'+tc2+';margin-top:1px">'+v2+'h</div>':'<div style="font-size:9px;color:rgba(255,255,255,.2);">—</div>')+'</div>';

// ── iOS/Safari lifecycle: save on background ────────────────────
(function(){
  function _emergencySave(){
    try{
      localStorage.setItem('nc_v6',JSON.stringify({
        log:S.log,cm:S.cm,goals:S.goals,profile:S.profile,
        fav:S.fav,objectives:S.objectives,autoMeals:S.autoMeals,
        user:S.user,dietMode:S.dietMode
      }));
    }catch(e){}
  }
  // pagehide: fired on iOS when app goes to background or is closed
  window.addEventListener('pagehide',function(){
  _emergencySave();
  // Tente une sync rapide avant fermeture (fire-and-forget)
  if(S.user&&S.user.id&&sbClient){
    try{sbClient.from('nutricore_data').upsert({
      user_id:S.user.id,
      data:JSON.stringify({log:S.log,cm:S.cm,goals:S.goals,profile:S.profile,fav:S.fav,objectives:S.objectives,autoMeals:S.autoMeals,dietMode:S.dietMode}),
      updated_at:new Date().toISOString()
    },{onConflict:'user_id'});}catch(e){}
  }
});
  // visibilitychange: fired when tab/app loses focus
  document.addEventListener('visibilitychange',function(){
    if(document.visibilityState==='visible'){
      if(S.user&&S.user.id&&window._startSyncPoll)window._startSyncPoll();
      // Pull immédiat depuis Supabase quand la page redevient visible
      if(S.user&&S.user.id&&sbClient){
        loadFromSupabase().then(function(ok){if(ok)render();});
      }
      return;
    }
    if(document.visibilityState==='hidden'){
      const _td=today();
      if(S.log&&S.log[_td]){
        const _sls=['breakfast','lunch','dinner','snacks','drinks'];
        if(_sls.some(function(s){return(S.log[_td][s]||[]).length>0;})){
          S.log[_td]._savedAt=Date.now();
        }
      }
      _emergencySave();
      // Force sync immédiat avant mise en arrière-plan
      clearTimeout(_syncDebounce);
      if(S.user&&S.user.id)syncToSupabase();
    }
  });
  // pageshow with persisted=true: iOS restored from bfcache → reload from storage
  window.addEventListener('pageshow',function(e){
    if(e.persisted){
      try{
        const d=JSON.parse(localStorage.getItem('nc_v6')||'{}');
        if(d.log)S.log=d.log;
        if(d.cm&&d.cm.length)S.cm=d.cm;
        if(d.goals)S.goals=d.goals;
        render();
      }catch(ex){}
    }
    // Quelle que soit la raison du pageshow: re-sync depuis Supabase
    if(S.user&&S.user.id&&sbClient){
      setTimeout(function(){loadFromSupabase().then(function(ok){if(ok)render();});},500);
    }
  });
})();


// ── Auto-pull: refresh data from Supabase every 60s ──────────────
(function(){
  var _pollInterval=null;
  function _startPoll(){
    if(_pollInterval)return;
    _pollInterval=setInterval(async function(){
      if(!S.user?.id||!sbClient)return;
      try{
        const{data:row}=await sbClient.from('nutricore_data')
          .select('data,updated_at').eq('user_id',S.user.id).single()
          .catch(function(){return{data:null};});
        if(!row||!row.data)return;
        const rd=JSON.parse(row.data);
        if(!rd.log)return;
        // Only re-render if remote has more data than local
        let changed=false;
        const slots=['breakfast','lunch','dinner','snacks','drinks'];
        Object.keys(rd.log).forEach(function(day){
          const rl=rd.log[day];
          const ll=S.log[day];
          if(!ll){S.log[day]=rl;changed=true;return;}
          slots.forEach(function(s){
            const rn=(rl[s]||[]).length, ln=(ll[s]||[]).length;
            if(rn>ln){
              if(!ll[s])ll[s]=[];
              const lIds=ll[s].map(function(x){return x.foodId+':'+x.qty;});
              (rl[s]||[]).forEach(function(ri){
                if(!lIds.includes(ri.foodId+':'+ri.qty)){ll[s].push(ri);changed=true;}
              });
            }
          });
          if((rl.steps||0)>(ll.steps||0)){ll.steps=rl.steps;changed=true;}
          if((rl.sleep||0)>(ll.sleep||0)){ll.sleep=rl.sleep;changed=true;}
        });
        if(changed){
          localStorage.setItem('nc_v6',JSON.stringify({
            log:S.log,cm:S.cm,goals:S.goals,profile:S.profile,
            fav:S.fav,objectives:S.objectives,autoMeals:S.autoMeals,
            user:S.user,dietMode:S.dietMode
          }));
          render();
        }
      }catch(e){}
    },60000); // every 60 seconds
  }
  function _stopPoll(){clearInterval(_pollInterval);_pollInterval=null;}
  // Start polling when user is logged in
  document.addEventListener('visibilitychange',function(){
    if(document.visibilityState==='visible'&&S.user?.id)_startPoll();
    else _stopPoll();
  });
  // Also start on page show
  window.addEventListener('pageshow',function(){
    if(S.user?.id)setTimeout(_startPoll,3000);
  });
  // Export for use after login
  window._startSyncPoll=_startPoll;
  window._stopSyncPoll=_stopPoll;
})();

loadS();render();checkExistingSession();
</script>

// ── DATE HELPERS ────────────────────────────────────────
function today(){
  const n=new Date();
  return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
}
function addDays(dateStr,n){
  const [y,m,d]=dateStr.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  dt.setDate(dt.getDate()+n);
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
}
function fmtD(d){
  const [y,m,dn]=d.split('-').map(Number);
  const td=today();
  const diff=Math.round((new Date(today().split('-')[0],today().split('-')[1]-1,today().split('-')[2])-new Date(y,m-1,dn))/864e5);
  if(diff===0)return["Aujourd'hui",""];
  if(diff===1)return["Hier",""];
  if(diff===-1)return["Demain",""];
  const dt=new Date(y,m-1,dn);
  return[dt.toLocaleDateString('fr-FR',{weekday:'long'}),dt.toLocaleDateString('fr-FR',{day:'numeric',month:'long'})];
}
function monthLabel(ym){
  const [y,m]=ym.split('-').map(Number);
  const dt=new Date(y,m-1,1);
  return dt.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
}
function daysInMonth(ym){
  const [y,m]=ym.split('-').map(Number);
  return new Date(y,m,0).getDate();
}
function firstDowOfMonth(ym){
  const [y,m]=ym.split('-').map(Number);
  return(new Date(y,m-1,1).getDay()+6)%7;
}
function calcBMR(pr){return Math.round(10*pr.w+6.25*pr.h-5*pr.age+5)}

}
function confirmEditFood(date,slot,idx){
  const qty=parseInt(document.getElementById('edit-qty-in')?.value)||0;
  const it=getDay(date)[slot][idx];
  const fd=FOODS.find(x=>x.id===it.foodId);
  if(qty>0)it.qty=qty;
  if(fd&&fd.cheatMeal){
    const note=document.getElementById('edit-cheat-note')?.value?.trim();
    const ens=document.getElementById('edit-cheat-enseigne')?.value?.trim();
    const cost=parseFloat(document.getElementById('edit-cheat-cost')?.value)||0;
    if(note)it.note=note; else delete it.note;
    if(ens)it.enseigne=ens; else delete it.enseigne;
    if(cost>0)it.cost=cost; else delete it.cost;
  }
  saveS();closeM('editmodal');render();
}

function confirmEditSession(idx){
  const s=getDay(S.date).sessions[idx];if(!s)return;
  const dur=parseFloat(document.getElementById('se_dur')?.value)||s.duration;
  s.duration=dur;
  if(s.type==='cardio'){
    const spd=parseFloat(document.getElementById('se_spd')?.value)||s.speed;
    s.speed=spd;s.distance=parseFloat((spd*dur/60).toFixed(2));
    s.kcal=Math.round(getRunMET(spd)*S.profile.w*(dur/60));
  } else if(s.type==='stair'){
    const steps=parseInt(document.getElementById('se_steps')?.value)||s.steps||0;
    s.steps=steps;s.kcal=Math.round(steps*0.17*(S.profile.w/70));
  } else {
    const kcal=parseInt(document.getElementById('se_kcal')?.value)||s.kcal;
    s.kcal=kcal;
  }
  saveS();closeM('sessedit');render();
}

async function syncToSupabase(){
  initSB();if(!sbClient||!S.user?.id)return;
  try{
    const payload={
      user_id:S.user.id,
      data:JSON.stringify({log:S.log,cm:S.cm,goals:S.goals,profile:S.profile,fav:S.fav,objectives:S.objectives,autoMeals:S.autoMeals}),
      updated_at:new Date().toISOString()
    };

async function loadFromSupabase(){
  if(!sbClient||!S.user?.id)return false;
  try{
    const{data,error}=await sbClient.from('nutricore_data').select('data').eq('user_id',S.user.id).single();
    if(error||!data)return false;
    const d=JSON.parse(data.data);
    if(d.log)S.log=d.log;
    if(d.cm&&d.cm.length)S.cm=d.cm;
    if(d.goals)S.goals=d.goals;
    if(d.profile)S.profile=d.profile;
    if(d.fav)S.fav=d.fav;
    if(d.objectives)S.objectives=d.objectives;
    if(d.autoMeals)S.autoMeals=d.autoMeals;
    // Sauvegarder localement SANS déclencher un nouveau sync vers Supabase
    localStorage.setItem('nc_v6',JSON.stringify({
      log:S.log,cm:S.cm,goals:S.goals,profile:S.profile,
      fav:S.fav,objectives:S.objectives,autoMeals:S.autoMeals,user:S.user
    }));
    return true;
  }catch(e){console.warn('Load failed:',e);return false;}
}

function areaChart(arr, opts={}) {
  const W = 600, H = 110;
  const data = arr.map(v => v == null ? null : v);
  const validData = data.filter(v => v != null && !isNaN(v));
  if (validData.length === 0) {
    return `<svg class="chart-svg area-path" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><text x="${W/2}" y="${H/2}" text-anchor="middle" fill="#5a5a5a" font-family="IBM Plex Mono" font-size="11" letter-spacing="2">NO DATA</text></svg>`;
  }
  const max = Math.max(opts.target || 0, ...validData) * 1.1 || 1;
  const min = opts.allowNull ? Math.min(...validData) * 0.95 : 0;
  const range = (max - min) || 1;
  const stepX = data.length > 1 ? W/(data.length-1) : W;

  // Build segments (skip null)
  const segments = [];
  let cur = [];
  data.forEach((v, i) => {
    if (v == null) {
      if (cur.length) segments.push(cur);
      cur = [];
    } else {
      cur.push({ x: i*stepX, y: H - ((v-min)/range)*H });
    }
  });
  if (cur.length) segments.push(cur);

  // Smooth path builder
  function smoothPath(pts) {
    if (pts.length === 0) return '';
    if (pts.length === 1) return `M ${pts[0].x},${pts[0].y}`;
    let p = `M ${pts[0].x.toFixed(1)},${pts[0].y.toFixed(1)}`;
    for (let i = 1; i < pts.length; i++) {
      const prev = pts[i-1], curr = pts[i];
      const dx = curr.x - prev.x;
      const c1x = prev.x + dx * 0.4;
      const c2x = curr.x - dx * 0.4;
      p += ` C ${c1x.toFixed(1)},${prev.y.toFixed(1)} ${c2x.toFixed(1)},${curr.y.toFixed(1)} ${curr.x.toFixed(1)},${curr.y.toFixed(1)}`;
    }
    return p;
  }

  const grad = opts.gradId || 'kcal';
  const targetY = opts.target ? H - ((opts.target - min)/range)*H : null;

  // Render segments
  const paths = segments.map(seg => {
    if (seg.length === 0) return '';
    const linePath = smoothPath(seg);
    const areaPath = linePath + ` L ${seg[seg.length-1].x.toFixed(1)},${H} L ${seg[0].x.toFixed(1)},${H} Z`;
    return `<path d="${areaPath}" fill="url(#areaG_${grad})"/><path d="${linePath}" fill="none" stroke="url(#lineG_${grad})" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#chartGlow)"/>`;
  }).join('');

  // Single-point dots for isolated values
  const dots = segments.filter(s => s.length === 1).map(s => `<circle cx="${s[0].x.toFixed(1)}" cy="${s[0].y.toFixed(1)}" r="3" fill="#FF8C00" filter="url(#chartGlow)"/>`).join('');

  return `<svg class="chart-svg area-path" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs>
      <linearGradient id="areaG_${grad}" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#FFB347" stop-opacity="0.55"/>
        <stop offset="50%" stop-color="#FF8C00" stop-opacity="0.30"/>
        <stop offset="100%" stop-color="#B92D2D" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="lineG_${grad}" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#FFB347"/>
        <stop offset="100%" stop-color="#FF8C00"/>
      </linearGradient>
      <filter id="chartGlow" x="-20%" y="-50%" width="140%" height="200%">
        <feGaussianBlur stdDeviation="2" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <g stroke="#1a1a1a" stroke-width="1">
      <line x1="0" y1="${(H/3).toFixed(0)}" x2="${W}" y2="${(H/3).toFixed(0)}"/>
      <line x1="0" y1="${(2*H/3).toFixed(0)}" x2="${W}" y2="${(2*H/3).toFixed(0)}"/>
    </g>
    ${targetY != null ? `<line x1="0" y1="${targetY.toFixed(1)}" x2="${W}" y2="${targetY.toFixed(1)}" stroke="#FF8C00" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.4"/>` : ''}
    ${paths}
    ${dots}
  </svg>`;
}

function lineChart(arr, opts={}) {
  return areaChart(arr, opts);

function stepsHistoryChart() {
  // Build last 30 days steps data (oldest first → newest last)
  const target = S.goals.steps || 7000;
  const days = [];
  const refDate = dateFrom(S.date);
  for (let i = 29; i >= 0; i--) {
    const d = new Date(refDate);
    d.setDate(d.getDate() - i);
    const ds = ymd(d);
    const log = S.log[ds];
    days.push({
      date: ds,
      day: d.getDate(),
      steps: (log && log.steps) || 0,
    });
  }
  const max = Math.max(target * 1.2, ...days.map(x => x.steps), 1);
  const hasAny = days.some(x => x.steps > 0);
  if (!hasAny) {
    return '<div class="slot-empty">— No steps logged in last 30 days —</div>';
  }
  return `<div class="steps-history">
    ${days.map(x => {
      const pct = (x.steps / max) * 100;
      let color = 'low';
      if (x.steps >= 7000) color = 'good';
      else if (x.steps >= 5000) color = 'mid';
      const k = Math.floor(x.steps / 1000);
      const label = x.steps > 0 ? `${k}K` : '·';
      return `<div class="sh-row" title="${x.date} · ${fmt(x.steps)} pas">
        <div class="sh-day mono">${String(x.day).padStart(2,'0')}</div>
        <div class="sh-bar-wrap">
          <div class="sh-bar sh-${color}" style="width:${Math.max(pct, 2)}%"></div>
          <span class="sh-val mono">${label}</span>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderSession(sp, i) {
  let label='', meta='';
  if (sp.type === 'cardio') {
    label = 'CARDIO';
    meta = `${sp.minutes}min · ${sp.speed}km/h · ${fmt1(sp.km)}km${sp.hr?` · HR ${sp.hr}`:''}`;
  } else if (sp.type === 'stairs') {
    label = 'STAIRS';
    meta = `${sp.minutes}min · ${sp.steps} steps`;
  } else if (sp.type === 'muscu') {
    label = 'MUSCLE';
    const g = MUSCU_GROUPS.find(x => x.k === sp.group);
    meta = g ? g.name : sp.group;
  }
  return `<div class="session">
    <div class="s-type mono">${label}</div>
    <div class="s-name">${meta}</div>
    <div class="s-kcal tab-num">${fmt(sp.kcal)}<span class="unit">k</span></div>

      <button data-act="delSport" data-i="${i}" aria-label="delete">${I.x}</button>
    </div>
  </div>`;
}

      <button class="iconbtn" data-act="closeSheet">${I.x}</button>
    </div>
    <div class="sheet-body">
      <div style="padding: 18px">
        <span class="label">SESSIONS DU JOUR (TOTAL ${fmt1(learnTotal(day))}H)</span>
        <div style="margin-top: 12px">
          ${(day.learning||[]).map((s,i) => `<div class="learn-row">
            <div class="topic">${s.topic||'—'}</div>
            <div class="h">${fmt1(s.h)}H</div>
            <button class="iconbtn" data-act="delLearn" data-i="${i}">${I.x}</button>
          </div>`).join('')}
        </div>
        <div style="margin-top: 18px">
          <span class="label">NOUVELLE SESSION</span>
          <div class="row" style="margin-top: 8px; gap: 8px">
            <input type="text" placeholder="SUJET" value="${ctx.topic||''}" data-act="learnField" data-key="topic">
            <input type="number" placeholder="H" value="${ctx.h||''}" data-act="learnField" data-key="h" inputmode="decimal" style="max-width: 100px">
          </div>
          <button class="btn full primary" style="margin-top: 12px" data-act="addLearn">+ AJOUTER</button>
        </div>
      </div>
    </div>
  `;
}

function sheetDiag() {
  const raw = localStorage.getItem(STORE_KEY) || '';
  const sizeKB = (raw.length/1024).toFixed(1);
  const days = Object.keys(S.log).length;
  const entries = Object.values(S.log).reduce((a, d) => a + Object.values(d.meals||{}).flat().length, 0);
  return `
    <div class="sheet-h"><div class="h-md">DIAGNOSTIC</div><button class="iconbtn" data-act="closeSheet">${I.x}</button></div>
    <div class="sheet-body">
      <div style="padding: 18px" class="stack">
        <div><span class="label-sm dim">TAILLE LOCAL STORAGE</span><div class="h-md">${sizeKB} KB</div></div>
        <div><span class="label-sm dim">JOURS LOGGÉS</span><div class="h-md">${days}</div></div>
        <div><span class="label-sm dim">ENTRÉES TOTALES</span><div class="h-md">${entries}</div></div>
        <div><span class="label-sm dim">DERNIÈRE SAUVEGARDE</span><div class="mono">${S._savedAt ? new Date(S._savedAt).toISOString() : '—'}</div></div>
        <div><span class="label-sm dim">SUPABASE</span><div class="mono">— Non connecté dans ce build —</div></div>
        <div style="margin-top: 14px;padding: 12px;border:1px solid var(--line-mid)">
          <span class="label-sm">⚠ ANGLE MORT V2</span>
          <div class="body dim" style="margin-top:6px">
            Tout le log est dans une seule cellule JSON. Au-delà de ~1MB (1-2 ans de log dense), 
            créer une table <span class="mono">nc_logs(user_id, date, data jsonb)</span> avec une ligne par jour.
          </div>
        </div>
      </div>
    </div>
  `;
}

// =======================================================
// EVENT DELEGATION
// =======================================================
document.addEventListener('click', (ev) => {
  const target = ev.target.closest('[data-act]');
  if (!target) return;
  const act = target.dataset.act;
  // For closeSheet on the overlay (.sheet-overlay) only: ignore if click bubbled from inside .sheet
  if (act === 'closeSheet' && target.classList.contains('sheet-overlay')) {
    if (ev.target.closest('[data-stop="1"]')) return;
  }
  handleAction(act, target, ev);
});
document.addEventListener('input', (ev) => {
  const target = ev.target.closest('[data-act]');
  if (!target) return;
  const act = target.dataset.act;
  if (['searchInput','setQtyInput','editQtyInput','sportFieldInput','editSportField','cheatField','cheatEntryField','cmField','amField','learnField','inputModalVal','updateProfile','updateGoal','updateWeight','newFoodField','cmiSearchInput','onbInput','authEmail','authPassword','authCfgUrl','authCfgKey'].includes(act)) {
    handleAction(act, target, ev);
  }
});
document.addEventListener('change', (ev) => {
  const target = ev.target.closest('[data-act]');
  if (!target) return;
  const act = target.dataset.act;
  if (act === 'amField') handleAction(act, target, ev);
});

function handleAction(act, el, ev) {
  const { dataset } = el;

  switch (act) {
    // NAV
    case 'go': go(dataset.view, true); return;
    case 'back': back(); return;
    case 'goProfile': go('profile'); return;
    case 'goCheatHistory': go('historyCheat'); return;

    // DAY NAV
    case 'prevDay': S.date = shiftDay(S.date, -1); render(true); return;
    case 'nextDay': S.date = shiftDay(S.date, 1); render(true); return;
    case 'today':   S.date = todayStr(); render(true); return;

    // SLOTS
    case 'toggleSlot': S.openSlots[dataset.slot] = !S.openSlots[dataset.slot]; save(); render(); return;
    case 'toggleSection': render(); return;

    // OBJECTIVES
    case 'objTap': openObjModal(dataset.kind); return;

    // FOOD ADD FLOW
    case 'openAddFood':
      S.sheet = { type: 'foodPicker', ctx: { slot: dataset.slot, q: '', cat: 'all' } };
      render(); return;
    case 'searchInput':
      S.sheet.ctx.q = el.value;
      // Targeted re-render of list only (keep input focused)
      rerenderFoodList(); return;
    case 'filterCat':
      S.sheet.ctx.cat = dataset.cat;
      render(); return;
    case 'pickFood':
      const fid = +dataset.id;
      const slot = S.sheet.ctx.slot;
      if (fid === 0) {
        S.sheet = { type: 'foodDetail', ctx: { id: 0, slot, kcal: 1000, desc:'', enseigne:'', cost: 0 } };
      } else {
        const f = getFood(fid);
        const defQ = f.portions[0] ? f.portions[0][1] : (f.isFixed ? 1 : 100);
        S.sheet = { type: 'foodDetail', ctx: { id: fid, slot, q: defQ } };
      }
      render(); return;
    case 'setQty': S.sheet.ctx.q = +dataset.q; rerenderQty(); return;
    case 'qtyDelta': S.sheet.ctx.q = Math.max(1, (S.sheet.ctx.q||0) + +dataset.d); rerenderQty(); return;
    case 'setQtyInput': S.sheet.ctx.q = +el.value || 0; rerenderPreview(); return;
    case 'addEntry': {
      const c = S.sheet.ctx;
      const day = curDay();
      day.meals[c.slot].push({ fid: c.id, q: c.q, t: Date.now() });
      trackRecentFood(c.id);
      S.sheet = null; save();
      const f = getFood(c.id);
      toast(`+ ${f.n.toUpperCase()}`);
      render(); return;
    }
    case 'quickAddDrink': {
      const fid = +dataset.id;
      const slot = dataset.slot;
      const f = getFood(fid);
      if (!f) return;
      // Default qty: water = 500ml (one bottle / gourde), tomato juice = 200ml, whey = 1 dose
      let qty;
      if (f.isFixed) qty = 1;
      else if (f.n === 'Eau') qty = 500;
      else if (f.n.toLowerCase().includes('tomate')) qty = 200;
      else qty = 100;
      const day = curDay();
      day.meals[slot].push({ fid, q: qty, t: Date.now() });
      trackRecentFood(fid);
      // Auto-open slot
      S.openSlots[slot] = true;
      save();
      toast(`+ ${f.n.toUpperCase()}`);
      render(); return;
    }
    case 'cheatField': S.sheet.ctx[dataset.key] = el.type==='number' ? (+el.value||0) : el.value; rerenderCheat(); return;
    case 'cheatKcal': S.sheet.ctx.kcal = Math.max(0, (S.sheet.ctx.kcal||0) + +dataset.d); render(); return;
    case 'addCheat': {
      const c = S.sheet.ctx;
      const day = curDay();
      day.meals[c.slot].push({ cheat: true, kcal: c.kcal||0, desc: c.desc||'', enseigne: c.enseigne||'', cost: +c.cost||0, t: Date.now() });
      S.sheet = null; save();
      toast('+ CHEAT MEAL');
      render(); return;
    }
    case 'toggleFav': {
      const id = +dataset.id;
      const idx = S.favorites.indexOf(id);
      if (idx >= 0) S.favorites.splice(idx, 1); else S.favorites.push(id);
      save(); render(); return;
    }
    case 'closeSheet': S.sheet = null; render(); return;
    case 'newFoodOpen': {
      // Open new food creation sheet, prefilled with search query if any
      const slot = S.sheet?.ctx?.slot;
      const q = dataset.q || S.sheet?.ctx?.q || '';
      S._prevSheet = S.sheet ? { ...S.sheet, ctx: { ...S.sheet.ctx } } : null;
      S.sheet = { type: 'newFood', ctx: { n: q, p:'', g:'', l:'', cat: 'prot', slot } };
      render(); return;
    }
    case 'newFoodField':
      S.sheet.ctx[dataset.key] = el.type === 'number' ? (el.value === '' ? '' : +el.value) : el.value;
      rerenderNewFoodPreview(); return;
    case 'newFoodCat':
      S.sheet.ctx.cat = dataset.cat; render(); return;
    case 'saveNewFood': {
      const c = S.sheet.ctx;
      const name = (c.n || '').trim();
      if (!name) { toast('NOM REQUIS', true); return; }
      const p = +c.p||0, g = +c.g||0, l = +c.l||0;
      if (p === 0 && g === 0 && l === 0) { toast('SAISIR P/G/L', true); return; }
      const kcal = Math.round(p*4 + g*4 + l*9);
      // Build new food, ensure unique id
      const maxId = FOODS.reduce((m, f) => Math.max(m, f.id), 0);
      const nf = {
        id: maxId + 1,
        n: name,
        p, g, l,
        kcal,
        cat: c.cat || 'prot',
        portions: [['100G', 100]],
        custom: true,
      };
      // Persist to S.customFoods and rebuild FOODS
      S.customFoods = S.customFoods || [];
      S.customFoods.push(nf);
      FOODS.push(nf);
      // Add to current slot directly, default qty 100
      if (c.slot) {
        const day = curDay();
        day.meals[c.slot].push({ fid: nf.id, q: 100, t: Date.now() });
        trackRecentFood(nf.id);
      }
      S.sheet = null; save();
      toast(`+ ${name.toUpperCase()}`);
      render(); return;
    }
    case 'backSheet':
      if (S.sheet && S.sheet.type === 'foodDetail') {
        S.sheet = { type: 'foodPicker', ctx: { slot: S.sheet.ctx.slot, q:'', cat: 'all' } };
      } else if (S.sheet && S.sheet.type === 'newFood') {
        S.sheet = S._prevSheet || { type: 'foodPicker', ctx: { slot: S.sheet.ctx.slot, q:'', cat: 'all' } };
        S._prevSheet = null;
      } else if (S.sheet && S.sheet.type === 'cmAddItem') {
        S.sheet = { type: 'newCM', ctx: S._cmCtx };
      } else {
        S.sheet = null;
      }
      render(); return;

    // EDIT ENTRY
    case 'editEntry':
      S.sheet = { type: 'editEntry', ctx: { slot: dataset.slot, i: +dataset.i } };
      render(); return;
    case 'editQtyInput': {
      const { slot, i } = S.sheet.ctx;
      curDay().meals[slot][i].q = Math.max(0, +el.value||0);
      save(); rerenderPreview(); return;
    }
    case 'editQtyDelta': {
      const { slot, i } = S.sheet.ctx;
      const e = curDay().meals[slot][i];
      e.q = Math.max(0, e.q + +dataset.d);
      save();
      // Update only the input field + preview, no full re-render
      const sheet = document.querySelector('.sheet');
      if (sheet) {
        const inp = sheet.querySelector('input[data-act="editQtyInput"]');
        if (inp && document.activeElement !== inp) inp.value = e.q;
      }
      rerenderPreview();
      return;
    }
    case 'cheatEntryField': {
      const { slot, i } = S.sheet.ctx;
      const e = curDay().meals[slot][i];
      e[dataset.key] = el.type==='number' ? (+el.value||0) : el.value;
      save(); return;
    }
    case 'delEntry': {
      curDay().meals[dataset.slot].splice(+dataset.i, 1);
      save(); render(); toast('SUPPRIMÉ'); return;
    }

    // QUICK CUSTOM MEAL FROM SLOT
    case 'addCustomMeal': {
      addCustomMealToSlot(dataset.meal, dataset.slot);
      return;
    }
    case 'openCustomPicker':
      S._pendingSlot = dataset.slot;
      S.sheet = { type: 'customPicker', ctx: {} };
      render(); return;
    case 'pickCustomMeal':
      addCustomMealToSlot(dataset.id, S._pendingSlot);
      return;

    // CALENDAR
    case 'calPrev': shiftCal(-1); return;
    case 'calNext': shiftCal(1); return;
    case 'pickDay': {
      const d = dataset.d;
      if (d > todayStr()) { toast('JOUR FUTUR', true); return; }
      S.date = d; go('home'); return;
    }

    // STATS
    case 'statsPrev': shiftStats(-1); return;
    case 'statsNext': shiftStats(1); return;
    case 'statsToday': resetStatsToToday(); return;

    // ACTIVITY
    case 'addCardio': S.sheet = { type:'cardio', ctx: { minutes: 30, speed: 9, hr: '' } }; render(); return;
    case 'addStairs': S.sheet = { type:'stairs', ctx: { minutes: 10, steps: 200 } }; render(); return;
    case 'addMuscu':  S.sheet = { type:'muscu',  ctx: {} }; render(); return;
    case 'sportField': S.sheet.ctx[dataset.key] = Math.max(0, (+S.sheet.ctx[dataset.key]||0) + +dataset.d); render(); return;
    case 'sportFieldInput': S.sheet.ctx[dataset.key] = el.value === '' ? '' : +el.value; rerenderSportPreview(); return;
    case 'saveSport': {
      const t = dataset.type;
      const ctx = S.sheet.ctx;
      const day = curDay();
      let session = { type: t, t: Date.now() };
      if (t === 'cardio') {
        const c = cardioCalc({ minutes: +ctx.minutes||0, speed: +ctx.speed||0 });
        session = { ...session, minutes: +ctx.minutes||0, speed: +ctx.speed||0, hr: +ctx.hr||null, kcal: c.kcal, km: c.km };
      } else if (t === 'stairs') {
        const c = stairsCalc({ minutes: +ctx.minutes||0, steps: +ctx.steps||0 });
        session = { ...session, minutes: +ctx.minutes||0, steps: +ctx.steps||0, kcal: c.kcal };
      }
      day.sport = day.sport || [];
      day.sport.push(session);
      S.sheet = null; save();
      toast(`+ ${t.toUpperCase()} ${fmt(session.kcal)} KCAL`);
      render(); return;
    }
    case 'saveMuscu': {
      const g = MUSCU_GROUPS.find(x => x.k === dataset.group);
      const day = curDay();
      day.sport = day.sport || [];
      day.sport.push({ type:'muscu', group: g.k, kcal: g.kcal, t: Date.now() });
      S.sheet = null; save();
      toast(`+ MUSCU ${g.name}`);
      render(); return;
    }
    case 'editSport':
      S.sheet = { type:'editSport', ctx:{ i: +dataset.i } };
      render(); return;
    case 'editSportField': {
      const { i } = S.sheet.ctx;
      const sp = curDay().sport[i];
      sp[dataset.key] = el.value === '' ? null : +el.value;
      // Recompute kcal except if user explicitly edits kcal
      if (dataset.key !== 'kcal') {
        if (sp.type === 'cardio') sp.kcal = cardioCalc({minutes: sp.minutes||0, speed: sp.speed||0}).kcal;
        if (sp.type === 'stairs') sp.kcal = stairsCalc({minutes: sp.minutes||0, steps: sp.steps||0}).kcal;
        if (sp.type === 'cardio') sp.km = cardioCalc({minutes: sp.minutes||0, speed: sp.speed||0}).km;
      }
      save(); return;
    }
    case 'delSport': {
      curDay().sport.splice(+dataset.i, 1);
      save(); render(); toast('SUPPRIMÉ'); return;
    }

    // PROFILE
    case 'updateProfile':
      S.profile[dataset.key] = +el.value||0;
      // Auto-recompute targets from new BMR/TDEE × current mode
      {
        const t = modeTargets(S.profile, S.mode);
        S.goals.kcal = t.kcal; S.goals.p = t.p; S.goals.g = t.g; S.goals.l = t.l;
      }
      save(); rerenderBmr(); rerenderGoalsInputs(); return;
    case 'setMode': S.mode = dataset.mode; {
        const t = modeTargets(S.profile, S.mode);
        S.goals.kcal = t.kcal; S.goals.p = t.p; S.goals.g = t.g; S.goals.l = t.l;
      } save(); render(); return;
    case 'applyMode': {
      const t = modeTargets(S.profile, S.mode);
      S.goals.kcal = t.kcal; S.goals.p = t.p; S.goals.g = t.g; S.goals.l = t.l;
      save(); render(); toast('OBJECTIFS APPLIQUÉS'); return;
    }
    case 'updateGoal': {
      const newVal = +el.value||0;
      const k = dataset.key;
      if (k === 'kcal' && newVal > 0) {
        // Capture baseline ONCE when user starts editing (uses focus marker)
        if (!el._baseline) {
          el._baseline = {
            kcal: S.goals.kcal,
            p: S.goals.p,
            g: S.goals.g,
            l: S.goals.l,
          };
          el.addEventListener('blur', () => { delete el._baseline; }, { once: true });
        }
        S.goals.kcal = newVal; // immediate kcal save
        if (window._kcalRuleTimer) clearTimeout(window._kcalRuleTimer);
        window._kcalRuleTimer = setTimeout(() => {
          const base = el._baseline;
          if (!base || base.kcal === 0) { save(); return; }
          const ratio = newVal / base.kcal;
          if (ratio > 0 && Math.abs(ratio - 1) > 0.01) {
            S.goals.p = Math.max(0, Math.round(base.p * ratio));
            S.goals.g = Math.max(0, Math.round(base.g * ratio));
            S.goals.l = Math.max(0, Math.round(base.l * ratio));
          }
          save();
          rerenderGoalsInputs();
        }, 600);
      } else {
        S.goals[k] = newVal;
        save();
      }
      return;
    }
    case 'updateWeight': {
      // Save current day weight + auto-update profile.w if today
      const v = +el.value || null;
      const day = curDay();
      day.weight = v;
      if (S.date === todayStr() && v) {
        S.profile.w = v;
        // Recompute targets based on new weight
        const t = modeTargets(S.profile, S.mode);
        S.goals.kcal = t.kcal; S.goals.p = t.p; S.goals.g = t.g; S.goals.l = t.l;
      }
      save(); return;
    }
    case 'manualSync': save(); if (S.user) syncCloud(); toast('SAUVEGARDÉ ✓'); return;

    // ONBOARDING
    case 'onbField':
      S._onboard = S._onboard || { w:75, h:175, a:25, sex:'m', goal:'cut' };
      S._onboard[dataset.key] = dataset.val;
      render(); return;
    case 'onbInput':
      S._onboard = S._onboard || { w:75, h:175, a:25, sex:'m', goal:'cut' };
      S._onboard[dataset.key] = +el.value || 0;
      // Light update — only refresh preview values
      const _p = S._onboard;
      const _bmrEl = document.querySelectorAll('.ob-prev-val')[0];
      const _tdeeEl = document.querySelectorAll('.ob-prev-val')[1];
      const _tgtEl = document.querySelectorAll('.ob-prev-val')[2];
      if (_bmrEl) _bmrEl.innerHTML = `${fmt(bmr(_p))}<span class="unit">kcal</span>`;
      if (_tdeeEl) _tdeeEl.innerHTML = `${fmt(tdee(_p))}<span class="unit">kcal</span>`;
      if (_tgtEl) _tgtEl.innerHTML = `${fmt(modeTargets(_p, _p.goal).kcal)}<span class="unit">kcal/j</span>`;
      return;
    case 'onbSubmit': {
      const ob = S._onboard || { w:75, h:175, a:25, sex:'m', goal:'cut' };
      if (!ob.w || !ob.h || !ob.a) { toast('TOUS LES CHAMPS REQUIS', true); return; }
      S.profile = { w: ob.w, h: ob.h, a: ob.a, sex: ob.sex };
      S.mode = ob.goal;
      const t = modeTargets(S.profile, S.mode);
      S.goals.kcal = t.kcal; S.goals.p = t.p; S.goals.g = t.g; S.goals.l = t.l;
      S.onboarded = true;
      delete S._onboard;
      save(); render(); toast('PROFIL CRÉÉ ✓'); return;
    }

    // EXPORT
    case 'exportOpen':
      S.sheet = { type: 'exportPicker', ctx: {} };
      render(); return;
    case 'selectExportMonth':
      S.sheet.ctx.month = dataset.m;
      render(); return;
    case 'doExport': {
      const m = dataset.m || S.sheet.ctx.month || todayStr().slice(0,7);
      exportMonthly(m);
      S.sheet = null; render();
      return;
    }

    // CLOUD AUTH
    case 'authOpen':
      S.sheet = { type: 'auth', ctx: { email: '' } };
      render(); return;
    case 'authEmail':
      S.sheet.ctx.email = el.value;
      return;
    case 'authCfgUrl':
      S.sheet.ctx.url = el.value.trim();
      return;
    case 'authCfgKey':
      S.sheet.ctx.anonKey = el.value.trim();
      return;
    case 'authShowSetup':
      S.sheet.ctx.showSetup = true;
      render(); return;
    case 'authSaveCfg': {
      const url = (S.sheet.ctx.url || '').trim();
      const key = (S.sheet.ctx.anonKey || '').trim();
      if (!url || !/^https:\/\/.+\.supabase\.co\/?$/.test(url)) {
        toast('URL SUPABASE INVALIDE', true); return;
      }
      if (!key || key.length < 100) { toast('CLÉ ANON INVALIDE', true); return; }
      try { localStorage.setItem('nc_supabase_cfg', JSON.stringify({ url, anonKey: key })); } catch (e) {}
      // Apply immediately
      CFG.supabase = { url, anonKey: key };
      // Reset flags so initCloud() runs again
      _sbReady = false; _sb = null;
      initCloud().then(() => {
        S.sheet.ctx.showSetup = false;
        render();
        toast('CONFIG SAUVÉE ✓');
      });
      return;
    }
    case 'authMagic': {
      const email = (S.sheet.ctx.email || '').trim();
      if (!email || !/@/.test(email)) { toast('EMAIL INVALIDE', true); return; }
      authMagicLink(email).then(ok => {
        if (ok) {
          S.sheet.ctx.sent = true;
          S.sheet.ctx.sentTo = email;
          render();
        }
      });
      return;
    }
    case 'authPassword':
      S.sheet.ctx.password = el.value;
      return;
    case 'authSetMode':
      S.sheet.ctx.authMode = dataset.m;
      render(); return;
    case 'authSignIn': {
      const email = (S.sheet.ctx.email || '').trim();
      const password = S.sheet.ctx.password || '';
      if (!email || !/@/.test(email)) { toast('EMAIL INVALIDE', true); return; }
      if (!password || password.length < 6) { toast('MOT DE PASSE TROP COURT', true); return; }
      if (!_sbReady) { toast('CONFIG SUPABASE MANQUANTE', true); return; }
      _sb.auth.signInWithPassword({ email, password }).then(({ data, error }) => {
        if (error) { toast('ERREUR : ' + (error.message || 'identifiants invalides'), true); return; }
        // session is set via onAuthStateChange listener (SIGNED_IN)
      });
      return;
    }
    case 'authSignUp': {
      const email = (S.sheet.ctx.email || '').trim();
      const password = S.sheet.ctx.password || '';
      if (!email || !/@/.test(email)) { toast('EMAIL INVALIDE', true); return; }
      if (!password || password.length < 6) { toast('MOT DE PASSE MIN 6 CARS', true); return; }
      if (!_sbReady) { toast('CONFIG SUPABASE MANQUANTE', true); return; }
      _sb.auth.signUp({ email, password }).then(({ data, error }) => {
        if (error) { toast('ERREUR : ' + (error.message || 'inscription échouée'), true); return; }
        if (data.user && data.session) {
          // Auto-confirmed (Supabase setting "Confirm email" disabled) → already signed in
          toast('COMPTE CRÉÉ ✓');
        } else if (data.user && !data.session) {
          // Email confirmation required
          S.sheet.ctx.sent = true;
          S.sheet.ctx.sentTo = email;
          S.sheet.ctx.confirmSignup = true;
          render();
        }
      });
      return;
    }
    case 'authResetPwd': {
      const email = (S.sheet.ctx.email || '').trim();
      if (!email || !/@/.test(email)) { toast('SAISIS TON EMAIL D\'ABORD', true); return; }
      if (!_sbReady) { toast('CONFIG SUPABASE MANQUANTE', true); return; }
      _sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.href }).then(({ error }) => {
        if (error) { toast('ERREUR : ' + error.message, true); return; }
        toast('LIEN DE RÉINITIALISATION ENVOYÉ ✓');
      });
      return;
    }
    case 'authOut':
      authSignOut(); return;

    // DIAG: dump session state to alert (so user can read it on mobile)
    case 'authDiag': {
      const stored = {};
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && (k.includes('sb-') || k.includes('nc-sb-'))) {
          const v = localStorage.getItem(k);
          stored[k] = v ? v.slice(0, 60) + '...' : '';
        }
      }
      const cfg = JSON.parse(localStorage.getItem('nc_supabase_cfg') || 'null');
      const lines = [
        'CFG saved: ' + (cfg ? 'YES (' + cfg.url + ')' : 'NO'),
        'Supabase ready: ' + _sbReady,
        'S.user: ' + (S.user ? S.user.email : 'NULL'),
        'Cloud status: ' + S._cloudStatus,
        'Cloud err: ' + (S._cloudErr || 'none'),
        'LocalStorage auth keys: ' + Object.keys(stored).join(', '),
        'Online: ' + navigator.onLine,
      ];
      if (_sbReady && _sb) {
        _sb.auth.getSession().then(({ data, error }) => {
          lines.push('getSession() → ' + (data?.session ? 'session present, expires '+ new Date(data.session.expires_at*1000).toLocaleString() : 'NO session'));
          if (error) lines.push('error: ' + error.message);
          alert(lines.join('\n'));
        });
      } else {
        alert(lines.join('\n'));
      }
      return;
    }

    case 'swReset': {
      // Unregister all SW + clear all caches + clear sb storage, then reload
      if (!confirm('Vider le cache PWA et recharger ? Tes données locales seront conservées.')) return;
      Promise.all([
        ('serviceWorker' in navigator) ? navigator.serviceWorker.getRegistrations().then(rs => Promise.all(rs.map(r => r.unregister()))) : Promise.resolve(),
        ('caches' in window) ? caches.keys().then(ks => Promise.all(ks.map(k => caches.delete(k)))) : Promise.resolve(),
      ]).then(() => {
        location.reload();
      });
      return;
    }
    case 'cloudPull':
      if (S.user) pullCloud().then(() => render()); return;
    case 'cloudPush':
      if (S.user) syncCloud(); return;
    case 'diag': S.sheet = { type:'diag', ctx:{} }; render(); return;
    case 'exportData': exportData(); return;
    case 'resetData':
      if (confirm('SUPPRIMER TOUTES LES DONNÉES LOCALES ?')) {
        localStorage.removeItem(STORE_KEY);
        location.reload();
      }
      return;

    // CUSTOM MEALS
    case 'newCustomMeal':
      S._cmCtx = { name:'', items:[] };
      S.sheet = { type:'newCM', ctx: S._cmCtx };
      render(); return;
    case 'editCustomMeal': {
      const m = S.customMeals.find(x => x.id === dataset.id);
      S._cmCtx = JSON.parse(JSON.stringify(m));
      S._cmCtx.editing = m.id;
      S.sheet = { type:'newCM', ctx: S._cmCtx };
      render(); return;
    }
    case 'cmField':
      S._cmCtx[dataset.key] = el.value;
      // No re-render needed for text input
      return;
    case 'cmAddItem':
      S.sheet = { type:'cmAddItem', ctx: { q:'', cat:'all' } };
      render(); return;
    case 'cmiSearchInput':
      S.sheet.ctx.q = el.value;
      rerenderFoodList(); return;
    case 'cmiFilterCat':
      S.sheet.ctx.cat = dataset.cat;
      render(); return;
    case 'cmiPickFood': {
      const f = getFood(+dataset.id);
      const defQ = f.portions[0] ? f.portions[0][1] : 100;
      S._cmCtx.items.push({ fid: f.id, q: defQ });
      S.sheet = { type:'newCM', ctx: S._cmCtx };
      render(); return;
    }
    case 'cmDelItem':
      S._cmCtx.items.splice(+dataset.i, 1);
      render(); return;
    case 'saveNewCM': {
      const ctx = S._cmCtx;
      if (!ctx.name || !ctx.items.length) { toast('NOM + AU MOINS 1 ALIMENT', true); return; }
      if (ctx.editing) {
        const idx = S.customMeals.findIndex(m => m.id === ctx.editing);
        S.customMeals[idx] = { id: ctx.editing, name: ctx.name, items: ctx.items };
      } else {
        S.customMeals.push({ id: 'cm_'+Date.now(), name: ctx.name.toUpperCase(), items: ctx.items });
      }
      S.sheet = null; save();
      toast(ctx.editing ? 'REPAS MODIFIÉ' : 'REPAS CRÉÉ');
      render(); return;
    }
    case 'delCustomMeal':
      if (!confirm('SUPPRIMER CE REPAS ?')) return;
      S.customMeals = S.customMeals.filter(m => m.id !== dataset.id);
      save(); render(); return;

    // AUTOMEALS
    case 'newAutoMeal':
      S._amCtx = { mealId: S.customMeals[0]?.id || '', slot: 'l', days: [0,1,2,3,4] };
      S.sheet = { type:'newAM', ctx: S._amCtx };
      render(); return;
    case 'amField':
      S._amCtx[dataset.key] = el.value;
      return;
    case 'amToggleDow': {
      const d = +dataset.d;
      const idx = S._amCtx.days.indexOf(d);
      if (idx >= 0) S._amCtx.days.splice(idx, 1); else S._amCtx.days.push(d);
      render(); return;
    }
    case 'saveNewAM': {
      const ctx = S._amCtx;
      if (!ctx.mealId) { toast('CHOISIR UN REPAS', true); return; }
      S.autoMeals.push({ id: 'am_'+Date.now(), mealId: ctx.mealId, slot: ctx.slot, days: ctx.days, on: true });
      S.sheet = null; save(); render(); toast('AUTO-MEAL CRÉÉ'); return;
    }
    case 'toggleAutoMeal': {
      const am = S.autoMeals.find(x => x.id === dataset.id);
      if (am) { am.on = !am.on; save(); render(); }
      return;
    }
    case 'toggleAutoDow': {
      const am = S.autoMeals.find(x => x.id === dataset.id);
      const d = +dataset.d;
      if (!am) return;
      const idx = am.days.indexOf(d);
      if (idx >= 0) am.days.splice(idx, 1); else am.days.push(d);
      save(); render(); return;
    }
    case 'delAutoMeal':
      if (!confirm('SUPPRIMER CET AUTO-MEAL ?')) return;
      S.autoMeals = S.autoMeals.filter(x => x.id !== dataset.id);
      save(); render(); return;

    // QUICK ADD (FAB)
    case 'quickAdd': {
      // Auto-pick slot by current hour:
      // 5h-11h → breakfast, 11h-15h → lunch, 15h-18h → snack,
      // 18h-23h → dinner, otherwise (late night) → snack
      const h = new Date().getHours();
      let openSlot = 's';
      if (h >= 5  && h < 11) openSlot = 'b';
      else if (h >= 11 && h < 15) openSlot = 'l';
      else if (h >= 15 && h < 18) openSlot = 's';
      else if (h >= 18 && h < 24) openSlot = 'd';
      else openSlot = 's';
      // Auto-open that slot in the home view
      S.openSlots[openSlot] = true;
      S.sheet = { type:'foodPicker', ctx: { slot: openSlot, q:'', cat:'all' } };
      render(); return;
    }

    // INPUT MODAL (for objectives)
    case 'inputModalVal': S.sheet.ctx.value = +el.value||0; return;
    case 'saveInputModal': {
      const ctx = S.sheet.ctx;
      const day = curDay();
      if (ctx.kind === 'steps')  day.steps = ctx.value;
      if (ctx.kind === 'sleep')  day.sleep = ctx.value;
      S.sheet = null; save(); render(); toast('ENREGISTRÉ'); return;
    }

    // LEARNING
    case 'learnField': S._learnCtx = S._learnCtx||{}; S._learnCtx[dataset.key] = el.value; S.sheet.ctx[dataset.key] = el.value; return;
    case 'addLearn': {
      const c = S.sheet.ctx;
      if (!c.topic || !c.h) { toast('SUJET + HEURES', true); return; }
      curDay().learning = curDay().learning || [];
      curDay().learning.push({ topic: c.topic, h: +c.h });
      S.sheet.ctx.topic = ''; S.sheet.ctx.h = '';
      save(); render(); toast('+ LEARNING'); return;
    }
    case 'delLearn':
      curDay().learning.splice(+dataset.i, 1);
      save(); render(); return;
  }
}

function openObjModal(kind) {
  const day = curDay();
  if (kind === 'steps') S.sheet = { type:'inputModal', ctx:{ label:'PAS', value: day.steps, kind:'steps' } };
  else if (kind === 'sleep') S.sheet = { type:'inputModal', ctx:{ label:'SOMMEIL (H)', value: day.sleep, kind:'sleep' } };
  else if (kind === 'learn') S.sheet = { type:'learning', ctx:{ topic:'', h:'' } };
  else if (kind === 'muscu') { go('activity'); return; }
  else return;
  render();
}

function addCustomMealToSlot(mealId, slot) {
  const meal = S.customMeals.find(m => m.id === mealId);
  if (!meal || !slot) return;
  const day = curDay();
  meal.items.forEach(it => {
    if (it.cheat) {
      day.meals[slot].push({ cheat:true, kcal: it.kcal||0, desc: it.desc||'', enseigne: it.enseigne||'', cost: +it.cost||0, t: Date.now() });
    } else {
      day.meals[slot].push({ fid: it.fid, q: it.q, t: Date.now() });
    }
  });
  S.sheet = null; save();
  toast(`+ ${meal.name}`);
  render();
}

function shiftCal(delta) {
  const cur = S._calMonth ? dateFrom(S._calMonth+'-01') : dateFrom(S.date.slice(0,7)+'-01');
  cur.setMonth(cur.getMonth()+delta);
  S._calMonth = `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}`;
  render();
}
function shiftStats(delta) {
  const cur = S._statsMonth ? dateFrom(S._statsMonth+'-01') : dateFrom(S.date.slice(0,7)+'-01');
  cur.setMonth(cur.getMonth()+delta);
  // Hard bound: don't allow navigating past current month
  const now = new Date();
  const curYM = cur.getFullYear() * 12 + cur.getMonth();
  const nowYM = now.getFullYear() * 12 + now.getMonth();
  if (curYM > nowYM) {
    // already at current month — block forward
    cur.setFullYear(now.getFullYear(), now.getMonth(), 1);
  }
  S._statsMonth = `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}`;
  render();
}
function resetStatsToToday() {
  delete S._statsMonth;
  render();
}

function exportData() {
  const blob = new Blob([JSON.stringify({ log: S.log, profile: S.profile, goals: S.goals, mode: S.mode, customMeals: S.customMeals, autoMeals: S.autoMeals }, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `nutricore_${todayStr()}.json`; a.click();
  URL.revokeObjectURL(url);
  toast('EXPORT TÉLÉCHARGÉ');
}

// =======================================================
// SUPABASE SYNC LAYER
// =======================================================
// Configure these via window.NUTRICORE_CONFIG before app.js loads.
// Example in your index.html:
// <script>window.NUTRICORE_CONFIG = { supabase: { url: 'https://xxx.supabase.co', anonKey: '...' } };<\/script>
const CFG = (typeof window !== 'undefined' && window.NUTRICORE_CONFIG) || {};

let _sb = null;       // supabase client when ready
let _sbReady = false;
let _syncTimer = null;
let _syncInflight = false;

async function initCloud() {
  // Try saved config from localStorage first (set via UI)
  if (!CFG.supabase || !CFG.supabase.url) {
    try {
      const saved = JSON.parse(localStorage.getItem('nc_supabase_cfg') || 'null');
      if (saved && saved.url && saved.anonKey) {
        CFG.supabase = saved;
      }
    } catch (e) {}
  }
  if (!CFG.supabase || !CFG.supabase.url) {
    S._cloudStatus = 'idle';
    return;
  }
  try {
    // Lazy-load Supabase client from CDN at runtime
    if (!window.supabase) {
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js';
        s.onload = res;
        s.onerror = rej;
        document.head.appendChild(s);
      });
    }
    _sb = window.supabase.createClient(CFG.supabase.url, CFG.supabase.anonKey, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true,
        storage: window.localStorage,
        storageKey: 'nc-sb-auth',          // explicit key, easier to debug
        flowType: 'implicit'                // implicit flow: token comes directly in URL hash, works for magic links
      }
    });
    _sbReady = true;

    // 1) Setup listener BEFORE getSession so we don't miss SIGNED_IN events
    _sb.auth.onAuthStateChange(async (event, session) => {
      console.log('[NC auth event]', event, session ? 'has session' : 'no session');
      if ((event === 'SIGNED_IN' || event === 'INITIAL_SESSION' || event === 'TOKEN_REFRESHED') && session && session.user) {
        const wasNotConnected = !S.user;
        S.user = { id: session.user.id, email: session.user.email };
        // Clean URL of the hash token left by Supabase magic link (only on actual SIGNED_IN)
        if (event === 'SIGNED_IN' && (window.location.hash.includes('access_token') || window.location.search.includes('code='))) {
          try { history.replaceState(null, '', window.location.pathname); } catch (e) {}
        }
        // Pull cloud data only if it's a fresh sign in (not silent refresh)
        if (wasNotConnected || event === 'SIGNED_IN') {
          await pullCloud();
          if (S.sheet && S.sheet.type === 'auth') S.sheet = null;
          render();
          if (event === 'SIGNED_IN') toast('CONNECTÉ ✓');
        }
        rerenderSyncStatus();
      } else if (event === 'SIGNED_OUT') {
        S.user = null;
        S._cloudStatus = 'idle';
        render();
      }
    });

    // 2) Force-restore session from storage. The Supabase client already does this
    //    automatically on construction, but we want to wait for it deterministically.
    const { data: { session }, error } = await _sb.auth.getSession();
    if (error) {
      console.error('getSession err', error);
    } else if (session && session.user) {
      // Already connected — set user immediately so UI doesn't flicker
      S.user = { id: session.user.id, email: session.user.email };
      // Pull cloud data once on boot (the listener above won't fire INITIAL_SESSION on every page if session was already there)
      await pullCloud();
      render();
    }
    rerenderSyncStatus();
  } catch (e) {
    console.error('Supabase init err', e);
    S._cloudStatus = 'err'; S._cloudErr = String(e);
    rerenderSyncStatus();
  }
}

async function authMagicLink(email) {
  if (!_sbReady) { toast('CONFIG SUPABASE MANQUANTE', true); return false; }
  try {
    const { error } = await _sb.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.href }
    });
    if (error) throw error;
    toast('LIEN MAGIQUE ENVOYÉ ✓');
    return true;
  } catch (e) {
    console.error(e); toast('ERREUR : '+(e.message||e), true);
    return false;
  }
}

async function authSignOut() {
  if (!_sbReady) return;
  await _sb.auth.signOut();
  S.user = null; save(); render();
  toast('DÉCONNECTÉ');
}

function scheduleSyncCloud() {
  if (!_sbReady || !S.user) return;
  if (_syncTimer) clearTimeout(_syncTimer);
  _syncTimer = setTimeout(syncCloud, 1500); // debounce 1.5s
}

async function syncCloud() {
  if (!_sbReady || !S.user || _syncInflight) return;
  if (!navigator.onLine) { S._cloudStatus = 'offline'; rerenderSyncStatus(); return; }
  _syncInflight = true;
  S._cloudStatus = 'syncing'; rerenderSyncStatus();
  try {
    // Push only changed days. We use a simple "last_save" timestamp model :
    // upsert one row per (user_id, date) with the day data
    const userId = S.user.id;
    const rows = [];
    Object.keys(S.log).forEach(date => {
      rows.push({ user_id: userId, date, data: S.log[date], updated_at: new Date().toISOString() });
    });
    // Settings row (profile/goals/mode/favorites/customFoods/customMeals/autoMeals/recentFoods/onboarded)
    const settings = {
      profile: S.profile, goals: S.goals, mode: S.mode,
      favorites: S.favorites, customFoods: S.customFoods,
      customMeals: S.customMeals, autoMeals: S.autoMeals,
      recentFoods: S.recentFoods, onboarded: S.onboarded,
      openSlots: S.openSlots,
    };
    // Upsert in batch — limit chunks to 50 rows per request
    for (let i = 0; i < rows.length; i += 50) {
      const chunk = rows.slice(i, i+50);
      const { error } = await _sb.from('nc_logs').upsert(chunk, { onConflict: 'user_id,date' });
      if (error) throw error;
    }
    const { error: eS } = await _sb.from('nc_settings').upsert(
      { user_id: userId, data: settings, updated_at: new Date().toISOString() },
      { onConflict: 'user_id' }
    );
    if (eS) throw eS;
    S._cloudStatus = 'ok'; S._cloudErr = null;
  } catch (e) {
    console.error('sync err', e);
    S._cloudStatus = 'err'; S._cloudErr = String(e.message || e);
  } finally {
    _syncInflight = false;
    rerenderSyncStatus();
  }
}

async function pullCloud() {
  if (!_sbReady || !S.user) return;
  S._cloudStatus = 'syncing'; rerenderSyncStatus();
  try {
    const userId = S.user.id;
    const { data: settingsRow, error: e1 } = await _sb.from('nc_settings').select('data').eq('user_id', userId).maybeSingle();
    if (e1) throw e1;
    if (settingsRow && settingsRow.data) {
      Object.assign(S, settingsRow.data);
      (S.customFoods||[]).forEach(cf => {
        if (!FOODS.find(f => f.id === cf.id)) FOODS.push(cf);
      });
    }
    const { data: logsRows, error: e2 } = await _sb.from('nc_logs').select('date,data').eq('user_id', userId);
    if (e2) throw e2;
    if (logsRows && logsRows.length) {
      logsRows.forEach(r => { S.log[r.date] = r.data; });
    }
    save(); // persist locally
    S._cloudStatus = 'ok';
  } catch (e) {
    console.error('pull err', e);
    S._cloudStatus = 'err'; S._cloudErr = String(e.message || e);
  }
  rerenderSyncStatus();
}

function rerenderSyncStatus() {
  const el = document.querySelector('[data-cloud-status]');
  if (!el) return;
  const map = { idle: '— LOCAL ONLY —', syncing: 'SYNC EN COURS…', ok: 'SYNCHRONISÉ ✓', err: 'ERREUR : '+(S._cloudErr||''), offline: 'HORS LIGNE' };
  el.textContent = map[S._cloudStatus] || '';
  el.className = 'sync-line mono cloud-' + S._cloudStatus;
}

// =======================================================
// RECENT FOODS TRACKING
// =======================================================
function trackRecentFood(fid) {
  if (!fid || fid === 0) return; // skip cheat
  S.recentFoods = S.recentFoods || [];
  // Remove existing entry, prepend fresh
  S.recentFoods = S.recentFoods.filter(r => r.id !== fid);
  S.recentFoods.unshift({ id: fid, t: Date.now() });
  // Cap at 30
  if (S.recentFoods.length > 30) S.recentFoods = S.recentFoods.slice(0, 30);
}

function getRecentFoods(limit = 8) {
  return (S.recentFoods||[])
    .map(r => ({ ...r, food: FOODS.find(f => f.id === r.id) }))
    .filter(r => r.food)
    .slice(0, limit)
    .map(r => r.food);
}

function buildExportHTML(yyyymm) {
  const [y, m] = yyyymm.split('-').map(Number);
  const lastDay = new Date(y, m, 0).getDate();
  const monthName = MONTHS[m-1];
  const series = [];
  for (let d=1; d<=lastDay; d++) {
    const ds = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if (S.log[ds]) {
      const t = dayTotals(ds);
      series.push({ d, ds, t, log: S.log[ds] });
    }
  }
  if (series.length === 0) return null;

  const avgKcal = series.reduce((a,x)=>a+x.t.kcal,0)/series.length;
  const avgP = series.reduce((a,x)=>a+x.t.p,0)/series.length;
  const avgG = series.reduce((a,x)=>a+x.t.g,0)/series.length;
  const avgL = series.reduce((a,x)=>a+x.t.l,0)/series.length;
  const sportKcalTotal = series.reduce((a,x)=>a+x.t.sportKcal,0);
  const totalSessions = series.reduce((a,x)=>a+(x.log.sport||[]).length,0);
  const sleepArr = series.map(x => x.log.sleep||0).filter(v => v>0);
  const avgSleep = sleepArr.length ? sleepArr.reduce((a,b)=>a+b,0)/sleepArr.length : 0;
  const stepsArr = series.map(x => x.log.steps||0).filter(v => v>0);
  const avgSteps = stepsArr.length ? stepsArr.reduce((a,b)=>a+b,0)/stepsArr.length : 0;
  const weights = series.filter(x => x.log.weight!=null).map(x => x.log.weight);
  const wStart = weights[0], wEnd = weights[weights.length-1];

  // Days hit/over/low
  const hit = series.filter(x => {
    if (!S.goals.kcal) return false;
    const adj = S.goals.kcal + (x.t.sportKcal||0);
    const pct = (x.t.kcal/adj)*100;
    return pct >= 90 && pct <= 110;
  }).length;
  const over = series.filter(x => x.t.kcal > S.goals.kcal*1.1 + (x.t.sportKcal||0)).length;
  const low  = series.filter(x => x.t.kcal > 0 && x.t.kcal < S.goals.kcal*0.9 + (x.t.sportKcal||0)).length;

  // Mini chart SVG (kcal trend)
  const W = 600, H = 100;
  const arr = [];
  for (let d=1; d<=lastDay; d++) {
    const ds = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    arr.push(S.log[ds] ? dayTotals(ds).kcal : null);
  }
  const max = Math.max(S.goals.kcal*1.2, ...arr.filter(v=>v!=null));
  const stepX = arr.length > 1 ? W/(arr.length-1) : W;
  const pts = [];
  arr.forEach((v, i) => { if (v != null) pts.push({ x: i*stepX, y: H - (v/max)*H, v }); });
  let path = '';
  if (pts.length) {
    path = `M ${pts[0].x.toFixed(1)},${pts[0].y.toFixed(1)}`;
    for (let i = 1; i < pts.length; i++) {
      const prev = pts[i-1], cur = pts[i];
      const c1 = prev.x + (cur.x-prev.x)*0.4;
      const c2 = cur.x - (cur.x-prev.x)*0.4;
      path += ` C ${c1.toFixed(1)},${prev.y.toFixed(1)} ${c2.toFixed(1)},${cur.y.toFixed(1)} ${cur.x.toFixed(1)},${cur.y.toFixed(1)}`;
    }
  }
  const targetY = H - (S.goals.kcal/max)*H;

  // Daily table
  const rows = series.map(x => {
    const adj = S.goals.kcal + (x.t.sportKcal||0);
    const pct = adj ? (x.t.kcal/adj)*100 : 0;
    let cls = 'r-low';
    if (pct >= 90 && pct <= 110) cls = 'r-hit';
    else if (pct > 110) cls = 'r-over';
    return `<tr class="${cls}">
      <td>${x.d}</td>
      <td>${fmt(x.t.kcal)}</td>
      <td>${fmt(x.t.p)}</td>
      <td>${fmt(x.t.g)}</td>
      <td>${fmt(x.t.l)}</td>
      <td>${x.t.sportKcal ? '−'+fmt(x.t.sportKcal) : '—'}</td>
      <td>${x.log.sleep ? fmt1(x.log.sleep)+'h' : '—'}</td>
      <td>${x.log.steps ? fmt(x.log.steps) : '—'}</td>
      <td>${x.log.weight ? fmt1(x.log.weight)+'kg' : '—'}</td>
      <td>${Math.round(pct)}%</td>
    </tr>`;
  }).join('');

  return `<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"><title>NutriCore · ${monthName} ${y}</title>

</body></html>`;
}

function exportMonthly(yyyymm) {
  const html = buildExportHTML(yyyymm);
  if (!html) { toast('AUCUNE DONNÉE CE MOIS', true); return; }
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  // Open in new tab so user can print/save as PDF via browser
  const w = window.open(url, '_blank');
  if (!w) {
    // Fallback : trigger download
    const a = document.createElement('a');
    a.href = url; a.download = `nutricore-${yyyymm}.html`;
    document.body.appendChild(a); a.click(); a.remove();
  }
  setTimeout(() => URL.revokeObjectURL(url), 60000);
}

function sheetExportPicker() {
  const ctx = S.sheet.ctx;
  // Build list of months that have data
  const months = new Set();
  Object.keys(S.log).forEach(d => months.add(d.slice(0,7)));
  const sorted = Array.from(months).sort().reverse();
  const selectedM = ctx.month || sorted[0] || todayStr().slice(0,7);

  return `
    <div class="sheet-h">
      <div class="h-md">EXPORT MENSUEL</div>
      <button class="iconbtn" data-act="closeSheet">${I.x}</button>
    </div>
    <div class="sheet-body">
      <div class="export-intro">
        Génère un rapport health complet pour le mois choisi. Le rapport s'ouvre dans un nouvel onglet, depuis lequel tu peux <strong>imprimer en PDF</strong> via le navigateur (Cmd/Ctrl+P → Enregistrer en PDF).
      </div>
      <div class="ob-label mono" style="margin-top:18px;margin-bottom:10px">CHOISIR LE MOIS</div>
      <div class="export-months">
        ${sorted.length === 0 ? '<div class="slot-empty">— Aucune donnée loggée —</div>' :
          sorted.map(ym => {
            const [y, m] = ym.split('-').map(Number);
            const count = Object.keys(S.log).filter(d => d.startsWith(ym)).length;
            return `<button class="export-month ${ym===selectedM?'active':''}" data-act="selectExportMonth" data-m="${ym}">
              <div class="em-name">${MONTHS[m-1]} ${y}</div>
              <div class="em-meta mono">${count} JOUR${count>1?'S':''}</div>
            </button>`;
          }).join('')}
      </div>
    </div>
    <div class="sheet-foot">
      <button class="btn full primary" data-act="doExport" data-m="${selectedM}">GÉNÉRER LE RAPPORT</button>
    </div>
  `;
}

function sheetAuth() {
  const ctx = S.sheet.ctx;
  let savedCfg = null;
  try { savedCfg = JSON.parse(localStorage.getItem('nc_supabase_cfg') || 'null'); } catch (e) {}
  const cloudConfigured = !!(CFG.supabase && CFG.supabase.url) || !!savedCfg;
  const showSetup = !cloudConfigured || ctx.showSetup;
  const u = ctx.url || (savedCfg && savedCfg.url) || (CFG.supabase && CFG.supabase.url) || '';
  const k = ctx.anonKey || (savedCfg && savedCfg.anonKey) || (CFG.supabase && CFG.supabase.anonKey) || '';
  const mode = ctx.authMode || 'password'; // 'password' | 'magic'

  return `
    <div class="sheet-h">
      <div class="h-md">${ctx.sent ? 'LIEN ENVOYÉ' : 'CONNEXION'}</div>
      <button class="iconbtn" data-act="closeSheet">${I.x}</button>
    </div>
    <div class="sheet-body">
      ${ctx.sent ? `
        <div class="auth-success">
          <div class="as-icon">✓</div>
          <div class="as-title">LIEN MAGIQUE ENVOYÉ</div>
          <div class="as-body mono">Vérifie ta boîte mail (et les spams) à <strong>${ctx.sentTo||''}</strong>. Clique le lien pour te connecter.</div>
        </div>
      ` : showSetup ? `
        <div class="export-intro">
          Renseigne les identifiants de ton projet Supabase (gratuit). Ces infos sont stockées <strong>localement</strong> dans ton navigateur.
        </div>
        <div class="input-row" style="margin-top:18px">
          <label>SUPABASE PROJECT URL</label>
          <input type="text" value="${u}" data-act="authCfgUrl" placeholder="https://xxx.supabase.co" autocomplete="off" spellcheck="false">
        </div>
        <div class="input-row">
          <label>SUPABASE ANON PUBLIC KEY</label>
          <input type="text" value="${k}" data-act="authCfgKey" placeholder="eyJhbGc..." autocomplete="off" spellcheck="false">
        </div>
        <div class="auth-warn" style="margin-top:14px">
          <div class="aw-tag mono">OÙ TROUVER CES INFOS ?</div>
          <div class="aw-body">
            1. supabase.com → ton projet → <code>Settings → API</code><br>
            2. Copie <code>Project URL</code> + <code>anon public key</code>
          </div>
        </div>
      ` : `
        <div class="auth-tabs">
          <button class="${mode==='password'?'active':''}" data-act="authSetMode" data-m="password">MOT DE PASSE</button>
          <button class="${mode==='magic'?'active':''}" data-act="authSetMode" data-m="magic">LIEN MAGIQUE</button>
        </div>
        ${mode === 'password' ? `
          <div class="export-intro" style="margin-top:14px">
            Identifie-toi avec un mot de passe. Si c'est ta première fois, clique <strong>"Créer un compte"</strong> en bas.
          </div>
          <div class="input-row" style="margin-top:14px">
            <label>EMAIL</label>
            <input type="email" value="${ctx.email||''}" data-act="authEmail" placeholder="toi@exemple.com" inputmode="email" autocomplete="email">
          </div>
          <div class="input-row">
            <label>MOT DE PASSE</label>
            <input type="password" value="${ctx.password||''}" data-act="authPassword" placeholder="••••••••" autocomplete="current-password">
          </div>
          <div class="auth-mini-actions">
            <button class="btn sm" data-act="authSignUp">Créer un compte</button>
            <button class="btn sm" data-act="authResetPwd">Mot de passe oublié</button>
          </div>
        ` : `
          <div class="export-intro" style="margin-top:14px">
            Reçois un lien magique par email. Pas de mot de passe à retenir.
          </div>
          <div class="input-row" style="margin-top:14px">
            <label>EMAIL</label>
            <input type="email" value="${ctx.email||''}" data-act="authEmail" placeholder="toi@exemple.com" inputmode="email" autocomplete="email">
          </div>
        `}
        <button class="btn sm" data-act="authShowSetup" style="margin-top:14px">Modifier config Supabase</button>
      `}
    </div>
    ${ctx.sent ? `
      <div class="sheet-foot">
        <button class="btn full" data-act="closeSheet">FERMER</button>
      </div>
    ` : showSetup ? `
      <div class="sheet-foot">
        <button class="btn full primary" data-act="authSaveCfg">SAUVEGARDER LA CONFIG</button>
      </div>
    ` : mode === 'password' ? `
      <div class="sheet-foot">
        <button class="btn full primary" data-act="authSignIn">SE CONNECTER</button>
      </div>
    ` : `
      <div class="sheet-foot">
        <button class="btn full primary" data-act="authMagic">ENVOYER LIEN MAGIQUE</button>
      </div>
    `}
  `;
}

if (typeof window !== 'undefined') initCloud();
window.addEventListener('online',  () => { S._cloudStatus = 'idle'; rerenderSyncStatus(); scheduleSyncCloud(); });
window.addEventListener('offline', () => { S._cloudStatus = 'offline'; rerenderSyncStatus(); });

render(true);

// Expose for testing only (no-op in production)
if (typeof window !== 'undefined') {
  window.S = S; window.FOODS = FOODS; window.CATS = CATS; window.SLOTS = SLOTS;
  window.save = save; window.render = render; window.curDay = curDay;
  window.modeTargets = modeTargets; window.classifyPct = classifyPct;
  window.macroBar = macroBar; window.buildSleepInsight = buildSleepInsight;
  window.buildWeeklyGlycemic = buildWeeklyGlycemic;
  window.exportMonthly = exportMonthly; window.buildExportHTML = buildExportHTML;
  window.trackRecentFood = trackRecentFood; window.getRecentFoods = getRecentFoods;
}

// Auto-save on visibility change (mobile-friendly)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') save();
});

</script>

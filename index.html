function getDay(date){
  if(!S.log[date])S.log[date]={breakfast:[],lunch:[],dinner:[],snacks:[],drinks:[],steps:0,sessions:[],sleep:0,learning:0,courses:[]};
  const l=S.log[date];
  if(!l.sessions)l.sessions=[];if(!l.drinks)l.drinks=[];if(!l.courses)l.courses=[];
  return l;
}
function calcM(items){
  let k=0,p=0,g=0,f=0;
  (items||[]).forEach(it=>{const fd=FOODS.find(x=>x.id===it.foodId);if(!fd)return;const m=it.qty/100;k+=fd.p.k*m;p+=fd.p.p*m;g+=fd.p.g*m;f+=fd.p.f*m;});
  return{k:Math.round(k),p:Math.round(p*10)/10,g:Math.round(g*10)/10,f:Math.round(f*10)/10};
}
function dayM(d){
  const l=getDay(d);
  return calcM([...l.breakfast,...l.lunch,...l.dinner,...l.snacks]);
}
function slotM(d,sl){return calcM(getDay(d)[sl]||[])}
function p01(v,g){return g>0?Math.min(1,v/g):0}
function getSportSteps(date){
  // Returns steps already covered via sport sessions
  // to subtract from manual steps to avoid double-counting kcal
  const sess=getDay(date).sessions||[];
  let total=0;
  sess.forEach(s=>{
    if(s.type==='cardio'&&s.distance>0){
      total+=Math.round(s.distance*1350);
    } else if(s.type==='stair'&&s.steps>0){
      total+=s.steps;
    } else if(s.type==='strength'&&s.hasCardio&&s.cardioKm>0){
      // Cardio portion of strength session also generates steps
      total+=Math.round(s.cardioKm*1350);
    }
  });
  return total;
}
function getNetSteps(date){
  // Steps to display and use for kcal calc (excluding sport steps already counted)
  const raw=getDay(date).steps||0;
  const sportSt=getSportSteps(date);
  return Math.max(0,raw-sportSt);
}
function stKcal(steps,w){return Math.round(steps*0.04*(w/70))}
function sessKcal(d){return(getDay(d).sessions||[]).reduce((a,s)=>a+s.kcal,0)}

// Success % logic: within ±10% = 100%, proportional otherwise
function successPct(val,goal){
  if(goal<=0)return 100;
  const ratio=val/goal;
  if(ratio>=0.9&&ratio<=1.1)return 100;
  if(ratio<0.9)return Math.round(ratio*100/0.9);
  // Over by more than 10%
  return Math.max(0,Math.round(200-ratio*100));
}
function calRingColor(val,goal){
  const ratio=val/goal;
  if(ratio>=0.9&&ratio<=1.1)return'#A8FF3E'; // ±10% = vert
  if(ratio>=0.8&&ratio<0.9)return'#FFD60A';   // 80-90% = jaune
  return'#FF375F'; // <80% ou >110% = rouge
}

function applyAutoMeals(date){
  if(!S.autoMeals||!S.autoMeals.length)return;
  const dow=(new Date(date+'T00:00:00').getDay()+6)%7;
  S.autoMeals.forEach(am=>{
    if(!am.active||!am.days||!am.days.includes(dow))return;
    const cm=S.cm.find(c=>c.id===am.cmId);if(!cm)return;
    const day=getDay(date);
    const slot=am.slot||'lunch';
    // Check if already applied (avoid duplicates)
    const alreadyApplied=day[slot]&&day[slot].length>0&&day._autoApplied&&day._autoApplied.includes(am.id);
    if(!alreadyApplied){
      cm.items.forEach(it=>day[slot].push({...it,_auto:am.id}));
      if(!day._autoApplied)day._autoApplied=[];
      day._autoApplied.push(am.id);
    }
  });
}

function getLastCourses(){
  // Returns all shopping days sorted DESC (most recent first)
  const days=Object.keys(S.log).filter(d=>S.log[d].courses&&S.log[d].courses.length>0).sort().reverse();
  if(!days.length)return null;
  const td2=today();
  const result=days.map(function(d,i){
    const courses=S.log[d].courses||[];
    const total=Math.round(courses.reduce(function(a,cr){return a+(cr.prix||0);},0)*100)/100;
    // daysSince: how many days ago was this purchase
    const daysSince=Math.round((new Date(td2+'T00:00:00')-new Date(d+'T00:00:00'))/(864e5));
    // durationDays: how long did these courses last?
    // = days between this purchase and the NEXT one (i-1 in desc array = later date)
    // = OR days since this purchase if it's the most recent (i===0)
    const nextPurchaseDate=i===0?td2:days[i-1]; // next in time = previous in desc array
    const durationDays=Math.round((new Date(nextPurchaseDate+'T00:00:00')-new Date(d+'T00:00:00'))/(864e5));
    return{date:d,courses,total,daysSince,durationDays};
  });
  return result;
}

}

    <div class="bcr"><span class="bcl">Pas nets (${getNetSteps(S.date).toLocaleString('fr')})</span><span class="bcv"style="color:var(--green)">+${skc}</span></div>
    ${spc>0?`<div class="bcr"><span class="bcl">Sport</span><span class="bcv"style="color:var(--cyan)">+${spc}</span></div>`:''}
    <div class="bcd"></div>
    <div class="bcr"><span class="bcl"style="font-weight:600">Dépensé</span><span class="bcv"style="font-weight:700">${tot} kcal</span></div>
  </div>
  <div class="bn"><div class="bnl">Balance</div><div class="bnv"style="color:${bc}">${bal>0?'+':''}${bal} kcal</div></div>
  <div class="bp">
    <div class="bcr"><span style="font-size:11px;color:var(--t2)">Projection</span><span style="font-size:12px;font-weight:700;color:${pc}">${proj}</span></div>
    ${m.k>0&&fatG>0?`<div class="bcr"><span style="font-size:11px;color:var(--t2)">Perte grasse aujourd'hui</span><span style="font-size:11px;font-weight:700;color:var(--green)">−${fatG}g → −${(fatG*30/1000).toFixed(2)}kg/mois</span></div>`:''}
  </div>
</div>
<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px 2px;cursor:pointer" onclick="toggleSlot('allmeals')">
  <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700">Repas</div>
  <div style="font-size:12px;color:var(--t3)">${S.openSlots.includes('allmeals')?'▾':'▸'}</div>
</div>
${S.openSlots.includes('allmeals')?meals:''}
${objHtml}
${renderCoursesSection()}
<div style="height:8px"></div>
</div>${nav('home')}`;
}


function renderCoursesSection(){
  const allCourses=getLastCourses(); // sorted desc
  const ym=today().slice(0,7);
  const monthTotal=getMonthCoursesTotal(ym);
  const isOpen=S.openSlots.includes('courses');
  const curDate=S.date;

  const header='<div style="display:flex;align-items:center;justify-content:space-between;margin:0 14px 8px" onclick="toggleSlot(\'courses\')" style="cursor:pointer">'+
    '<div style="display:flex;align-items:center;gap:8px;cursor:pointer">'+
      '<div class="sec" style="margin:0">Mes courses</div>'+
      '<div style="font-size:11px;color:var(--t2)">'+monthTotal.toFixed(2)+'€ ce mois</div>'+
    '</div>'+
    '<div style="display:flex;align-items:center;gap:6px">'+
      '<button onclick="showCoursesModal(S.date);event.stopPropagation()" style="font-size:11px;color:var(--cyan);font-weight:600;background:none;border:none;cursor:pointer;padding:2px 6px">+</button>'+
      '<div style="font-size:11px;color:var(--t3)">'+(isOpen?'\u25be':'\u25b8')+'</div>'+
    '</div>'+
  '</div>';

  if(!isOpen) return header;
  if(!allCourses||!allCourses.length){
    return header+'<div style="margin:0 14px 8px;background:var(--c1);border-radius:12px;padding:11px 13px;font-size:12px;color:var(--t2);text-align:center">Aucune course — tape + pour ajouter</div>';
  }

  const cards=allCourses.map(function(info){
    const dt=new Date(info.date+'T12:00:00');
    const dateStr=dt.getDate()+'/'+(dt.getMonth()+1);
    const isCurrentDay=info.date===curDate;
    const enseignes=[...new Set(info.courses.map(function(cr){return cr.enseigne;}))].join(', ');
    // Gap label
    const gapLbl=info.daysSince===0?'Aujourd\'hui':
                 info.daysSince===1?'Hier':
                 'Il y a '+info.daysSince+'j';
    // Duration label (how long it lasted until next purchase)
    const durLbl=info.durationDays>0?info.durationDays+'j de provisions':'';
    return'<div style="background:'+(isCurrentDay?'rgba(48,213,200,.1)':'var(--c2)')+';border-radius:12px;padding:10px 11px;cursor:pointer;border:'+(isCurrentDay?'1px solid rgba(48,213,200,.4)':'1px solid transparent')+'" onclick="showCoursesModal(\''+info.date+'\')">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">'+
        '<div style="display:flex;align-items:center;gap:6px">'+
          '<div style="font-family:Syne,sans-serif;font-size:15px;font-weight:800;color:var(--t1)">'+dateStr+'</div>'+
          '<div style="font-size:10px;color:var(--cyan);background:rgba(48,213,200,.1);border-radius:6px;padding:2px 6px">'+gapLbl+'</div>'+
          (durLbl?'<div style="font-size:10px;color:var(--t2)">'+durLbl+'</div>':'')+
        '</div>'+
        '<div style="font-size:15px;font-weight:800;color:var(--cyan)">'+info.total.toFixed(2)+'€</div>'+
      '</div>'+
      '<div style="font-size:11px;color:var(--t2)">'+enseignes+'</div>'+
    '</div>';
  }).join('');

  return header+'<div style="margin:0 14px 8px;display:flex;flex-direction:column;gap:6px">'+cards+'</div>';
}
function renderObjectives(){
  const log=getDay(S.date);
  const objOpen=S.openSlots.includes('objectives');
  const data=[
    {id:'steps', l:'Pas',      v:log.steps||0,     g:S.objectives.steps,   u:'pas',     col:'var(--green)'},
    {id:'muscu', l:'Muscu',    v:(log.sessions||[]).filter(s=>s.type==='strength').length, g:S.objectives.muscu, u:'séance(s)', col:'var(--pink)'},
    {id:'sleep', l:'Sommeil',  v:log.sleep||0,     g:S.objectives.sleep,   u:'h',       col:'var(--purple)'},
    {id:'learn', l:'Learning', v:log.learning||0,  g:S.objectives.learning/7, u:'h',   col:'var(--yellow)'},
  ];
  const grid=objOpen?data.map(o=>{
    const pct=Math.min(100,p01(o.v,o.g)*100);
    const ok=o.v>=o.g;
    const disp=o.id==='steps'?(o.v).toLocaleString('fr'):o.v;
    const target=o.id==='steps'?(o.g).toLocaleString('fr'):o.g;
    return`<div class="obj-card"onclick="editObj('${o.id}')">
    <div class="obj-pct"style="color:${ok?'var(--green)':'var(--t3)'}">${ok?'\u2713':Math.round(pct)+'%'}</div>
    <div class="obj-card-lbl">${o.l}</div>
    <div class="obj-card-val"style="color:${o.col}">${disp}</div>
    <div class="obj-card-sub">/ ${target} ${o.u}</div>
    <div class="obj-bar"><div class="obj-fill"style="width:${pct}%;background:${o.col}"></div></div>
  </div>`;
  }).join(''):'';
  return`<div class="obj-section">
<div style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;margin-bottom:${objOpen?8:0}px"onclick="toggleSlot('objectives')">
  <div class="obj-title" style="margin:0">Objectifs du jour</div>
  <div style="font-size:12px;color:var(--t3)">${objOpen?'\u25be':'\u25b8'}</div>
</div>
${objOpen?'<div class="obj-grid">'+grid+'</div>':''}
</div>`;
}
</script>
</body>
</html>

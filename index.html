<title>NutriCore</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#000;--c1:#1C1C1E;--c2:#2C2C2E;--c3:#3A3A3C;
  --pink:#FF375F;--green:#A8FF3E;--cyan:#30D5C8;--orange:#FF9F0A;
  --blue:#0A84FF;--purple:#BF5AF2;--yellow:#FFD60A;
  --t1:#fff;--t2:rgba(255,255,255,.55);--t3:rgba(255,255,255,.22);--bd:rgba(255,255,255,.07)
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:14px;overflow:hidden}
#app{width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;max-width:430px;margin:0 auto;position:relative}
.wrap{display:flex;flex-direction:column;height:100%;overflow:hidden}
.sc{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:88px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.sc::-webkit-scrollbar{display:none}
/* NAV always fixed */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(5,5,5,.96);backdrop-filter:blur(24px);border-top:1px solid var(--bd);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:200}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:1px}
.ni.on .nico,.ni.on .nl{color:var(--cyan)}
.nico{width:20px;height:20px;color:rgba(255,255,255,.35)}
.nico svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nl{font-size:9px;color:rgba(255,255,255,.35);font-weight:500}
.nc{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer}
.ncc{width:42px;height:42px;border-radius:50%;background:var(--pink);display:flex;align-items:center;justify-content:center;margin-top:-11px;box-shadow:0 4px 18px rgba(255,55,95,.4)}
.ncc svg{width:19px;height:19px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round}
.nc .nl{color:var(--pink)}
/* HEADERS */
.hdr{padding:16px 14px 2px;display:flex;align-items:center;justify-content:space-between}
.ht{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.02em;cursor:pointer}
.hs{font-size:12px;color:var(--t2);margin-top:1px}
.ha{display:flex;gap:6px}
.ib{width:33px;height:33px;border-radius:50%;background:var(--c1);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ib svg{width:14px;height:14px;stroke:var(--t2);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.bh{padding:11px 14px 7px;display:flex;align-items:center;position:relative;min-height:44px}
.bk{display:flex;align-items:center;color:var(--cyan);font-size:14px;font-weight:500;cursor:pointer;background:none;border:none;z-index:1;padding:4px 0}
.bk svg{width:19px;height:19px;stroke:var(--cyan);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.bht{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap}
/* DATE ROW */
.dr{display:flex;align-items:stretch;margin:2px 14px 9px;background:var(--c1);border-radius:14px;overflow:hidden}
.dn{width:46px;border:none;cursor:pointer;color:var(--cyan);font-size:22px;display:flex;align-items:center;justify-content:center;background:transparent;flex-shrink:0;-webkit-user-select:none;user-select:none}
.dn:active{background:var(--c2)}
.dn.dis{color:var(--t3)}
.dl{flex:1;text-align:center;padding:10px 4px}
.dl-main{font-size:13px;font-weight:600}
.dl-sub{font-size:11px;color:var(--t2);margin-top:2px}
/* RINGS */
.rw{display:flex;justify-content:center;padding:4px 14px 0;position:relative}
.rm{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.rb{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;line-height:1;letter-spacing:-.02em}
.rl{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.09em;margin-top:2px}
.rr{font-size:11px;margin-top:2px;font-weight:700}
/* MACROS */
.macs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:6px 14px 8px}
.mac{background:var(--c1);border-radius:11px;padding:9px 7px;text-align:center}
.ml{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.mv{font-family:'Syne',sans-serif;font-size:16px;font-weight:700}
.mg{font-size:10px;color:var(--t3);margin-top:1px}
.mb{height:3px;background:var(--c3);border-radius:3px;overflow:hidden;margin-top:5px}
.mf{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.4,0,.2,1)}
/* BALANCE */
.bc{margin:0 14px 8px;background:var(--c1);border-radius:14px;overflow:hidden}
.bch{display:flex;align-items:center;justify-content:space-between;padding:10px 12px 7px}
.bct{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--t2)}
.bce{font-size:12px;color:var(--cyan);font-weight:500;background:none;border:none;cursor:pointer}
.bcb{padding:0 12px 9px;display:flex;flex-direction:column;gap:5px}
.bcr{display:flex;align-items:center;justify-content:space-between}
.bcl{font-size:12px;color:var(--t2)}
.bcv{font-size:12px;font-weight:600}
.bcd{height:1px;background:var(--bd);margin:2px 0}
.bn{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--c2)}
.bnl{font-size:13px;font-weight:600}
.bnv{font-family:'Syne',sans-serif;font-size:15px;font-weight:800}
.bp{padding:6px 12px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:4px}
/* MEALS */
.mb2{margin:0 14px 6px;background:var(--c1);border-radius:14px;overflow:hidden}
.mh2{display:flex;align-items:center;justify-content:space-between;padding:10px 11px;cursor:pointer;-webkit-user-select:none;user-select:none}
.mh2:active{background:var(--c2)}
.md{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.mt2{font-size:13px;font-weight:600}
.ms{font-size:11px;color:var(--t2);margin-top:1px}
.mp2{width:26px;height:26px;border-radius:50%;border:none;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mis{padding:0 10px 10px;display:flex;flex-direction:column;gap:5px}
.fi{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--c2);border-radius:10px}
.fn{font-size:13px;font-weight:500}
.fsb{font-size:11px;color:var(--t2);margin-top:1px}
.fr{display:flex;align-items:center;gap:5px;flex-shrink:0}
.fk{font-size:12px;font-weight:700;color:var(--orange)}
.dx{width:19px;height:19px;border-radius:50%;background:rgba(255,59,48,.12);border:none;cursor:pointer;color:#FF3B30;font-size:13px;display:flex;align-items:center;justify-content:center}
/* OBJECTIVES */
.obj-section{margin:0 14px 8px}
.obj-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:8px}
.obj-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
.obj-card{background:var(--c1);border-radius:13px;padding:12px 11px;cursor:pointer;position:relative;overflow:hidden}
.obj-card:active{background:var(--c2)}
.obj-card-lbl{font-size:11px;color:var(--t2);margin-bottom:5px}
.obj-card-val{font-family:'Syne',sans-serif;font-size:18px;font-weight:800}
.obj-card-sub{font-size:10px;color:var(--t2);margin-top:2px}
.obj-bar{height:3px;background:var(--c3);border-radius:3px;overflow:hidden;margin-top:8px}
.obj-fill{height:100%;border-radius:3px;transition:width .6s ease}
.obj-pct{font-size:10px;font-weight:700;position:absolute;top:12px;right:11px}
/* FOOD SEARCH */
.sb{margin:5px 14px 8px;background:var(--c1);border-radius:11px;display:flex;align-items:center;padding:9px 12px;gap:7px}
.sb svg{width:15px;height:15px;stroke:var(--t2);fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0}
.sb input{background:none;border:none;color:var(--t1);font-size:14px;font-family:'DM Sans',sans-serif;flex:1;outline:none}
.sb input::placeholder{color:var(--t3)}
.cs{display:flex;gap:5px;padding:0 14px 7px;overflow-x:auto;scrollbar-width:none}
.cs::-webkit-scrollbar{display:none}
.cc{padding:5px 10px;border-radius:15px;font-size:11px;font-weight:500;white-space:nowrap;cursor:pointer;border:1px solid var(--bd);color:var(--t2);background:var(--c1);flex-shrink:0;transition:all .12s}
.cc.on{background:var(--cyan);color:#000;border-color:var(--cyan)}
.fl{padding:0 14px;display:flex;flex-direction:column;gap:5px}
.frow{display:flex;align-items:center;padding:8px 10px;background:var(--c1);border-radius:11px;cursor:pointer;gap:0}
.frow:active{background:var(--c2)}
.frl{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.fic{width:33px;height:33px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:700;text-align:center;line-height:1}
.fname{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fmeta{font-size:11px;color:var(--t2);margin-top:1px}
.fkcal{font-size:12px;font-weight:700;color:var(--t2);flex-shrink:0;margin:0 4px}
.star{width:24px;height:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:none;border:none;font-size:14px;flex-shrink:0}
/* QTY */
.qh{margin:7px 14px;background:var(--c1);border-radius:14px;padding:16px 14px;text-align:center}
.qbg{display:inline-block;padding:3px 8px;border-radius:7px;font-size:10px;font-weight:700;margin-bottom:7px;text-transform:uppercase;letter-spacing:.07em}
.qnm{font-family:'Syne',sans-serif;font-size:16px;font-weight:700}
.prow{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;padding:6px 14px 2px}
.pc{padding:5px 10px;border-radius:16px;font-size:12px;font-weight:600;cursor:pointer;background:var(--c2);color:var(--t1);border:1.5px solid transparent;transition:all .1s}
.pc.sel{background:rgba(255,55,95,.15);border-color:var(--pink);color:var(--pink)}
.qctrl{margin:7px 14px;background:var(--c1);border-radius:14px;padding:12px}
.qcl{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
input[type=range]{width:100%;height:5px;-webkit-appearance:none;background:var(--c3);border-radius:5px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--pink);cursor:pointer;box-shadow:0 2px 10px rgba(255,55,95,.4)}
.qrow{display:flex;align-items:center;gap:7px;margin-top:10px}
.qstep{width:36px;height:36px;border-radius:50%;background:var(--c2);border:none;cursor:pointer;color:var(--t1);font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:300}
.qin{flex:1;text-align:center;background:var(--c2);border:none;border-radius:9px;color:var(--t1);font-size:17px;font-weight:600;padding:9px;font-family:'DM Sans',sans-serif;outline:none}
.qu{font-size:12px;color:var(--t2);flex-shrink:0}
.cta{display:block;margin:0 14px 8px;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;width:calc(100% - 28px);transition:opacity .12s}
.cta:active{opacity:.8}
/* CONFIG MEAL */
.cfg-item{display:flex;align-items:center;padding:10px 12px;background:var(--c1);border-radius:12px;margin:0 14px 6px}
.cfg-name{font-size:13px;font-weight:600}
.cfg-qty-lbl{font-size:11px;color:var(--t2);margin-top:2px}
.cfg-k{font-size:12px;font-weight:700;color:var(--orange);margin:0 6px;flex-shrink:0}
.cfg-adj{display:flex;align-items:center;gap:5px;flex-shrink:0}
.cadj{width:28px;height:28px;border-radius:50%;background:var(--c2);border:none;cursor:pointer;color:var(--t1);font-size:17px;display:flex;align-items:center;justify-content:center;font-weight:300}
.cfg-n{font-size:13px;font-weight:700;min-width:28px;text-align:center}
/* ACTIVITY */
.strow{display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--c2);border-radius:11px}
.stedt{font-size:12px;color:var(--cyan);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500}
.srow{display:flex;align-items:center;justify-content:space-between;background:var(--c2);border-radius:11px;padding:9px 11px}
.sport-badge{padding:3px 7px;border-radius:5px;background:rgba(255,255,255,.07);font-size:10px;font-weight:700;letter-spacing:.05em;flex-shrink:0}
/* SPORT LOG */
.tabr{display:flex;margin:0 14px 11px;background:var(--c1);border-radius:10px;padding:3px;gap:2px}
.tab{flex:1;padding:7px 3px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;border-radius:8px;color:var(--t2);transition:all .15s}
.tab.on{background:var(--c2);color:var(--t1)}
.fg{margin:0 14px 8px}
.fgl{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.fin{width:100%;background:var(--c1);border:1.5px solid var(--bd);border-radius:10px;color:var(--t1);font-size:15px;font-family:'DM Sans',sans-serif;padding:10px 12px;outline:none}
.fin:focus{border-color:var(--cyan)}
.finrow{display:flex;gap:7px}
.pbox{margin:0 14px 9px;background:var(--c1);border-radius:14px;padding:12px}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;text-align:center}
.pv{font-family:'Syne',sans-serif;font-size:17px;font-weight:700}
.pl{font-size:10px;color:var(--t2);margin-top:2px}
.togr{display:flex;align-items:center;justify-content:space-between;padding:11px 12px;background:var(--c1);border-radius:12px;margin:0 14px 8px;cursor:pointer}
.tgl{font-size:13px;font-weight:500}
.tog{width:42px;height:24px;border-radius:12px;position:relative;transition:background .15s;flex-shrink:0}
.togk{position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .15s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.tog.on{background:var(--cyan)}.tog.on .togk{left:20px}.tog.off{background:var(--c3)}
.mtgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin:0 14px 10px}
.mtype{padding:11px 10px;background:var(--c1);border-radius:12px;text-align:center;cursor:pointer;border:1.5px solid transparent;transition:all .12s}
.mtype.sel{border-color:var(--pink);background:rgba(255,55,95,.09)}
/* CHART */
.chart-wrap{margin:0 14px 8px;background:var(--c1);border-radius:14px;padding:12px}
.chart-title{font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
/* CALENDAR */
.cal-stats{display:flex;gap:7px;padding:6px 14px 8px}
.cstat{flex:1;background:var(--c1);border-radius:11px;padding:9px 8px;text-align:center}
.cstat-v{font-family:'Syne',sans-serif;font-size:18px;font-weight:800}
.cstat-l{font-size:10px;color:var(--t2);margin-top:2px}
.cal-nav{display:flex;align-items:center;margin:0 14px 4px;background:var(--c1);border-radius:12px;overflow:hidden}
.cal-nav-btn{width:44px;border:none;cursor:pointer;color:var(--cyan);font-size:20px;display:flex;align-items:center;justify-content:center;background:transparent;padding:10px}
.cal-nav-btn:active{background:var(--c2)}
.cal-nav-lbl{flex:1;text-align:center;font-size:13px;font-weight:600;text-transform:capitalize}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:4px 14px 2px}
.cal-dow div{text-align:center;font-size:9px;color:var(--t3);font-weight:600;text-transform:uppercase}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:0 14px 5px}
.cal-day{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer}
.cal-legend{display:flex;gap:10px;justify-content:center;padding:4px 14px 8px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--t2)}
.legdot{width:7px;height:7px;border-radius:50%}
/* HISTORY */
.hr{margin:0 14px 6px;background:var(--c1);border-radius:14px;overflow:hidden;cursor:pointer}
.hh{display:flex;align-items:center;justify-content:space-between;padding:9px 12px 5px}
.hd{font-size:13px;font-weight:600}
.hk{font-size:12px;font-weight:600}
.hbw{height:3px;margin:0 12px 9px;background:var(--c3);border-radius:3px;overflow:hidden}
/* SETTINGS */
.setg{margin:0 14px 9px;border-radius:14px;overflow:hidden}
.setr{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;background:var(--c1);border-top:1px solid var(--bd)}
.setr:first-child{border-top:none}
.setl{font-size:14px}
.setin{background:none;border:none;font-size:14px;font-weight:600;text-align:right;font-family:'DM Sans',sans-serif;outline:none;width:70px}
/* AUTO-MEALS */
.am-card{margin:0 14px 7px;background:var(--c1);border-radius:14px;overflow:hidden}
.am-head{display:flex;align-items:center;justify-content:space-between;padding:11px 12px}
.am-dow{display:flex;gap:5px;padding:0 12px 11px;flex-wrap:wrap}
.am-day{width:32px;height:32px;border-radius:50%;background:var(--c2);border:none;cursor:pointer;color:var(--t2);font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;transition:all .12s}
.am-day.on{background:var(--cyan);color:#000}
/* AUTH */
.auth-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;min-height:100%}
.auth-logo{width:90px;height:90px;border-radius:22px;overflow:hidden;margin-bottom:20px;display:flex;align-items:center;justify-content:center;background:var(--c1)}
.auth-logo img{width:100%;height:100%;object-fit:cover}
.auth-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;margin-bottom:6px}
.auth-sub{font-size:13px;color:var(--t2);margin-bottom:28px;text-align:center}
.auth-in{width:100%;background:var(--c1);border:1.5px solid var(--bd);border-radius:12px;color:var(--t1);font-size:15px;font-family:'DM Sans',sans-serif;padding:13px 14px;outline:none;margin-bottom:10px}
.auth-in:focus{border-color:var(--cyan)}
.auth-cta{width:100%;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;margin-bottom:10px;background:var(--cyan);color:#000}
.auth-switch{font-size:13px;color:var(--cyan);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif}
/* MISC */
.sec{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin:10px 14px 7px;letter-spacing:-.01em}
.empty{text-align:center;padding:20px 14px;font-size:12px;color:var(--t2)}
.dbtn{display:block;width:calc(100% - 28px);margin:0 14px;padding:12px;background:rgba(255,59,48,.09);border-radius:11px;border:1.5px solid rgba(255,59,48,.2);color:#FF3B30;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:center}
.cmr{display:flex;align-items:center;justify-content:space-between;padding:11px 12px;background:var(--c1);border-radius:14px;margin:0 14px 6px;cursor:pointer}
.cmr:active{background:var(--c2)}
.cmk{font-size:13px;font-weight:700;color:var(--orange);text-align:right;flex-shrink:0}
.bmi{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;background:var(--c1);border-radius:11px;margin:0 14px 6px}
.bmd{width:22px;height:22px;border-radius:50%;background:rgba(255,59,48,.12);border:none;cursor:pointer;color:#FF3B30;font-size:13px;display:flex;align-items:center;justify-content:center}
.nmi{display:block;width:calc(100% - 28px);margin:5px 14px;background:var(--c1);border:1.5px solid var(--bd);border-radius:11px;color:var(--t1);font-size:14px;font-family:'DM Sans',sans-serif;padding:11px 12px;outline:none}
.nmi:focus{border-color:var(--cyan)}
.mbo{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(14px);z-index:300;display:flex;flex-direction:column;justify-content:flex-end}
.mbs{background:var(--c1);border-radius:20px 20px 0 0;padding:10px 14px max(20px,env(safe-area-inset-bottom));max-height:85vh;overflow-y:auto}
.mbh{width:32px;height:4px;background:var(--c3);border-radius:2px;margin:0 auto 12px}
.mbt{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;text-align:center;margin-bottom:11px}
.mbo2{display:flex;align-items:center;gap:10px;padding:12px 11px;background:var(--c2);border-radius:11px;margin-bottom:7px;cursor:pointer}
.mbo2:active{background:var(--c3)}
.mboi{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mbon{font-size:14px;font-weight:600}
.mbos{font-size:11px;color:var(--t2);margin-top:1px}
.mbc{width:100%;padding:12px;background:var(--c2);border-radius:11px;border:none;color:var(--t2);font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--green);color:#000;padding:8px 18px;border-radius:24px;font-weight:700;font-size:12px;opacity:0;transition:all .25s;z-index:999;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.sc>*{animation:fu .15s ease both}
.sc>*:nth-child(2){animation-delay:.04s}.sc>*:nth-child(3){animation-delay:.07s}.sc>*:nth-child(n+4){animation-delay:.1s}
.cp{background:rgba(255,55,95,.14);color:var(--pink)}
.cg{background:rgba(255,214,10,.11);color:var(--yellow)}
.cd{background:rgba(48,213,200,.11);color:var(--cyan)}
.cf{background:rgba(255,159,10,.11);color:var(--orange)}
.cv{background:rgba(168,255,62,.11);color:var(--green)}
.cfr{background:rgba(191,90,242,.11);color:var(--purple)}
.cl{background:rgba(10,132,255,.11);color:var(--blue)}
.co{background:rgba(255,255,255,.07);color:var(--t2)}

// ── DATE HELPERS ────────────────────────────────────────
function today(){
  const n=new Date();
  return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
}
function addDays(dateStr,n){
  const [y,m,d]=dateStr.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  dt.setDate(dt.getDate()+n);
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
}
function fmtD(d){
  const [y,m,dn]=d.split('-').map(Number);
  const td=today();
  const diff=Math.round((new Date(today().split('-')[0],today().split('-')[1]-1,today().split('-')[2])-new Date(y,m-1,dn))/864e5);
  if(diff===0)return["Aujourd'hui",""];
  if(diff===1)return["Hier",""];
  if(diff===-1)return["Demain",""];
  const dt=new Date(y,m-1,dn);
  return[dt.toLocaleDateString('fr-FR',{weekday:'long'}),dt.toLocaleDateString('fr-FR',{day:'numeric',month:'long'})];
}
function monthLabel(ym){
  const [y,m]=ym.split('-').map(Number);
  const dt=new Date(y,m-1,1);
  return dt.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
}
function daysInMonth(ym){
  const [y,m]=ym.split('-').map(Number);
  return new Date(y,m,0).getDate();
}
function firstDowOfMonth(ym){
  const [y,m]=ym.split('-').map(Number);
  return(new Date(y,m-1,1).getDay()+6)%7;
}
function calcBMR(pr){return Math.round(10*pr.w+6.25*pr.h-5*pr.age+5)}

function editQtyPreview(foodId,qty){
  const fd=FOODS.find(x=>x.id===foodId);if(!fd)return;
  const q=parseInt(qty)||0;
  const k=Math.round(fd.p.k*q/100);
  const el=document.getElementById('edit-qty-prev');
  if(el)el.textContent=k+' kcal · P:'+Math.round(fd.p.p*q/10)/10+'g G:'+Math.round(fd.p.g*q/10)/10+'g L:'+Math.round(fd.p.f*q/10)/10+'g';
}
function confirmEditFood(date,slot,idx){
  const qty=parseInt(document.getElementById('edit-qty-in')?.value)||0;
  if(qty>0){getDay(date)[slot][idx].qty=qty;saveS();}
  closeM('editmodal');render();
}

function confirmEditSession(idx){
  const s=getDay(S.date).sessions[idx];if(!s)return;
  const dur=parseFloat(document.getElementById('se_dur')?.value)||s.duration;
  s.duration=dur;
  if(s.type==='cardio'){
    const spd=parseFloat(document.getElementById('se_spd')?.value)||s.speed;
    s.speed=spd;s.distance=parseFloat((spd*dur/60).toFixed(2));
    s.kcal=Math.round(getRunMET(spd)*S.profile.w*(dur/60));
  } else if(s.type==='stair'){
    const steps=parseInt(document.getElementById('se_steps')?.value)||s.steps||0;
    s.steps=steps;s.kcal=Math.round(steps*0.17*(S.profile.w/70));
  } else {
    const kcal=parseInt(document.getElementById('se_kcal')?.value)||s.kcal;
    s.kcal=kcal;
  }
  saveS();closeM('sessedit');render();
}

function getDay(date){
  if(!S.log[date])S.log[date]={breakfast:[],lunch:[],dinner:[],snacks:[],drinks:[],steps:0,sessions:[],sleep:0,learning:0};
  const l=S.log[date];
  if(!l.sessions)l.sessions=[];if(!l.drinks)l.drinks=[];
  return l;
}
function calcM(items){
  let k=0,p=0,g=0,f=0;
  (items||[]).forEach(it=>{const fd=FOODS.find(x=>x.id===it.foodId);if(!fd)return;const m=it.qty/100;k+=fd.p.k*m;p+=fd.p.p*m;g+=fd.p.g*m;f+=fd.p.f*m;});
  return{k:Math.round(k),p:Math.round(p*10)/10,g:Math.round(g*10)/10,f:Math.round(f*10)/10};
}
function dayM(d){
  const l=getDay(d);
  return calcM([...l.breakfast,...l.lunch,...l.dinner,...l.snacks]);
}
function slotM(d,sl){return calcM(getDay(d)[sl]||[])}
function p01(v,g){return g>0?Math.min(1,v/g):0}
function stKcal(steps,w){return Math.round(steps*0.04*(w/70))}
function sessKcal(d){return(getDay(d).sessions||[]).reduce((a,s)=>a+s.kcal,0)}
function isFav(id){return S.fav.includes(id)}

function ring(prog,r,id,glow){

  return`<circle cx="100"cy="100"r="${r}"fill="none"stroke="rgba(255,255,255,.07)"stroke-width="13"/>

  stroke-dasharray="${c.toFixed(1)}"stroke-dashoffset="${o.toFixed(1)}"transform="rotate(-90 100 100)"
  style="transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1)"/>`;
}

// Success % logic: within ±10% = 100%, proportional otherwise
function successPct(val,goal){
  if(goal<=0)return 100;
  const ratio=val/goal;
  if(ratio>=0.9&&ratio<=1.1)return 100;
  if(ratio<0.9)return Math.round(ratio*100/0.9);
  // Over by more than 10%
  return Math.max(0,Math.round(200-ratio*100));
}
function calRingColor(val,goal){
  const ratio=val/goal;
  if(ratio>=0.9&&ratio<=1.1)return'#A8FF3E';
  if(ratio>=0.8||ratio<=1.2)return'#FFD60A';
  return'#FF375F';
}

function applyAutoMeals(date){
  if(!S.autoMeals||!S.autoMeals.length)return;
  const dow=(new Date(date+'T00:00:00').getDay()+6)%7;
  S.autoMeals.forEach(am=>{
    if(!am.active||!am.days||!am.days.includes(dow))return;
    const cm=S.cm.find(c=>c.id===am.cmId);if(!cm)return;
    const day=getDay(date);
    const slot=am.slot||'lunch';
    // Check if already applied (avoid duplicates)
    const alreadyApplied=day[slot]&&day[slot].length>0&&day._autoApplied&&day._autoApplied.includes(am.id);
    if(!alreadyApplied){
      cm.items.forEach(it=>day[slot].push({...it,_auto:am.id}));
      if(!day._autoApplied)day._autoApplied=[];
      day._autoApplied.push(am.id);
    }
  });
}

function renderObjectives(){
  const log=getDay(S.date);
  const data=[
    {id:'steps', l:'Pas',       v:log.steps||0,      g:S.objectives.steps,  u:'pas',  col:'var(--green)'},
    {id:'muscu', l:'Muscu',     v:(log.sessions||[]).filter(s=>s.type==='strength').length, g:S.objectives.muscu, u:'séance(s)', col:'var(--pink)'},
    {id:'sleep', l:'Sommeil',   v:log.sleep||0,       g:S.objectives.sleep,  u:'h',    col:'var(--purple)'},
    {id:'learn', l:'Learning',  v:log.learning||0,    g:S.objectives.learning,u:'h',   col:'var(--yellow)'},
  ];
  return`<div class="obj-section">
<div class="obj-title">Objectifs du jour</div>
<div class="obj-grid">${data.map(o=>{
  const pct=Math.min(100,p01(o.v,o.g)*100);
  const ok=o.v>=o.g;
  const disp=o.id==='steps'?(o.v).toLocaleString('fr'):o.v;
  const target=o.id==='steps'?(o.g).toLocaleString('fr'):o.g;
  return`<div class="obj-card"onclick="editObj('${o.id}')">
    <div class="obj-pct"style="color:${ok?'var(--green)':'var(--t3)'}">${ok?'✓':Math.round(pct)+'%'}</div>
    <div class="obj-card-lbl">${o.l}</div>
    <div class="obj-card-val"style="color:${o.col}">${disp}</div>
    <div class="obj-card-sub">/ ${target} ${o.u}</div>
    <div class="obj-bar"><div class="obj-fill"style="width:${pct}%;background:${o.col}"></div></div>
  </div>`;
}).join('')}
</div>
</div>`;
}

function editObj(id){
  const log=getDay(S.date);
  const labels={steps:'Pas du jour',muscu:'Séances muscu (auto-calculé)',sleep:'Sommeil (heures)',learn:'Learning (heures)'};
  if(id==='muscu'){toast('Auto-calculé depuis les séances sport');return;}
  const cur=id==='steps'?log.steps||0:id==='sleep'?log.sleep||0:log.learning||0;
  showInputModal(labels[id]||id,cur,(val)=>{
    const n=parseFloat(val)||0;
    if(id==='steps')log.steps=Math.max(0,Math.round(n));
    else if(id==='sleep')log.sleep=Math.max(0,Math.round(n*2)/2);
    else if(id==='learn')log.learning=Math.max(0,Math.round(n*2)/2);
    saveS();render();
  });
}

function cfgStep(idx,d){

  const nEl=document.getElementById('cfgn'+idx);if(nEl)nEl.textContent=nv;

}

function renderChart(data,unit,col){
  if(!data||data.length<2)return'';
  const vals=data.map(d=>d.v);
  const mx=Math.max(...vals)||1,mn=Math.min(0,...vals);
  const w=320,h=70,pad=6;
  const pts=data.map((d,i)=>{
    const x=pad+(w-pad*2)/(data.length-1)*i;
    const y=h-pad*2-(d.v-mn)/(mx-mn||1)*(h-pad*3);
    return x.toFixed(1)+','+y.toFixed(1);
  }).join(' ');
  const avg=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
  // store data globally for tooltip
  const key='_ct'+Date.now();
  window[key]=data;
  const circles=data.map((d,i)=>{
    const x=pad+(w-pad*2)/(data.length-1)*i;
    const y=h-pad*2-(d.v-mn)/(mx-mn||1)*(h-pad*3);
    const isMax=d.v===Math.max(...vals);
    const tipStr=d.l+' : '+d.v+' '+unit;
    return '<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+(isMax?5:3.5)+'" fill="'+(isMax?'#fff':col)+'" style="cursor:pointer" onclick="showTip(event,\''+tipStr.replace(/'/g,'\\\'')+'\')" />';
  }).join('');
  return '<div class="chart-wrap">'+
  '<div style="display:flex;justify-content:space-between;margin-bottom:6px">'+
  '<span style="font-size:11px;color:'+col+';font-weight:700">Max: '+Math.max(...vals)+' '+unit+'</span>'+
  '<span style="font-size:11px;color:var(--t2)">Moy: '+avg+'</span></div>'+
  '<svg width="100%" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" overflow="visible">'+
  '<defs><linearGradient id="cg'+col.replace(/[^a-z]/gi,'')+'" x1="0" y1="0" x2="0" y2="1">'+
  '<stop offset="0%" stop-color="'+col+'" stop-opacity="0.25"/>'+
  '<stop offset="100%" stop-color="'+col+'" stop-opacity="0.02"/></linearGradient></defs>'+
  '<polygon points="'+pts+' '+(w-pad).toFixed(1)+','+(h-pad*2).toFixed(1)+' '+pad+','+(h-pad*2).toFixed(1)+'" fill="url(#cg'+col.replace(/[^a-z]/gi,'')+')" stroke="none"/>'+
  '<polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'+
  circles+
  '</svg><div style="font-size:10px;color:var(--t3);text-align:center;margin-top:4px">Touche un point pour voir le détail</div></div>';
}
function renderChartPace(data){
  if(!data||data.length<2)return'';
  const vals=data.map(d=>d.pace);
  const mx=Math.max(...vals)||1,mn=Math.min(...vals);
  const w=320,h=70,pad=6;
  const pts=data.map((d,i)=>{
    const x=pad+(w-pad*2)/(data.length-1)*i;
    const y=pad+(d.pace-mn)/(mx-mn||1)*(h-pad*3);
    return x.toFixed(1)+','+y.toFixed(1);
  }).join(' ');
  const avgPace=vals.reduce((a,b)=>a+b,0)/vals.length;
  const ap=Math.floor(avgPace),aps=Math.round((avgPace%1)*60);
  const bestPace=Math.min(...vals);
  const bp=Math.floor(bestPace),bps=Math.round((bestPace%1)*60);
  const circles=data.map((d,i)=>{
    const x=pad+(w-pad*2)/(data.length-1)*i;
    const y=pad+(d.pace-mn)/(mx-mn||1)*(h-pad*3);
    const pm=Math.floor(d.pace),ps=Math.round((d.pace%1)*60);
    const isBest=d.pace===bestPace;
    const tip=d.l+' : '+pm+'\''+String(ps).padStart(2,'0')+'\'\'  /km';
    return '<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+(isBest?5:3.5)+'" fill="'+(isBest?'#fff':'var(--cyan)')+'" style="cursor:pointer" onclick="showTip(event,\''+tip.replace(/'/g,'\\\'')+'\')" />';
  }).join('');
  return '<div class="chart-wrap">'+
  '<div style="display:flex;justify-content:space-between;margin-bottom:6px">'+
  '<span style="font-size:11px;color:var(--cyan);font-weight:700">Meilleur: '+bp+'\''+String(bps).padStart(2,'0')+'\'\'</span>'+
  '<span style="font-size:11px;color:var(--t2)">Moy: '+ap+'\''+String(aps).padStart(2,'0')+'\'\'</span></div>'+
  '<svg width="100%" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" overflow="visible">'+
  '<defs><linearGradient id="cgcyan" x1="0" y1="0" x2="0" y2="1">'+
  '<stop offset="0%" stop-color="var(--cyan)" stop-opacity="0.25"/>'+
  '<stop offset="100%" stop-color="var(--cyan)" stop-opacity="0.02"/></linearGradient></defs>'+
  '<polygon points="'+pts+' '+(w-pad).toFixed(1)+','+(h-pad*2).toFixed(1)+' '+pad+','+(h-pad*2).toFixed(1)+'" fill="url(#cgcyan)" stroke="none"/>'+
  '<polyline points="'+pts+'" fill="none" stroke="var(--cyan)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'+
  circles+
  '</svg><div style="font-size:10px;color:var(--t3);text-align:center;margin-top:4px">Touche un point pour voir le détail</div></div>';
}
function renderStepsGauge(days30){
  // 30-day steps gauge - horizontal bars with fuel gauge style
  const goal=S.objectives.steps||7000;
  const w=288,barH=7,gap=3;
  const totalH=(barH+gap)*30+20;
  const maxSteps=Math.max(goal*1.3,...days30.map(d=>(getDay(d).steps||0)));
  let bars='';
  const td=today();
  const _barTips=[];window._barTipsGlobal=[];
  days30.forEach((d,i)=>{
    const steps=getDay(d).steps||0;
    if(steps===0)return;
    const ratio=Math.min(1,steps/maxSteps);
    const goalRatio=Math.min(1,goal/maxSteps);
    const y=i*(barH+gap);
    const barW=Math.max(4,Math.min(w-2,ratio*w));
    const isToday=d===td;
    const pct=steps/goal;
    const col=pct>=1?'#A8FF3E':pct>=0.7?'#FFD60A':'#FF375F';
    const kcalBurned=stKcal(steps,S.profile.w);
    const tipTxt=d.slice(5)+' · '+(steps>=1000?(steps/1000).toFixed(1)+'k':steps)+' pas · '+kcalBurned+' kcal';
    _barTips.push(tipTxt);window._barTipsGlobal.push(tipTxt);
    // Today label always visible
    // Smart label: inside bar if wide, outside if narrow
    const lblTxt=(steps>=1000?(steps/1000).toFixed(1)+'k':steps)+' pas';
    const lblInside=barW>w*0.6;
    const lblX=lblInside?(barW-3).toFixed(1):(Math.min(barW+3,w-lblTxt.length*4.5)).toFixed(1);
    const lblAnchor=lblInside?'end':'start';
    const lblFill=lblInside?'#000':col;
    const lbl=isToday?'<text x="'+lblX+'" y="'+(y+barH-1)+'" text-anchor="'+lblAnchor+'" font-size="7" fill="'+lblFill+'" font-family="DM Sans,sans-serif" font-weight="700" clip-path="url(#gcl)">'+lblTxt+'</text>':'';
    bars+='<rect x="0" y="'+y+'" width="'+barW.toFixed(1)+'" height="'+barH+'" rx="'+(barH/2)+'" fill="'+col+'" opacity="'+(isToday?'1':'0.75')+'" style="cursor:pointer" onclick="showStepTip(event,'+i+')" />';
    bars+='<line x1="'+(goalRatio*w).toFixed(1)+'" y1="'+y+'" x2="'+(goalRatio*w).toFixed(1)+'" y2="'+(y+barH)+'" stroke="rgba(255,255,255,.25)" stroke-width="1" stroke-dasharray="2"/>';
    bars+=lbl;
  });
  const weekSteps=days30.slice(-7).reduce((a,d)=>a+(getDay(d).steps||0),0);
  const weekKcal=stKcal(weekSteps,S.profile.w);
  const daysHitGoal=days30.filter(d=>(getDay(d).steps||0)>=goal).length;
  return`<div class="chart-wrap">
<div style="font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">Historique 30 jours</div>
<div style="display:flex;gap:8px;margin-bottom:10px">
  <div style="flex:1;background:var(--c2);border-radius:10px;padding:8px;text-align:center">
    <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--green)">${weekKcal}</div>
    <div style="font-size:10px;color:var(--t2);margin-top:1px">kcal brûlés/sem</div>
  </div>
  <div style="flex:1;background:var(--c2);border-radius:10px;padding:8px;text-align:center">
    <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--yellow)">${daysHitGoal}</div>
    <div style="font-size:10px;color:var(--t2);margin-top:1px">jours ≥ ${(goal/1000).toFixed(0)}k pas</div>
  </div>
  <div style="flex:1;background:var(--c2);border-radius:10px;padding:8px;text-align:center">
    <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--cyan)">${Math.round(weekSteps/7/1000*10)/10}k</div>
    <div style="font-size:10px;color:var(--t2);margin-top:1px">moy./jour</div>
  </div>
</div>
<div style="position:relative">
  <div style="font-size:10px;color:var(--t3);margin-bottom:4px;display:flex;justify-content:space-between">
    <span>Aujourd'hui</span><span>Il y a 30 jours</span>
  </div>
  <svg width="100%" viewBox="0 0 ${w} ${totalH}" preserveAspectRatio="xMidYMid meet" overflow="hidden">
    ${bars}
  </svg>
  <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:#A8FF3E"></div><span style="font-size:10px;color:var(--t2)">Objectif atteint</span></div>

function renderMonthBalance(ym){
  const [yr,mo]=ym.split('-').map(Number);
  const dInM=new Date(yr,mo,0).getDate();
  const td=today(), todayYM=td.slice(0,7);
  const isCur=ym===todayYM;
  const lastDay=isCur?parseInt(td.split('-')[2]):dInM;
  const mdays=[];
  for(let d=1;d<=lastDay;d++)
    mdays.push(yr+'-'+String(mo).padStart(2,'0')+'-'+String(d).padStart(2,'0'));
  const logged=mdays.filter(d=>dayM(d).k>0);
  if(!logged.length)return'<div class="chart-wrap" style="text-align:center;font-size:12px;color:var(--t2)">Aucune donnée ce mois</div>';
  const totalIn=logged.reduce((a,d)=>a+dayM(d).k,0);
  const br2=calcBMR(S.profile);
  const totalOut=logged.reduce((a,d)=>a+br2+stKcal(getDay(d).steps||0,S.profile.w)+sessKcal(d),0);
  const net=totalIn-totalOut;
  const netPct=totalOut>0?net/totalOut*100:0;
  const inGreen=Math.abs(netPct)<=5;
  const nc=inGreen?'var(--green)':net<=0?'var(--green)':'var(--pink)';
  const wc=net/7700;
  const wcCol=wc<=0?'var(--green)':'var(--pink)';
  const avg=Math.round(totalIn/logged.length);
  const dRem=dInM-lastDay;
  const projBal=net+(dRem*(S.goals.kcal-br2));
  const projW=projBal/7700;
  const pCol=projW<=0?'var(--green)':'var(--pink)';
  return `<div class="chart-wrap" style="margin-top:4px">
  <div style="font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px">Balance du mois · ${monthLabel(ym)}</div>

      <div style="font-size:10px;color:var(--t2);margin-top:2px">réalisé</div>
    </div>
    <div style="flex:1;background:var(--c2);border-radius:10px;padding:9px 8px;text-align:center">
      <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--cyan)">${avg}</div>
      <div style="font-size:10px;color:var(--t2);margin-top:2px">kcal/j moy.</div>
    </div>
  </div>
  ${dRem>0?`<div style="background:var(--c2);border-radius:10px;padding:9px 12px;display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:12px;color:var(--t2)">Projection fin de mois</span>

      ${isTd?`<circle cx="18"cy="18"r="17"fill="none"stroke="rgba(255,255,255,.2)"stroke-width="1.5"/>`:''}
      <circle cx="18"cy="18"r="14"fill="none"stroke="rgba(255,255,255,.08)"stroke-width="5"/>
      ${hasData?`<circle cx="18"cy="18"r="14"fill="none"stroke="${rcol}"stroke-width="5"stroke-linecap="round"stroke-dasharray="${c.toFixed(1)}"stroke-dashoffset="${o.toFixed(1)}"transform="rotate(-90 18 18)"/>`:''}
      <text x="18"y="22"text-anchor="middle"font-size="${isTd?11:10}"font-weight="${isTd?700:500}"fill="${isTd?'#fff':hasData?'rgba(255,255,255,.7)':'rgba(255,255,255,.3)'}"font-family="DM Sans,sans-serif">${dn}</text>
    </svg></div>`;
  }).join('');

  const days30=[];for(let i=29;i>=0;i--){days30.push(addDays(today(),-i));}
  const last7=days30.slice(-7).filter(d=>dayM(d).k>0);
  const avg7=last7.length?Math.round(last7.reduce((a,d)=>a+dayM(d).k,0)/last7.length):0;
  const streak=calcStreak();
  const goaldDays=days30.filter(d=>{const mv=dayM(d);return mv.k>0&&mv.k/S.goals.kcal>=0.9&&mv.k/S.goals.kcal<=1.1}).length;

  return`<div class="sc">
<div class="bh"><button class="bk"onclick="back()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Retour</button>
  <div class="bht">Calendrier</div></div>
<div class="cal-stats">
  <div class="cstat"><div class="cstat-v"style="color:var(--green)">${streak}</div><div class="cstat-l">Streak</div></div>
  <div class="cstat"><div class="cstat-v"style="color:var(--cyan)">${avg7||'—'}</div><div class="cstat-l">Moy. 7j (kcal)</div></div>
  <div class="cstat"><div class="cstat-v"style="color:var(--yellow)">${goaldDays}</div><div class="cstat-l">Objectifs/30j</div></div>
</div>
<div class="cal-nav">
  <button class="cal-nav-btn"onclick="calMonth(-1)">‹</button>
  <div class="cal-nav-lbl">${monthLabel(ym)}</div>
  <button class="cal-nav-btn"onclick="calMonth(1)">›</button>
</div>
<div class="cal-dow"><div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div>S</div><div>D</div></div>
<div class="cal-grid">${calGrid}</div>
<div class="cal-legend">
  <div class="leg"><div class="legdot"style="background:var(--green)"></div>±10% objectif</div>
  <div class="leg"><div class="legdot"style="background:var(--yellow)"></div>≥80%</div>
  <div class="leg"><div class="legdot"style="background:var(--pink)"></div>Manqué/Dépassé</div>
</div>
${renderMonthBalance(ym)}
<div style="height:16px"></div>
</div>${nav('calendar')}`;
}
function calMonth(d){
  const [y,m]=S.calMonth.split('-').map(Number);
  const dt=new Date(y,m-1+d,1);
  S.calMonth=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');
  render();
}
function calcStreak(){
  let s=0,d=today();
  while(true){if(dayM(d).k>0)s++;else break;d=addDays(d,-1);}
  return s;
}

async function doLogin(){
  const email=document.getElementById('auth-email')?.value;
  const pw=document.getElementById('auth-pw')?.value;
  if(!email||!pw){setAuthErr('Remplis tous les champs');return;}
  // Try Supabase if available
  try{
    if(sbClient&&SB_KEY!=='YOUR_SUPABASE_ANON_KEY'){
      const{data,error}=await sbClient.auth.signInWithPassword({email,password:pw});
      if(error)throw error;
      S.user={email:data.user.email,id:data.user.id};saveS();toast('Connecté');back();return;
    }
  }catch(e){setAuthErr(e.message||'Erreur de connexion');return;}
  // Fallback: localStorage auth
  const stored=JSON.parse(localStorage.getItem('nc_users')||'{}');
  if(stored[email]&&stored[email].pw===btoa(pw)){
    S.user={email,name:email.split('@')[0]};saveS();toast('Connecté (local)');back();
  }else setAuthErr('Email ou mot de passe incorrect');
}
async function doRegister(){
  const email=document.getElementById('auth-email')?.value?.trim();
  const pw=document.getElementById('auth-pw')?.value;
  const pw2=document.getElementById('auth-pw2')?.value;
  if(!email||!email.includes('@')){setAuthErr('Email invalide');return;}
  if(!pw||pw.length<6){setAuthErr('Mot de passe : 6 caractères minimum');return;}
  if(pw!==pw2){setAuthErr('Les mots de passe ne correspondent pas');return;}
  try{
    if(sbClient&&SB_KEY!=='YOUR_SUPABASE_ANON_KEY'){
      const{data,error}=await sbClient.auth.signUp({email,password:pw});
      if(error)throw error;
      S.user={email:data.user.email,id:data.user.id};saveS();toast('Compte créé !');back();return;
    }
  }catch(e){setAuthErr(e.message||'Erreur');return;}
  const stored=JSON.parse(localStorage.getItem('nc_users')||'{}');
  stored[email]={pw:btoa(pw)};localStorage.setItem('nc_users',JSON.stringify(stored));
  S.user={email,name:email.split('@')[0]};saveS();toast('Compte créé (local)');back();
}
function setAuthErr(msg){const el=document.getElementById('auth-err');if(el)el.textContent=msg;}
async function doForgot(){
  const email=document.getElementById('auth-email')?.value?.trim();
  if(!email||!email.includes('@')){setAuthErr('Email invalide');return;}
  try{
    if(typeof sbClient!=='undefined'&&sbClient&&SB_KEY!=='YOUR_SUPABASE_ANON_KEY'){
      await sbClient.auth.resetPasswordForEmail(email,{redirectTo:window.location.href});
    }
  }catch(e){}
  S.authMode='reset';render();
}

function toggleFav(id,e){
  e.stopPropagation();
  const i=S.fav.indexOf(id);if(i>=0)S.fav.splice(i,1);else S.fav.push(id);

  if(e.target)e.target.textContent=isFav(id)?'★':'☆';

// ── ACTIONS ────────────────────────────────────────────
function chDate(d){
  const ns=addDays(S.date,d);
  if(d>0&&ns>today())return; // block future beyond today
  S.date=ns;
  applyAutoMeals(S.date);
  render();
}
function gotoDate(date){S.date=date;S.stack=[];S.view='home';applyAutoMeals(date);render()}
function pickFood(id,slot){const fd=FOODS.find(x=>x.id===id);S.gr=fd&&fd.dq?fd.dq:100;go('food-qty',{foodId:id,slot})}
function confAdd(slot,foodId){getDay(S.date)[slot].push({foodId,qty:S.gr});saveS();toast('Ajouté');S.stack=[];S.view='home';S.sq='';render()}
function confAddCm(){
  const slot=S.configSlot||S.vd?.slot;
  if(!slot)return;
  const day=getDay(S.date);
  S.configItems.forEach(it=>day[slot].push({...it}));
  saveS();toast('Repas ajouté');S.stack=[];S.view='home';S.sq='';render();
}
function addToCm(foodId){
  S.bmi.push({foodId,qty:S.gr});
  while(S.stack.length&&S.stack[S.stack.length-1].view!=='build-meal')S.stack.pop();
  if(S.stack.length){const p=S.stack.pop();S.view=p.view;S.vd=p.vd;render()}else{S.view='build-meal';render()}
}
function delItem(date,slot,idx){getDay(date)[slot].splice(idx,1);saveS();render()}
function addCm(cmId,slot){const c=S.cm.find(x=>x.id===cmId);if(!c)return;const day=getDay(S.date);c.items.forEach(it=>day[slot].push({...it}));saveS();toast('Ajouté');S.stack=[];S.view='home';S.sq='';render()}
function delFromCm(cmId,idx){const c=S.cm.find(x=>x.id===cmId);if(!c)return;c.items.splice(idx,1);saveS();render()}
function delCm(cmId){if(!confirm('Supprimer ?'))return;S.cm=S.cm.filter(x=>x.id!==cmId);saveS();back()}
function startBuild(){S.bmi=[];S.bmn='';go('build-meal')}
function rmBmi(idx){S.bmi.splice(idx,1);render()}
function saveBuild(){
  if(!S.bmn.trim()||!S.bmi.length)return;
  S.cm.push({id:'cm_'+Date.now(),name:S.bmn.trim(),items:[...S.bmi]});
  saveS();toast('Repas enregistré');S.bmi=[];S.bmn='';S.stack=[];S.view='cm-list';render();
}
function saveCardio(dur,spd,kcal,dist){getDay(S.date).sessions.push({type:'cardio',duration:dur,speed:spd,kcal,distance:dist});saveS();toast('Course enregistrée');S.sdur='';S.sspd='';back()}
function saveStair(dur,spd,kcal,steps){getDay(S.date).sessions.push({type:'stair',duration:dur,speed:spd,kcal,steps});saveS();toast('Escalier enregistré');S.sdur='';S.sspd='';back()}
function saveStr(dur,kcal,hc,cdur,cspd,ckcal,cdist){
  getDay(S.date).sessions.push({type:'strength',duration:dur,kcal:kcal+(hc?ckcal:0),muscleType:S.smType,hasCardio:hc,cardioKm:cdist});
  saveS();toast('Séance enregistrée');S.sdur='';S.skcal='';S.shc=false;S.scdur='';S.scspd='';S.smType=null;back();
}
function delSess(idx){getDay(S.date).sessions.splice(idx,1);saveS();render()}
function refresh(){goHome()}
function clearAll(){if(!confirm('Réinitialiser toutes les données ?'))return;S.log={};S.cm=PRESETS.map(p=>({...p,items:p.items.map(i=>({...i}))}));S.fav=[];S.autoMeals=[];saveS();render()}

// ── TOOLTIP ──────────────────────────────────────────────────────────────
function showTip(event,text){
  let t=document.getElementById('chart-tip');
  if(!t){
    t=document.createElement('div');t.id='chart-tip';
    t.style.cssText='position:fixed;background:#2C2C2E;border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:7px 13px;font-size:12px;font-weight:600;color:#fff;z-index:500;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.4)';
    document.body.appendChild(t);
  }
  t.textContent=text;t.style.display='block';t.style.opacity='1';
  const x=Math.min(event.clientX+6,window.innerWidth-165);
  const y=Math.max(10,event.clientY-46);
  t.style.left=x+'px';t.style.top=y+'px';
  clearTimeout(window._tipT);
  window._tipT=setTimeout(()=>{t.style.opacity='0';setTimeout(()=>{if(t)t.style.display='none';},160);},2800);
}
// Used by step gauge bars (index passed to avoid inline quote escaping)
window._barTipsGlobal=[];
function showStepTip(event,idx){
  if(window._barTipsGlobal&&window._barTipsGlobal[idx])showTip(event,window._barTipsGlobal[idx]);
}

// ── SUIVI MENSUEL ─────────────────────────────────────────────────────────
function vSuivi(){
  const ym=S.suiviMonth;
  const [yr,mo]=ym.split('-').map(Number);
  const dInM=new Date(yr,mo,0).getDate();
  const td=today();
  const todayYM=td.slice(0,7);
  const isCurMonth=ym===todayYM;
  const lastDay=isCurMonth?parseInt(td.split('-')[2]):dInM;
  const monthDays=[];
  for(let d=1;d<=lastDay;d++)
    monthDays.push(yr+'-'+String(mo).padStart(2,'0')+'-'+String(d).padStart(2,'0'));

  const calLogged=monthDays.filter(d=>{const m=dayM(d);return m.k>0;});
  const calOk=monthDays.filter(d=>{const m=dayM(d);return m.k>0&&m.k>=S.goals.kcal*0.9&&m.k<=S.goals.kcal*1.1;});
  const calPct=calLogged.length>0?Math.round(calOk.length/calLogged.length*100):0;

  const sleepLogged=monthDays.filter(d=>(getDay(d).sleep||0)>0);
  const sleepOk=monthDays.filter(d=>(getDay(d).sleep||0)>=S.objectives.sleep);
  const sleepPct=sleepLogged.length>0?Math.round(sleepOk.length/sleepLogged.length*100):0;

  // Rolling 30 days + pace-based %
  const last30=[];for(let _i=0;_i<30;_i++)last30.push(addDays(td,-_i));
  const muscuTotal=last30.reduce((a,d)=>a+(getDay(d).sessions||[]).filter(s=>s.type==='strength').length,0);
  const muscuTarget=25;
  // daysElapsed: days in current month up to today
  const daysElapsed=Math.max(1,lastDay);
  const expectedSoFar=muscuTarget*daysElapsed/30; // pro-rated target
  const muscuPct=Math.min(100,Math.round(muscuTotal/expectedSoFar*100));
  const muscuByType=MTYPES.map(mt=>({...mt,count:monthDays.reduce((a,d)=>a+(getDay(d).sessions||[]).filter(s=>s.type==='strength'&&s.muscleType===mt.id).length,0)}));

  const workLogged=monthDays.filter(d=>(getDay(d).learning||0)>0);
  const workOk=monthDays.filter(d=>(getDay(d).learning||0)>=S.objectives.learning);
  const workPct=workLogged.length>0?Math.round(workOk.length/workLogged.length*100):0;

  function miniRing(pct,sz){
    sz=sz||56;const r=(sz-10)/2,cx=sz/2,cy=sz/2;
    const ci=2*Math.PI*r,off=ci*(1-Math.min(1,pct/100));
    const col=pct>=90?'#A8FF3E':pct>=60?'#FFD60A':'#FF375F';
    return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 '+sz+' '+sz+'"><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="5"/><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="5" stroke-linecap="round" stroke-dasharray="'+ci.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'" transform="rotate(-90 '+cx+' '+cy+')"/><text x="'+cx+'" y="'+(cy+4)+'" text-anchor="middle" font-size="11" font-weight="800" fill="'+col+'" font-family="Syne,sans-serif">'+pct+'%</text></svg>';
  }

  const cards=[
    {id:'cal',  label:'Alimentation',pct:calPct,  sub:calOk.length+'/'+calLogged.length+' jours dans l\'objectif (±10%)'},
    {id:'sleep',label:'Sommeil',     pct:sleepPct,sub:sleepOk.length+'/'+sleepLogged.length+' jours >= '+S.objectives.sleep+'h'},
    {id:'muscu',label:'Muscu',       pct:muscuPct,sub:muscuTotal+'/'+muscuTarget+' séances ce mois'},
    {id:'work', label:'Learning',    pct:workPct, sub:workOk.length+'/'+workLogged.length+' jours >= '+S.objectives.learning+'h'},
  ];

  function cardExpand(id){
    if(id==='muscu'){
      return '<div style="padding:10px 12px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:6px">'+
      muscuByType.map(mt=>'<div style="display:flex;align-items:center;justify-content:space-between"><span style="font-size:13px">'+mt.l+'</span><span style="font-size:13px;font-weight:700;color:'+mt.col+'">'+mt.count+' séance'+(mt.count!==1?'s':'')+'</span></div>').join('')+
      '</div>';
    }
    const getDayArr=()=>{
      if(id==='cal')return monthDays.map(d=>{const m=dayM(d);return{d,ok:m.k>0&&m.k>=S.goals.kcal*0.9&&m.k<=S.goals.kcal*1.1,has:m.k>0,val:m.k>0?m.k+' kcal':'—'};});
      if(id==='sleep')return monthDays.map(d=>{const v=getDay(d).sleep||0;return{d,ok:v>=S.objectives.sleep,has:v>0,val:v>0?v+'h':'—'};});
      return monthDays.map(d=>{const v=getDay(d).learning||0;return{d,ok:v>=S.objectives.learning,has:v>0,val:v>0?v+'h':'—'};});
    };
    const arr=getDayArr();
    return '<div style="padding:8px 12px;border-top:1px solid var(--bd)">'+
    '<div style="display:flex;flex-wrap:wrap;gap:5px">'+
    arr.map(x=>{
      const dn=parseInt(x.d.split('-')[2]);
      const bg=x.ok?'var(--green)':x.has?'rgba(255,55,95,.3)':'rgba(255,255,255,.06)';
      const tc=x.ok?'#000':x.has?'#fff':'rgba(255,255,255,.25)';
      return '<div onclick="gotoDate(\''+x.d+'\')" title="'+x.val+'" style="width:30px;height:30px;border-radius:8px;background:'+bg+';display:flex;align-items:center;justify-content:center;cursor:pointer"><span style="font-size:10px;font-weight:700;color:'+tc+'">'+dn+'</span></div>';
    }).join('')+
    '</div><div style="font-size:11px;color:var(--t2);margin-top:6px">Vert = objectif atteint · Rouge = loggué mais insuffisant</div></div>';
  }

  const globalPct=Math.round((calPct+sleepPct+muscuPct+workPct)/4);
  const gcol=globalPct>=80?'var(--green)':globalPct>=60?'var(--yellow)':'var(--pink)';

  const prevYM=()=>{const[y,m]=ym.split('-').map(Number);const d=new Date(y,m-2,1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');};
  const nextYM=()=>{const[y,m]=ym.split('-').map(Number);const d=new Date(y,m,1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');};
  const canNext=nextYM()<=todayYM;

  const cardsHtml=cards.map(card=>{
    const isOpen=S.suiviOpen===card.id;
    const pcol=card.pct>=90?'var(--green)':card.pct>=60?'var(--yellow)':'var(--pink)';
    return '<div style="background:var(--c1);border-radius:14px;overflow:hidden;margin:0 14px 8px">'+
    '<div onclick="S.suiviOpen=S.suiviOpen===\''+card.id+'\'?null:\''+card.id+'\';render()" style="display:flex;align-items:center;padding:12px 13px;cursor:pointer;gap:12px">'+
    miniRing(card.pct,56)+
    '<div style="flex:1"><div style="font-size:14px;font-weight:700">'+card.label+'</div>'+
    '<div style="font-size:11px;color:var(--t2);margin-top:3px">'+card.sub+'</div></div>'+
    '<div style="font-size:12px;color:var(--t3)">'+(isOpen?'▲':'▼')+'</div>'+
    '</div>'+(isOpen?cardExpand(card.id):'')+
    '</div>';
  }).join('');

  return '<div class="sc">'+
  '<div class="bh"><div class="bht">Suivi mensuel</div></div>'+
  '<div style="background:var(--c1);border-radius:14px;margin:4px 14px 10px;padding:14px;display:flex;align-items:center;gap:12px">'+
  '<div style="flex-shrink:0">'+miniRing(globalPct,64)+'</div>'+
  '<div style="flex:1"><div style="font-family:\'Syne\',sans-serif;font-size:16px;font-weight:800">Score global</div>'+
  '<div style="font-size:12px;color:var(--t2);margin-top:3px">'+monthLabel(ym)+'</div>'+
  '<div style="font-size:11px;color:'+gcol+';margin-top:4px;font-weight:600">'+(globalPct>=80?'En forme':globalPct>=60?'Bonne progression':'À améliorer')+'</div></div>'+
  '<div style="display:flex;gap:7px">'+
  '<button onclick="S.suiviMonth=\''+prevYM()+'\';S.suiviOpen=null;render()" style="background:var(--c2);border:none;cursor:pointer;color:var(--cyan);font-size:18px;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0">‹</button>'+
  '<button '+(canNext?"onclick=\"S.suiviMonth='"+nextYM()+"';S.suiviOpen=null;render()\"":'disabled')+' style="background:var(--c2);border:none;cursor:pointer;color:'+(canNext?'var(--cyan)':'var(--t3)')+';font-size:18px;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0">›</button>'+
  '</div></div>'+
  cardsHtml+
  '<div style="height:16px"></div>'+
  '</div>'+nav('suivi');
}

const VIEWS={
  home:vHome,calendar:vCalendar,
  'food-search':vFoodSearch,'food-qty':vFoodQty,'config-meal':vConfigMeal,
  'cm-list':vCmList,'cm-detail':vCmDetail,'build-meal':vBuildMeal,
  'auto-meals':vAutoMeals,
  activity:vActivity,'log-sport':vLogSport,
  history:vHistory,settings:vSettings,auth:vAuth,suivi:vSuivi,
};

  const _sc=document.querySelector('.sc');
  const _st=_sc?_sc.scrollTop:0;
  document.getElementById('app').innerHTML=(VIEWS[S.view]||vHome)();

  if(S.view==='food-search')afterFoodSearch();
}
loadS();render();

<style>
/* ============================================================
   NUTRICORE BIOHACK · DA Rise Science adapted
   Hanken Grotesk + IBM Plex Mono
   Dark mode absolu · orange→red glow gradients
============================================================ */

:root {
  --bg: #000000;
  --bg-elev: #0a0a0a;
  --card: #121212;
  --card-2: #161616;
  --card-3: #1a1a1a;
  --line: #1f1f1f;
  --line-bright: #2a2a2a;
  --line-dim: #141414;
  --fg: #ffffff;
  --fg-dim: #a8a8a8;
  --fg-mute: #5a5a5a;
  --fg-faint: #2e2e2e;

  --hot-1: #FFB347;
  --hot-2: #FF8C00;
  --hot-3: #E5511A;
  --hot-4: #B92D2D;
  --hot-5: #6B1A1A;

  --ok: #4ADE80;
  --warn: #FF3838;

  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);

  --maxw: 540px;
  --gap: 14px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--bg);
  color: var(--fg);
  font-family: 'Hanken Grotesk', system-ui, -apple-system, sans-serif;
  font-weight: 500;
  letter-spacing: -0.005em;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  padding-top: var(--safe-top);
  padding-bottom: calc(110px + var(--safe-bot));
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255, 140, 0, 0.06), transparent 70%),
    radial-gradient(ellipse 60% 40% at 50% 100%, rgba(185, 45, 45, 0.03), transparent 60%),
    var(--bg);
  background-attachment: fixed;
}

input, button, textarea, select { font-family: inherit; color: inherit; }
button { background: none; border: none; cursor: pointer; color: inherit; }
input { background: none; border: none; outline: none; color: var(--fg); }
input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; }

#app { position: relative; }

.mono { font-family: 'IBM Plex Mono', monospace; font-feature-settings: 'zero'; }
.tab-num { font-variant-numeric: tabular-nums; }
.dim { color: var(--fg-mute); }
.warn { color: var(--warn); }

/* ============ TOPBAR ============ */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 18px 12px;
  position: relative;
  z-index: 10;
  gap: 10px;
}
.brand {
  font-weight: 800;
  font-size: 11px;
  letter-spacing: 0.24em;
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 0 0 auto;
}
.brand-logo {
  width: 24px;
  height: 24px;
  border-radius: 6px;
  object-fit: cover;
  flex: 0 0 24px;
  margin-right: 6px;
  border: 1px solid var(--line-bright);
  background: var(--card-2);
}
.brand-logo-large {
  width: 64px;
  height: 64px;
  border-radius: 14px;
  object-fit: cover;
  display: block;
  margin: 0 auto 14px;
  border: 1px solid var(--line-bright);
  box-shadow: 0 0 18px rgba(255, 140, 0, 0.18);
}
.brand .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--hot-2);
  box-shadow: 0 0 12px var(--hot-2), 0 0 24px var(--hot-2);
  animation: pulse 2.4s ease-in-out infinite;
  display: inline-block;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.55; transform: scale(0.8); }
}
.date-pill {
  font-size: 10.5px;
  letter-spacing: 0.18em;
  color: var(--fg-dim);
  text-transform: uppercase;
  flex: 1;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.iconbtn {
  width: 36px; height: 36px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 50%;
  color: var(--fg-dim);
  transition: all 0.15s ease;
  flex: 0 0 auto;
}
.iconbtn:hover { color: var(--fg); background: var(--card); }
.iconbtn:active { transform: scale(0.94); }
.iconbtn svg { width: 18px; height: 18px; }
.iconbtn.avatar {
  background: linear-gradient(135deg, var(--hot-2), var(--hot-4));
  color: var(--bg);
  font-weight: 800;
  font-size: 13px;
  letter-spacing: -0.02em;
}

/* ============ DAY NAV (chips) ============ */
.day-nav-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 4px 18px 8px;
}
.day-nav-bar button {
  height: 32px;
  padding: 0 14px;
  border-radius: 16px;
  background: var(--card);
  border: 1px solid var(--line);
  color: var(--fg-dim);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.14em;
  font-weight: 500;
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px;
  transition: all 0.15s ease;
}
.day-nav-bar button:hover { color: var(--fg); border-color: var(--line-bright); }
.day-nav-bar button:active { transform: scale(0.96); }
.day-nav-bar button.today {
  background: linear-gradient(135deg, var(--hot-1), var(--hot-3));
  color: var(--bg);
  border-color: transparent;
  box-shadow: 0 0 16px rgba(255, 140, 0, 0.35);
}
.day-nav-bar button[aria-label] { width: 32px; padding: 0; }
.day-nav-bar button svg { width: 14px; height: 14px; }

/* ============ HERO (ring) ============ */
.hero {
  height: 56vh;
  min-height: 420px;
  max-height: 580px;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 24px 16px;
}
.hero::before {
  content: '';
  position: absolute;
  width: 90vw;
  max-width: 600px;
  aspect-ratio: 1;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle at center,
    rgba(255, 140, 0, 0.16) 0%,
    rgba(229, 81, 26, 0.06) 35%,
    transparent 70%);
  filter: blur(40px);
  z-index: 0;
  pointer-events: none;
  animation: heroBreath 6s ease-in-out infinite;
}
@keyframes heroBreath {
  0%, 100% { opacity: 0.85; transform: translate(-50%, -50%) scale(1); }
  50% { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
}
.ring-wrap {
  position: relative;
  width: 320px;
  max-width: 78vw;
  aspect-ratio: 1;
  z-index: 1;
}
.ring-svg {
  width: 100%; height: 100%;
  filter: drop-shadow(0 0 24px rgba(255, 140, 0, 0.4));
}
.ring-svg.over { filter: drop-shadow(0 0 28px rgba(255, 56, 56, 0.5)); }
.ring-progress {
  transition: stroke-dashoffset 0.9s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.ring-dot {
  animation: dotPulse 2.4s ease-in-out infinite;
}
@keyframes dotPulse { 0%,100% { r: 4; } 50% { r: 5.5; } }

.ring-center {
  position: absolute;
  inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  pointer-events: none;
}
.kcal-num {
  font-weight: 900;
  font-size: clamp(64px, 16vw, 104px);
  line-height: 0.92;
  letter-spacing: -0.05em;
  background: linear-gradient(180deg, #fff 0%, #fff 50%, #c8c8c8 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
.kcal-label {
  margin-top: 8px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.32em;
  color: var(--fg-dim);
  text-transform: uppercase;
  font-weight: 500;
}
.hero-meta {
  margin-top: 18px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.14em;
  color: var(--fg-mute);
  text-transform: uppercase;
  z-index: 1;
}
.hero-meta .div { color: var(--fg-faint); }
.hero-meta .mode {
  color: var(--hot-1);
  display: flex; align-items: center; gap: 6px;
}
.hero-meta .mode::before {
  content: '';
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--hot-1);
  box-shadow: 0 0 8px var(--hot-1);
  display: inline-block;
}

/* ============ CONTENT WRAPPER ============ */
.content {
  padding: 0 14px;
  display: flex;
  flex-direction: column;
  gap: var(--gap);
}

/* ============ INSIGHT (bio-hacking) ============ */
.insight {
  background:
    linear-gradient(135deg, rgba(255, 140, 0, 0.08), rgba(185, 45, 45, 0.04)),
    var(--card);
  border: 1px solid rgba(255, 140, 0, 0.18);
  border-radius: 22px;
  padding: 16px 18px;
  position: relative;
  overflow: hidden;
}
.insight::after {
  content: '';
  position: absolute;
  top: -50%; right: -30%;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(255, 140, 0, 0.12), transparent 70%);
  pointer-events: none;
}
.insight-h {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px;
  position: relative; z-index: 1;
}
.insight-tag {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.24em;
  color: var(--hot-1);
  text-transform: uppercase;
  font-weight: 600;
  padding: 3px 8px;
  border: 1px solid rgba(255, 140, 0, 0.3);
  border-radius: 4px;
}
.insight-body {
  font-size: 13.5px;
  line-height: 1.45;
  color: var(--fg);
  font-weight: 500;
  position: relative; z-index: 1;
}
.insight-body strong { color: var(--hot-1); font-weight: 700; }

/* ============ MACROS STRIP ============ */
.macros {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.macro {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 14px 12px 12px;
  position: relative;
  overflow: hidden;
}
.macro::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: 18px;
  background: linear-gradient(180deg, rgba(255,255,255,0.04), transparent 40%);
  pointer-events: none;
}
.macro-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.22em;
  color: var(--fg-mute);
  text-transform: uppercase;
  font-weight: 600;
}
.macro-val {
  margin-top: 6px;
  font-weight: 800;
  font-size: 26px;
  letter-spacing: -0.04em;
  line-height: 1;
}
.macro-val .unit {
  font-size: 12px;
  color: var(--fg-mute);
  font-weight: 500;
  margin-left: 2px;
  letter-spacing: 0;
}
.macro-target {
  margin-top: 4px;
  font-size: 10px;
  color: var(--fg-mute);
  letter-spacing: 0.06em;
}
.macro-target .macro-pct { color: var(--fg-dim); font-weight: 700; }
.macro.hit .macro-target .macro-pct { color: var(--good); }
.macro.over .macro-target .macro-pct { color: var(--warn); }
.macro.low .macro-target .macro-pct { color: var(--hot-1); }
.macro-bar {
  margin-top: 10px;
  height: 4px;
  background: var(--line-bright);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}
.macro-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.macro.prot .macro-bar-fill { background: linear-gradient(90deg, var(--hot-1), var(--hot-2)); box-shadow: 0 0 10px rgba(255, 140, 0, 0.5); }
.macro.glu  .macro-bar-fill { background: linear-gradient(90deg, var(--hot-2), var(--hot-3)); box-shadow: 0 0 10px rgba(229, 81, 26, 0.5); }
.macro.lip  .macro-bar-fill { background: linear-gradient(90deg, var(--hot-3), var(--hot-4)); box-shadow: 0 0 10px rgba(185, 45, 45, 0.5); }
.macro.over .macro-bar-fill { background: linear-gradient(90deg, var(--hot-4), var(--warn)) !important; box-shadow: 0 0 10px rgba(255, 56, 56, 0.5) !important; }
.macro.over .macro-val { color: var(--warn); }

/* ============ OBJECTIVES GRID ============ */
.obj-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.obj {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 14px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.15s ease;
}
.obj:hover { border-color: var(--line-bright); transform: translateY(-1px); }
.obj:active { transform: scale(0.98); }
.obj-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.22em;
  color: var(--fg-mute);
  text-transform: uppercase;
  font-weight: 600;
}
.obj-num {
  margin-top: 6px;
  font-weight: 800;
  font-size: 22px;
  letter-spacing: -0.03em;
  line-height: 1;
}
.obj-num .obj-target {
  font-size: 11px;
  color: var(--fg-mute);
  font-weight: 500;
  margin-left: 4px;
  letter-spacing: 0;
}
.obj-bar {
  margin-top: 10px;
  height: 3px;
  background: var(--line-bright);
  border-radius: 2px;
  overflow: hidden;
}
.obj-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--hot-1), var(--hot-3));
  box-shadow: 0 0 8px rgba(255, 140, 0, 0.4);
  transition: width 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
}

/* ============ SECTION CARD (generic) ============ */
.section {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 22px;
  padding: 18px;
  position: relative;
  overflow: hidden;
}
.section::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: 22px;
  background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent 30%);
  pointer-events: none;
}
.section-h {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  position: relative;
  z-index: 1;
}
.section-h h3 {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.24em;
  color: var(--fg-dim);
  text-transform: uppercase;
  font-weight: 600;
}
.section-h .sub {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9.5px;
  letter-spacing: 0.14em;
  color: var(--fg-mute);
  text-transform: uppercase;
}
.section-h .sub.warn { color: var(--warn); }
.section-h .badge {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9.5px;
  letter-spacing: 0.12em;
  padding: 4px 8px;
  border-radius: 6px;
  background: rgba(255, 140, 0, 0.12);
  border: 1px solid rgba(255, 140, 0, 0.25);
  color: var(--hot-1);
  text-transform: uppercase;
}
.section-h .chev { color: var(--fg-mute); transition: transform 0.2s ease; display: inline-flex; }
.section-h .chev svg { width: 16px; height: 16px; }
.section-h .chev.open { transform: rotate(180deg); }
.section.nav-section { cursor: pointer; transition: all 0.15s ease; }
.section.nav-section:hover { border-color: var(--line-bright); }
.section.nav-section .section-h { margin-bottom: 0; }
.section.nav-section .chev { transform: rotate(0deg); }
.section.nav-section .chev.open { transform: rotate(0deg); }
.section-body { position: relative; z-index: 1; }

/* ============ CHART SECTION ============ */
.chart-meta {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 14px;
  position: relative; z-index: 1;
}
.chart-big {
  font-weight: 900;
  font-size: 32px;
  letter-spacing: -0.04em;
  line-height: 1;
  background: linear-gradient(180deg, #fff, #d4d4d4);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
.chart-big .unit {
  font-size: 13px;
  color: var(--fg-mute);
  font-weight: 500;
  margin-left: 4px;
  -webkit-text-fill-color: var(--fg-mute);
}
.chart-trend {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.08em;
  color: var(--hot-1);
}
.chart-trend.dim { color: var(--fg-mute); }
.chart-trend.warn { color: var(--warn); }
.chart-svg {
  width: 100%;
  height: 110px;
  display: block;
  position: relative; z-index: 1;
}
.chart-x {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9.5px;
  color: var(--fg-mute);
  letter-spacing: 0.08em;
}
.chart-marker {
  fill: var(--hot-1);
  filter: drop-shadow(0 0 6px var(--hot-1));
}

/* ============ SLOT (meal block) ============ */
.slot {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 22px;
  overflow: hidden;
  transition: border-color 0.15s ease;
}
.slot.open { border-color: var(--line-bright); }
.slot-h {
  display: grid;
  grid-template-columns: auto 1fr auto auto;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  cursor: pointer;
  user-select: none;
}
.slot-num {
  font-size: 11px;
  color: var(--hot-1);
  letter-spacing: 0.1em;
  font-weight: 600;
  width: 22px;
}
.slot-name {
  font-weight: 700;
  font-size: 14px;
  letter-spacing: -0.01em;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.slot-kcal {
  font-weight: 800;
  font-size: 16px;
  letter-spacing: -0.02em;
}
.slot-kcal .unit {
  font-size: 10px;
  color: var(--fg-mute);
  font-weight: 500;
  margin-left: 1px;
}
.slot-h .chev {
  color: var(--fg-mute);
  transition: transform 0.2s ease;
  display: inline-flex;
}
.slot-h .chev svg { width: 16px; height: 16px; }
.slot-h .chev.open { transform: rotate(180deg); }

.slot-body {
  display: none;
  padding: 0 18px 16px;
  border-top: 1px solid var(--line);
  padding-top: 8px;
}
.slot.open .slot-body { display: block; }
.slot-empty {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--fg-mute);
  padding: 16px 0;
  text-align: center;
}

/* Entry row */
.entry {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 12px;
  align-items: center;
  padding: 12px 0;
  border-top: 1px solid var(--line);
}
.entry:first-child { border-top: none; }
.e-name {
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.04em;
}
.e-meta {
  margin-top: 3px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--fg-mute);
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.e-kcal {
  font-weight: 800;
  font-size: 16px;
  letter-spacing: -0.02em;
}
.e-actions {
  display: flex;
  gap: 4px;
}
.e-actions button {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--fg-mute);
  transition: all 0.15s ease;
}
.e-actions button:hover { color: var(--fg); background: var(--card-3); }
.e-actions button svg { width: 14px; height: 14px; }

/* Slot add buttons */
.slot-add {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 12px;
}
.slot-add button {
  height: 40px;
  background: var(--card-2);
  border: 1px solid var(--line-bright);
  border-radius: 12px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.14em;
  color: var(--fg-dim);
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px;
  transition: all 0.15s ease;
}
.slot-add button:hover {
  border-color: var(--hot-2);
  color: var(--hot-1);
  box-shadow: 0 0 12px rgba(255, 140, 0, 0.15);
}
.slot-add button svg { width: 12px; height: 12px; }
.slot-add button:active { transform: scale(0.97); }

.qa-chips {
  display: flex; gap: 6px; flex-wrap: wrap;
  margin-top: 10px;
}
.qa-chip {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  padding: 6px 10px;
  border-radius: 14px;
  background: var(--card-2);
  border: 1px solid var(--line);
  color: var(--fg-dim);
  transition: all 0.15s ease;
}
.qa-chip:hover { border-color: var(--hot-2); color: var(--hot-1); }

/* ============ CALENDAR ============ */
.cal-h {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px 18px;
  gap: 12px;
}
.cal-title {
  font-size: 12px;
  letter-spacing: 0.2em;
  color: var(--fg);
  text-transform: uppercase;
  font-weight: 700;
}
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  padding: 16px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 22px;
  position: relative;
  overflow: hidden;
}
.cal-grid::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: 22px;
  background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent 30%);
  pointer-events: none;
}
.cal-dow {
  font-size: 9px;
  letter-spacing: 0.14em;
  color: var(--fg-mute);
  text-align: center;
  padding: 8px 0;
  text-transform: uppercase;
  font-weight: 600;
}
.cal-day {
  aspect-ratio: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border-radius: 10px;
  background: var(--card-2);
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.15s ease;
  position: relative;
  font-family: 'IBM Plex Mono', monospace;
}
.cal-day.empty { visibility: hidden; }
.cal-day:hover { border-color: var(--line-bright); }
.cal-day.has-data { background: var(--card-3); }
.cal-day .d-num {
  font-size: 13px;
  font-weight: 600;
  color: var(--fg-dim);
}
.cal-day .d-kcal {
  font-size: 8.5px;
  color: var(--fg-mute);
  margin-top: 2px;
  letter-spacing: 0.04em;
}
.cal-day .dot {
  position: absolute;
  bottom: 4px;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--hot-2);
  box-shadow: 0 0 6px var(--hot-2);
}
.cal-day.today {
  border-color: var(--hot-2);
  background: rgba(255, 140, 0, 0.08);
}
.cal-day.today .d-num { color: var(--hot-1); font-weight: 800; }
.cal-day.selected {
  background: linear-gradient(135deg, var(--hot-2), var(--hot-3));
  box-shadow: 0 0 16px rgba(255, 140, 0, 0.35);
}
.cal-day.selected .d-num,
.cal-day.selected .d-kcal { color: var(--bg); }
.cal-day.selected .dot { display: none; }
.cal-day.future { opacity: 0.35; cursor: default; }

/* ============ STATS HEADER ============ */
.stats-h {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 24px 16px;
  gap: 12px;
}
.stats-title {
  font-size: 14px;
  letter-spacing: 0.18em;
  font-weight: 700;
  text-transform: uppercase;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 16px;
  padding: 6px 14px;
  cursor: pointer;
  color: var(--fg);
  transition: all 0.15s ease;
}
.stats-title:hover {
  border-color: var(--line-bright);
  color: var(--hot-1);
}
.stats-title:active { transform: scale(0.97); }

/* ============ ACTIVITY ============ */
.act-totals {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.act-tile {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 14px 12px;
  text-align: left;
  position: relative;
  overflow: hidden;
}
.act-tile::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: 18px;
  background: linear-gradient(180deg, rgba(255,255,255,0.04), transparent 40%);
  pointer-events: none;
}
.t-label {
  font-size: 9px;
  letter-spacing: 0.22em;
  color: var(--fg-mute);
  text-transform: uppercase;
  font-weight: 600;
}
.t-val {
  margin-top: 6px;
  font-weight: 800;
  font-size: 22px;
  letter-spacing: -0.03em;
  line-height: 1;
}
.t-val .unit {
  font-size: 11px;
  color: var(--fg-mute);
  font-weight: 500;
  margin-left: 2px;
  letter-spacing: 0;
}

.act-add-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.act-add-row button {
  height: 44px;
  background: var(--card);
  border: 1px solid var(--line-bright);
  border-radius: 14px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.14em;
  color: var(--fg-dim);
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px;
  transition: all 0.15s ease;
}
.act-add-row button:hover {
  border-color: var(--hot-2);
  color: var(--hot-1);
  box-shadow: 0 0 12px rgba(255, 140, 0, 0.15);
}
.act-add-row button svg { width: 12px; height: 12px; }

.session {
  display: grid;
  grid-template-columns: 70px 1fr auto auto;
  gap: 12px;
  align-items: center;
  padding: 14px 0;
  border-top: 1px solid var(--line);
}
.session:first-child { border-top: none; padding-top: 0; }
.s-type {
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--hot-1);
  font-weight: 600;
}
.s-name {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11.5px;
  color: var(--fg-dim);
  letter-spacing: 0.04em;
}
.s-kcal {
  font-weight: 800;
  font-size: 16px;
}
.s-kcal .unit {
  font-size: 10px;
  color: var(--fg-mute);
  font-weight: 500;
}
.s-actions { display: flex; gap: 4px; }
.s-actions button {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--fg-mute);
  transition: all 0.15s ease;
}
.s-actions button:hover { color: var(--fg); background: var(--card-3); }
.s-actions button svg { width: 14px; height: 14px; }

/* ============ PROFILE ============ */
.profile-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.prof-cell {
  background: var(--card-2);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 12px;
  text-align: center;
}
.prof-label {
  font-size: 9px;
  letter-spacing: 0.22em;
  color: var(--fg-mute);
  text-transform: uppercase;
  font-weight: 600;
}
.prof-cell input {
  display: block;
  width: 100%;
  margin-top: 8px;
  font-weight: 800;
  font-size: 24px;
  text-align: center;
  letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums;
}
.prof-cell input:focus { color: var(--hot-1); }
.prof-unit {
  margin-top: 4px;
  font-size: 9px;
  letter-spacing: 0.18em;
  color: var(--fg-mute);
  text-transform: uppercase;
}
.bmr-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.bmr-cell {
  background: var(--card-2);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 14px;
}
.bmr-val {
  margin-top: 6px;
  font-weight: 900;
  font-size: 28px;
  letter-spacing: -0.04em;
  line-height: 1;
  background: linear-gradient(180deg, var(--hot-1), var(--hot-3));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
.bmr-val .unit {
  font-size: 11px;
  color: var(--fg-mute);
  font-weight: 500;
  margin-left: 2px;
  -webkit-text-fill-color: var(--fg-mute);
}

.mode-pick {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
}
.mode-pick button {
  height: 44px;
  background: var(--card-2);
  border: 1px solid var(--line-bright);
  border-radius: 12px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--fg-dim);
  font-weight: 600;
  transition: all 0.15s ease;
}
.mode-pick button.active {
  background: linear-gradient(135deg, var(--hot-1), var(--hot-3));
  color: var(--bg);
  border-color: transparent;
  box-shadow: 0 0 18px rgba(255, 140, 0, 0.35);
}
.mode-suggest {
  font-size: 10px;
  letter-spacing: 0.06em;
  color: var(--fg-mute);
  margin-bottom: 12px;
  text-align: center;
}
.btn {
  background: var(--card-2);
  border: 1px solid var(--line-bright);
  border-radius: 12px;
  padding: 12px 16px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--fg-dim);
  font-weight: 600;
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px;
  transition: all 0.15s ease;
}
.btn:hover { border-color: var(--hot-2); color: var(--hot-1); }
.btn.full { width: 100%; }
.btn.danger { color: var(--warn); border-color: rgba(255, 56, 56, 0.3); }
.btn.danger:hover { background: rgba(255, 56, 56, 0.1); border-color: var(--warn); }

.goals-edit {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.ge {
  background: var(--card-2);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 10px 12px;
}
.ge label {
  display: block;
}
.ge input {
  display: block;
  width: 100%;
  margin-top: 6px;
  font-weight: 800;
  font-size: 18px;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}
.ge input:focus { color: var(--hot-1); }

.sync-line {
  font-size: 10px;
  letter-spacing: 0.06em;
  color: var(--fg-mute);
  margin-bottom: 10px;
}
.sync-actions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.sync-note {
  font-size: 9.5px;
  color: var(--fg-mute);
  letter-spacing: 0.04em;
  margin-top: 8px;
  line-height: 1.4;
}

.danger-zone { border-color: rgba(255, 56, 56, 0.18); }

/* ============ CM / AM LISTS ============ */
.cm-list, .am-list { display: flex; flex-direction: column; gap: 0; }
.cm-item, .am-item {
  display: grid;
  grid-template-columns: 1fr auto auto auto;
  gap: 10px;
  align-items: center;
  padding: 14px 0;
  border-top: 1px solid var(--line);
}
.cm-item:first-child, .am-item:first-child { border-top: none; padding-top: 0; }
.cm-item .name, .am-item .name {
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.04em;
}
.cm-item .kcal {
  font-weight: 800;
  font-size: 14px;
  font-variant-numeric: tabular-nums;
}

.am-item .meta, .am-item .dows {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--fg-mute);
  letter-spacing: 0.06em;
}
.am-item .toggle {
  position: relative;
  width: 40px; height: 22px;
  background: var(--card-3);
  border-radius: 12px;
  border: 1px solid var(--line-bright);
  cursor: pointer;
}
.am-item .toggle::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 16px; height: 16px;
  background: var(--fg-mute);
  border-radius: 50%;
  transition: all 0.2s ease;
}
.am-item .toggle.on {
  background: linear-gradient(135deg, var(--hot-2), var(--hot-3));
  border-color: transparent;
}
.am-item .toggle.on::after {
  left: 20px;
  background: var(--bg);
}

/* ============ BOTTOM NAV ============ */
.bottom-nav {
  position: fixed;
  bottom: calc(16px + var(--safe-bot));
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 4px;
  background: rgba(18, 18, 18, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--line-bright);
  border-radius: 32px;
  padding: 6px;
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
  z-index: 100;
}
.nav-btn {
  width: 48px;
  height: 48px;
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--fg-mute);
  transition: all 0.2s ease;
}
.nav-btn:hover { color: var(--fg-dim); }
.nav-btn:active { transform: scale(0.92); }
.nav-btn.active {
  background: linear-gradient(135deg, var(--hot-1), var(--hot-3));
  color: var(--bg);
  box-shadow: 0 0 20px rgba(255, 140, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.2);
}
.nav-btn svg { width: 20px; height: 20px; }
.nav-btn.fab {
  width: 52px; height: 52px;
  border-radius: 26px;
  background: linear-gradient(135deg, var(--hot-1), var(--hot-4));
  color: var(--bg);
  box-shadow: 0 0 24px rgba(255, 140, 0, 0.55);
}
.nav-btn.fab svg { width: 24px; height: 24px; stroke-width: 2.5; }
.nav-btn.fab:hover { box-shadow: 0 0 32px rgba(255, 140, 0, 0.7); }

/* ============ SHEET (bottom-up modal) ============ */
.sheet-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 200;
  animation: fadeIn 0.2s ease;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.sheet {
  background: var(--card);
  border-top: 1px solid var(--line-bright);
  border-radius: 28px 28px 0 0;
  width: 100%;
  max-width: var(--maxw);
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  animation: slideUp 0.28s cubic-bezier(0.2, 0.8, 0.2, 1);
  position: relative;
  overflow: hidden;
}
.sheet::before {
  content: '';
  position: absolute;
  top: 8px; left: 50%;
  transform: translateX(-50%);
  width: 36px; height: 4px;
  background: var(--line-bright);
  border-radius: 2px;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.sheet-h {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 22px 22px 12px;
  border-bottom: 1px solid var(--line);
}
.sheet-h .h-md {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.24em;
  color: var(--fg);
  text-transform: uppercase;
  font-weight: 700;
}
.sheet-h .iconbtn { color: var(--fg-dim); }
.sheet-body {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  flex: 1;
  padding: 16px 22px 22px;
}

/* Search box */
.search-box {
  padding: 14px 22px;
  border-bottom: 1px solid var(--line);
}
.search-box input {
  width: 100%;
  height: 40px;
  background: var(--card-2);
  border: 1px solid var(--line-bright);
  border-radius: 12px;
  padding: 0 14px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.08em;
  color: var(--fg);
}
.search-box input:focus { border-color: var(--hot-2); box-shadow: 0 0 12px rgba(255,140,0,0.12); }

/* Cat tabs */
.cat-tabs {
  display: flex;
  gap: 6px;
  padding: 12px 22px;
  border-bottom: 1px solid var(--line);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.cat-tabs::-webkit-scrollbar { display: none; }
.cat-tabs button {
  flex: 0 0 auto;
  height: 30px;
  padding: 0 12px;
  border-radius: 15px;
  background: var(--card-2);
  border: 1px solid var(--line);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--fg-mute);
  text-transform: uppercase;
  font-weight: 600;
  transition: all 0.15s ease;
}
.cat-tabs button.active {
  background: linear-gradient(135deg, var(--hot-1), var(--hot-3));
  color: var(--bg);
  border-color: transparent;
  box-shadow: 0 0 12px rgba(255, 140, 0, 0.3);
}

.food-list { padding: 8px 22px 22px; }
.food-item {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  transition: opacity 0.15s ease;
}
.food-item:hover { opacity: 0.7; }
.food-item:last-child { border-bottom: none; }
.food-item .f-name {
  font-weight: 700;
  font-size: 13.5px;
  letter-spacing: 0.02em;
}
.food-item .f-meta {
  margin-top: 3px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--fg-mute);
  letter-spacing: 0.04em;
}
.food-item .f-kcal {
  font-weight: 800;
  font-size: 15px;
  letter-spacing: -0.02em;
}
.food-item.fav .f-name::before {
  content: '★';
  color: var(--hot-1);
  margin-right: 6px;
}

/* Food detail (qty picker) */
.food-detail { padding: 0 22px 22px; }
.food-title {
  font-weight: 800;
  font-size: 22px;
  letter-spacing: -0.02em;
  margin: 16px 0 8px;
}
.food-cat {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--hot-1);
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 16px;
}
.portions {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-bottom: 14px;
}
.portions button {
  flex: 0 0 auto;
  padding: 8px 12px;
  border-radius: 10px;
  background: var(--card-2);
  border: 1px solid var(--line-bright);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.06em;
  color: var(--fg-dim);
  font-weight: 600;
  transition: all 0.15s ease;
}
.portions button.active,
.portions button:hover {
  background: linear-gradient(135deg, var(--hot-1), var(--hot-3));
  color: var(--bg);
  border-color: transparent;
}
.qty-row {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 12px;
  align-items: center;
  margin-bottom: 16px;
  padding: 14px;
  background: var(--card-2);
  border: 1px solid var(--line-bright);
  border-radius: 14px;
}
.qty-row button {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--card-3);
  border: 1px solid var(--line-bright);
  font-weight: 700;
  font-size: 18px;
  color: var(--fg-dim);
  transition: all 0.15s ease;
}
.qty-row button:hover { color: var(--hot-1); border-color: var(--hot-2); }
.qty-row input {
  text-align: center;
  font-weight: 800;
  font-size: 22px;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}
.preview {
  background: linear-gradient(135deg, rgba(255,140,0,0.05), transparent),
              var(--card-2);
  border: 1px solid var(--line-bright);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 16px;
}
.preview-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 8px;
}
.preview-row:last-child { margin-bottom: 0; }
.preview-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--fg-mute);
  text-transform: uppercase;
}
.preview-val {
  font-weight: 800;
  font-size: 18px;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}
.preview-val.kcal {
  font-size: 24px;
  background: linear-gradient(180deg, var(--hot-1), var(--hot-3));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

.cta {
  width: 100%;
  height: 52px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--hot-1), var(--hot-3));
  color: var(--bg);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.18em;
  font-weight: 700;
  box-shadow: 0 0 24px rgba(255, 140, 0, 0.4);
  transition: all 0.15s ease;
}
.cta:hover { box-shadow: 0 0 32px rgba(255, 140, 0, 0.6); transform: translateY(-1px); }
.cta:active { transform: translateY(0) scale(0.99); }

/* Generic input row in sheets */
.input-row {
  margin-bottom: 14px;
}
.input-row label {
  display: block;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--fg-mute);
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 6px;
}
.input-row input,
.input-row select,
.input-row textarea {
  width: 100%;
  height: 44px;
  background: var(--card-2);
  border: 1px solid var(--line-bright);
  border-radius: 12px;
  padding: 0 14px;
  font-weight: 700;
  font-size: 16px;
  color: var(--fg);
}
.input-row textarea { height: 80px; padding: 12px 14px; }
.input-row input:focus,
.input-row textarea:focus { border-color: var(--hot-2); box-shadow: 0 0 12px rgba(255,140,0,0.15); }

/* DOWS toggles */
.dows {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  margin-bottom: 14px;
}
.dows button {
  height: 36px;
  border-radius: 10px;
  background: var(--card-2);
  border: 1px solid var(--line);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--fg-mute);
  font-weight: 600;
  transition: all 0.15s ease;
}
.dows button.on {
  background: linear-gradient(135deg, var(--hot-1), var(--hot-3));
  color: var(--bg);
  border-color: transparent;
}

/* Toast */
#toast {
  position: fixed;
  bottom: calc(96px + var(--safe-bot));
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--card-3);
  border: 1px solid var(--hot-2);
  border-radius: 12px;
  padding: 12px 18px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--hot-1);
  text-transform: uppercase;
  font-weight: 600;
  z-index: 300;
  box-shadow: 0 0 20px rgba(255, 140, 0, 0.3);
  transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
  pointer-events: none;
  white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }
#toast.warn { border-color: var(--warn); color: var(--warn); box-shadow: 0 0 20px rgba(255, 56, 56, 0.3); }

/* ============ INPUT MODAL (numeric prompt) ============ */
.input-modal { padding: 22px; }
.input-modal-num {
  width: 100%;
  height: 56px;
  background: var(--card-2);
  border: 1px solid var(--line-bright);
  border-radius: 14px;
  padding: 0 18px;
  text-align: center;
  font-weight: 800;
  font-size: 28px;
  letter-spacing: -0.03em;
  color: var(--hot-1);
  margin-bottom: 16px;
  font-variant-numeric: tabular-nums;
}

/* ============ ENTRANCE ANIMATIONS ============ */
.fade-in {
  opacity: 0;
  animation: fadeUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ============ RESPONSIVE — DESKTOP ============ */
@media (min-width: 720px) {
  body {
    padding-bottom: calc(110px + var(--safe-bot));
  }
  #app {
    max-width: var(--maxw);
    margin: 0 auto;
    border-left: 1px solid var(--line);
    border-right: 1px solid var(--line);
    min-height: 100vh;
    background:
      radial-gradient(ellipse 100% 40% at 50% 0%, rgba(255, 140, 0, 0.04), transparent 70%),
      var(--bg);
  }
  .sheet { max-width: var(--maxw); }
}

@media (min-width: 1100px) {
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: -1;
    background:
      radial-gradient(ellipse 40% 60% at 15% 30%, rgba(255, 140, 0, 0.04), transparent 70%),
      radial-gradient(ellipse 40% 60% at 85% 70%, rgba(185, 45, 45, 0.03), transparent 70%);
    pointer-events: none;
  }
  /* Decorative side rails on desktop */
  body::after {
    content: 'NUTRI·CORE · BIO-HACKING DASHBOARD · v7.1';
    position: fixed;
    top: 32px; left: 32px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.24em;
    color: var(--fg-faint);
    text-transform: uppercase;
    z-index: -1;
  }
}

/* iPhone safe areas + landscape protection */
@media (max-width: 380px) {
  .topbar { padding: 16px 14px 10px; }
  .content { padding: 0 12px; gap: 12px; }
  .day-nav-bar { padding: 4px 14px 8px; }
  .hero { min-height: 380px; }
  .ring-wrap { width: 280px; }
  .obj-grid { grid-template-columns: 1fr 1fr; }
  .macro { padding: 12px 10px; }
  .macro-val { font-size: 22px; }
}

/* Landscape mobile: tighter hero */
@media (max-height: 600px) and (orientation: landscape) {
  .hero { height: auto; min-height: 0; padding: 16px 24px; }
  .ring-wrap { width: 200px; }
  .kcal-num { font-size: 48px; }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

/* Section general spacing inside sheets */
.sheet .input-row:last-child { margin-bottom: 0; }
.sheet-actions {
  display: flex; gap: 8px; margin-top: 16px;
}
.sheet-actions .btn { flex: 1; }

/* Section header with back button */
.section-h.with-back {

}

/* Diagnostic display */

/* Ensure SVG charts render correctly */

/* AM specific layout */

}

}

/* Auth screen (currently disabled but kept) */
.auth-screen { padding: 40px 24px; text-align: center; }

/* For row helper used in some places (legacy) */
.row { display: flex; align-items: center; gap: 8px; }
.row.between { justify-content: space-between; }
.h-md, .h-lg { font-weight: 700; }
.h-md { font-size: 13px; letter-spacing: 0.06em; }

.label, .label-sm {

.sheet-foot {

}
.sheet-foot .btn { width: 100%; }
.btn.primary {

.btn.primary:hover {

.am-block {

.dow {

.badge.mono {

/* ============ MACRO STATUS COLORS (hit/over/low) ============ */
:root {
  --good: #4ADE80;
  --good-glow: rgba(74, 222, 128, 0.45);
  --good-soft: rgba(74, 222, 128, 0.15);
}

.macro.hit .macro-bar-fill,
.macro.hit.prot .macro-bar-fill,
.macro.hit.glu .macro-bar-fill,
.macro.hit.lip .macro-bar-fill {
  background: linear-gradient(90deg, #5EE898, var(--good)) !important;
  box-shadow: 0 0 12px var(--good-glow) !important;
}
.macro.hit .macro-val { color: var(--good); }
.macro.hit { border-color: rgba(74, 222, 128, 0.25); }

.macro.over .macro-bar-fill,
.macro.over.prot .macro-bar-fill,
.macro.over.glu .macro-bar-fill,
.macro.over.lip .macro-bar-fill {
  background: linear-gradient(90deg, var(--hot-4), var(--warn)) !important;
  box-shadow: 0 0 12px rgba(255, 56, 56, 0.5) !important;
}
.macro.over .macro-val { color: var(--warn); }

/* ============ CALENDAR COLORING ============ */
.cal-day.score-hit {
  background: linear-gradient(135deg, rgba(74, 222, 128, 0.18), rgba(74, 222, 128, 0.08));
  border-color: rgba(74, 222, 128, 0.4);
}
.cal-day.score-hit .d-num { color: var(--good); font-weight: 800; }
.cal-day.score-hit .d-kcal { color: rgba(74, 222, 128, 0.8); }
.cal-day.score-hit .dot { background: var(--good); box-shadow: 0 0 6px var(--good); }

.cal-day.score-over {
  background: linear-gradient(135deg, rgba(255, 56, 56, 0.18), rgba(255, 56, 56, 0.06));
  border-color: rgba(255, 56, 56, 0.4);
}
.cal-day.score-over .d-num { color: var(--warn); font-weight: 800; }
.cal-day.score-over .d-kcal { color: rgba(255, 100, 100, 0.85); }
.cal-day.score-over .dot { background: var(--warn); box-shadow: 0 0 6px var(--warn); }

.cal-day.score-low {
  background: linear-gradient(135deg, rgba(255, 56, 56, 0.10), rgba(255, 56, 56, 0.04));
  border-color: rgba(255, 56, 56, 0.25);
}
.cal-day.score-low .d-num { color: #FF8080; font-weight: 700; }
.cal-day.score-low .d-kcal { color: rgba(255, 128, 128, 0.7); }

/* selected wins over score */
.cal-day.selected.score-hit, .cal-day.selected.score-over, .cal-day.selected.score-low {
  background: linear-gradient(135deg, var(--hot-2), var(--hot-3));
  border-color: transparent;
}
.cal-day.selected.score-hit .d-num,
.cal-day.selected.score-over .d-num,
.cal-day.selected.score-low .d-num,
.cal-day.selected.score-hit .d-kcal,
.cal-day.selected.score-over .d-kcal,
.cal-day.selected.score-low .d-kcal { color: var(--bg) !important; }

  display: inline-flex;
  align-items: center;
  gap: 6px;

  color: var(--fg-dim);

/* Glycemic chart note */

<script>
// PWA: register a tiny inline service worker.
// Strategy: network-first for HTML (so updates ship instantly),
// cache-first for static assets. Skip Supabase / auth URLs entirely.
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  const swCode = `
    const C = 'nutricore-v3';
    self.addEventListener('install', e => { self.skipWaiting(); });
    self.addEventListener('activate', e => {
      e.waitUntil(
        caches.keys().then(keys => Promise.all(keys.filter(k => k !== C).map(k => caches.delete(k))))
          .then(() => self.clients.claim())
      );
    });
    self.addEventListener('fetch', e => {
      const req = e.request;
      if (req.method !== 'GET') return;
      const url = new URL(req.url);
      // NEVER cache same-origin auth URLs (magic link callbacks have hashes/queries)
      // and NEVER intercept cross-origin (Supabase, fonts, CDNs)
      if (url.origin !== self.location.origin) return;
      // Skip if URL has auth-related params/hash (magic link callback)
      if (req.url.includes('access_token') || req.url.includes('refresh_token') || req.url.includes('?code=')) return;

      const isHTML = req.mode === 'navigate' || (req.headers.get('accept')||'').includes('text/html');
      if (isHTML) {
        // Network-first for HTML (always fresh app code)
        e.respondWith(
          fetch(req).then(r => {
            if (r && r.ok) {
              const copy = r.clone();
              caches.open(C).then(c => c.put(req, copy));
            }
            return r;
          }).catch(() => caches.match(req))
        );
      } else {
        // Cache-first for assets (logo, fonts, images)
        e.respondWith(
          caches.open(C).then(cache =>
            cache.match(req).then(hit => {
              const fresh = fetch(req).then(r => {
                if (r && r.ok) cache.put(req, r.clone());
                return r;
              }).catch(() => hit);
              return hit || fresh;
            })
          )
        );
      }
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}
</script>

function ymd(d) { const x = new Date(d); const m = String(x.getMonth()+1).padStart(2,'0'); const dd = String(x.getDate()).padStart(2,'0'); return `${x.getFullYear()}-${m}-${dd}`; }
function dateFrom(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function dowIdx(s) { const d = dateFrom(s); return (d.getDay()+6)%7; } // Mon=0
function todayStr() { return ymd(new Date()); }
function shiftDay(s, n) { const d = dateFrom(s); d.setDate(d.getDate()+n); return ymd(d); }
function dayLabel(s) {
  const today = todayStr();
  if (s === today) return 'AUJOURD\'HUI';
  if (s === shiftDay(today, -1)) return 'HIER';
  if (s === shiftDay(today,  1)) return 'DEMAIN';
  const d = dateFrom(s);
  return `${DOWS_LONG[(d.getDay()+6)%7]} ${d.getDate()} ${MONTHS[d.getMonth()].slice(0,3)}`;
}

// --- PERSISTENCE ---
const STATE_VERSION = 1;

function migrate(o) {
  // Future-proof : when STATE_VERSION bumps, transform old shapes here
  const v = o._v || 0;
  if (v < 1) {
    // First-version migration: ensure profile has sex, goals are numbers, etc.
    o.profile = o.profile || {};
    if (!o.profile.sex) o.profile.sex = 'm';
    o.recentFoods = o.recentFoods || []; // [{id, t}]
    o.onboarded = o.onboarded || false;
  }
  o._v = STATE_VERSION;
  return o;
}

function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return;
    let o = JSON.parse(raw);
    o = migrate(o);
    Object.assign(S, {
      log: o.log || {},
      customMeals: o.customMeals || S.customMeals,
      autoMeals: o.autoMeals || [],
      profile: o.profile || S.profile,
      goals: o.goals || S.goals,
      mode: o.mode || 'cut',
      favorites: o.favorites || [],
      openSlots: o.openSlots || S.openSlots,
      _savedAt: o._savedAt || 0,
      user: o.user || null,
      customFoods: o.customFoods || [],
      recentFoods: o.recentFoods || [],
      onboarded: !!o.onboarded,
      _v: o._v,
    });
    // Re-inject custom foods into FOODS catalog
    (S.customFoods||[]).forEach(cf => {
      if (!FOODS.find(f => f.id === cf.id)) FOODS.push(cf);
    });
  } catch (e) { console.error('load err', e); }
}
function save() {
  S._savedAt = Date.now();
  const o = {
    _v: STATE_VERSION,
    log: S.log, customMeals: S.customMeals, autoMeals: S.autoMeals,
    profile: S.profile, goals: S.goals, mode: S.mode,
    favorites: S.favorites, openSlots: S.openSlots,
    _savedAt: S._savedAt, user: S.user,
    customFoods: S.customFoods || [],
    recentFoods: S.recentFoods || [],
    onboarded: !!S.onboarded,
  };
  localStorage.setItem(STORE_KEY, JSON.stringify(o));
  // Trigger Supabase sync (debounced)
  scheduleSyncCloud();
}

// --- AUTOMEALS APPLICATION ---
function applyAutoMeals(date) {
  const d = dowIdx(date);
  const day = dayOf(date);
  const applied = day._applied || [];
  S.autoMeals.forEach(am => {
    if (!am.on) return;
    if (!am.days.includes(d)) return;
    const sig = `${am.id}_${date}`;
    if (applied.includes(sig)) return;
    const meal = S.customMeals.find(m => m.id === am.mealId);
    if (!meal) return;
    meal.items.forEach(it => {
      day.meals[am.slot] = day.meals[am.slot] || [];
      if (it.cheat) {
        day.meals[am.slot].push({ cheat:true, kcal: it.kcal, desc: it.desc||'', enseigne: it.enseigne||'', cost: it.cost||0, t: Date.now() });
      } else {
        day.meals[am.slot].push({ fid: it.fid, q: it.q, t: Date.now() });
      }
    });
    applied.push(sig);
  });
  day._applied = applied;
}

// --- NUTRITION CALC ---
function getFood(fid) { return FOODS.find(f => f.id === fid); }
function entryNutr(e) {
  if (e.cheat) return { kcal: +e.kcal||0, p:0, g:0, l:0 };
  const f = getFood(e.fid); if (!f) return {kcal:0,p:0,g:0,l:0};
  if (f.isFixed) return { kcal: f.kcal*e.q, p: f.p*e.q, g: f.g*e.q, l: f.l*e.q };
  const k = e.q / 100;
  return { kcal: f.kcal*k, p: f.p*k, g: f.g*k, l: f.l*k };
}
function dayTotals(date) {
  const day = dayOf(date);
  const t = { kcal:0, p:0, g:0, l:0, sportKcal:0, slot:{b:0,l:0,d:0,s:0,dr:0} };
  SLOTS.forEach(s => {
    (day.meals[s.k]||[]).forEach(e => {
      const n = entryNutr(e);
      t.kcal += n.kcal; t.p += n.p; t.g += n.g; t.l += n.l;
      t.slot[s.k] += n.kcal;
    });
  });
  (day.sport||[]).forEach(sp => { t.sportKcal += +sp.kcal||0; });
  return t;
}
function bmr(p) {
  // Mifflin-St Jeor — homme: 10w + 6.25h - 5a + 5 ; femme: 10w + 6.25h - 5a - 161
  const sex = p.sex || 'm';
  return Math.round(10*p.w + 6.25*p.h - 5*p.a + (sex === 'f' ? -161 : 5));
}
function tdee(p) { return Math.round(bmr(p) * 1.5); }

function modeTargets(p, mode) {
  const td = tdee(p);
  const k = mode === 'cut' ? Math.round(td*0.8) : Math.round(td*1.1);
  // Macros: cut=high prot (2g/kg), bulk=high carbs+prot (1.8g/kg)
  if (mode === 'cut') {
    const protG = Math.round(p.w * 2);
    const fatG  = Math.round(p.w * 0.9);
    const protK = protG*4, fatK = fatG*9;
    const carbK = Math.max(0, k - protK - fatK);
    const carbG = Math.round(carbK/4);
    return { kcal:k, p:protG, g:carbG, l:fatG };
  } else {
    const protG = Math.round(p.w * 1.8);
    const fatG  = Math.round(p.w * 1.0);
    const protK = protG*4, fatK = fatG*9;
    const carbK = Math.max(0, k - protK - fatK);
    const carbG = Math.round(carbK/4);
    return { kcal:k, p:protG, g:carbG, l:fatG };
  }
}

  const root = document.getElementById('app');

  // Onboarding gate — first run requires profile completion
  // Bypass: set localStorage 'nc_skip_onboard' for testing
  if (!S.onboarded && !(typeof window !== 'undefined' && window.localStorage && localStorage.getItem('nc_skip_onboard'))) {
    root.innerHTML = renderOnboarding();
    afterRender(true);
    return;
  }

  let viewHTML = '';
  switch (S.view) {
    case 'home':     viewHTML = renderHome();     break;
    case 'cal':      viewHTML = renderCal();      break;
    case 'stats':    viewHTML = renderStats();    break;
    case 'activity': viewHTML = renderActivity(); break;
    case 'profile':  viewHTML = renderProfile();  break;
    case 'cmList':   viewHTML = renderCMList();   break;
    case 'amList':   viewHTML = renderAMList();   break;
    case 'historyCheat': viewHTML = renderCheatHistory(); break;
    default:         viewHTML = renderHome();
  }
  root.innerHTML = viewHTML + renderSheet() + renderTabnav();
  afterRender(scrollTop);
}
function afterRender(scrollTop) {
  if (scrollTop) window.scrollTo(0, 0);
  else window.scrollTo(0, _scrollY);
}

function detectInsight(t, targets, day) {
  // Returns null or {tag, body}
  const consumed = t.kcal;
  const remain = targets.kcal - consumed + t.sportKcal;
  const protPct = targets.p ? (t.p / targets.p) : 0;
  const now = new Date();
  const hour = now.getHours();
  const isToday = S.date === todayStr();

  if (consumed > targets.kcal + t.sportKcal + 50) {
    return { tag: 'SIGNAL · ALERT', body: `Dépassement de <strong>${fmt(consumed - targets.kcal - t.sportKcal)} kcal</strong>. Prochain repas : viser léger, privilégier protéines + légumes.` };
  }
  if (isToday && hour >= 18 && remain > 600) {
    return { tag: 'SIGNAL · GAP', body: `Encore <strong>${fmt(remain)} kcal</strong> à atteindre avant la nuit. Risque de déficit excessif si non comblé.` };
  }
  if (isToday && hour >= 14 && protPct < 0.4) {
    return { tag: 'SIGNAL · PROTEIN', body: `Apport protéique faible (<strong>${fmt(t.p)}g / ${fmt(targets.p)}g</strong>). Anticiper une source protéique au prochain repas.` };
  }
  if (isToday && hour >= 20 && consumed < 800) {
    return { tag: 'SIGNAL · INTAKE', body: `Apport très bas pour l'heure (<strong>${fmt(consumed)} kcal</strong>). Vérifier le log ou compléter avant la nuit.` };
  }
  return null;
}

function renderRing(progress, over, overflow) {
  const r = 140;
  const cx = 160, cy = 160;
  const C = 2 * Math.PI * r; // ≈ 879.65
  const offset = C * (1 - progress);
  // Endpoint angle for the moving dot
  const angleRad = -Math.PI/2 + (progress * 2 * Math.PI);
  const dotX = cx + r * Math.cos(angleRad);
  const dotY = cy + r * Math.sin(angleRad);

  return `<svg viewBox="0 0 320 320" class="ring-svg ${over?'over':''}">
    <defs>
      <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#FFB347"/>
        <stop offset="50%" stop-color="#FF8C00"/>
        <stop offset="100%" stop-color="${over?'#FF3838':'#B92D2D'}"/>
      </linearGradient>
      <filter id="ringGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="6" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1a1a1a" stroke-width="14"/>
    <g stroke="#2a2a2a" stroke-width="1.5">
      <line x1="${cx}" y1="8" x2="${cx}" y2="16"/>
      <line x1="${cx}" y1="${cy*2-8}" x2="${cx}" y2="${cy*2-16}"/>
      <line x1="8" y1="${cy}" x2="16" y2="${cy}"/>
      <line x1="${cx*2-8}" y1="${cy}" x2="${cx*2-16}" y2="${cy}"/>
    </g>
    <circle cx="${cx}" cy="${cy}" r="${r}"
            fill="none" stroke="url(#ringGrad)"
            stroke-width="14" stroke-linecap="round"
            stroke-dasharray="${C}"
            stroke-dashoffset="${offset}"
            transform="rotate(-90 ${cx} ${cy})"
            filter="url(#ringGlow)" class="ring-progress"/>
    ${progress > 0.02 ? `<circle cx="${dotX}" cy="${dotY}" r="4" fill="${over?'#FF3838':'#FFB347'}" filter="url(#ringGlow)" class="ring-dot"/>` : ''}
    ${overflow > 0 ? `<text x="${cx}" y="${cy*2-20}" text-anchor="middle" fill="#FF3838" font-family="IBM Plex Mono" font-size="11" letter-spacing="2">+${Math.round(overflow*100)}%</text>` : ''}
  </svg>`;
}

function renderTodayAreaChart(day, target) {
  // Build cumulative kcal over 24h based on entry timestamps
  const entries = [];
  SLOTS.forEach(s => (day.meals[s.k]||[]).forEach(e => {
    const k = e.cheat ? (+e.kcal||0) : entryNutr(e).kcal;
    entries.push({ t: e.t || Date.now(), k });
  }));
  entries.sort((a,b) => a.t - b.t);

  const W = 600, H = 100;
  const dayStart = new Date(S.date + 'T00:00:00').getTime();

  // Build cumulative points across 24h
  let cum = 0;
  const points = [{ x: 0, y: 0, k: 0 }];
  entries.forEach(e => {
    const hr = Math.max(0, Math.min(24, (e.t - dayStart) / 3600000));
    cum += e.k;
    points.push({ x: (hr / 24) * W, y: cum, k: cum });
  });
  // Extend to current time (today) or end of day (other days)
  const isToday = S.date === todayStr();
  const nowHr = isToday ? Math.min(24, (Date.now() - dayStart) / 3600000) : 24;
  points.push({ x: (nowHr / 24) * W, y: cum, k: cum });

  // Y scale: 0 → target * 1.1 to leave headroom
  const maxY = Math.max(target * 1.1, cum * 1.1, 800);
  const ptsXY = points.map(p => ({ x: p.x, y: H - (p.y / maxY) * H }));

  // Build SVG path: smooth cumulative monotone (use simple stepped+smoothed via cubic)
  let path = `M 0,${H}`;
  ptsXY.forEach((p, i) => {
    if (i === 0) path += ` L ${p.x.toFixed(1)},${p.y.toFixed(1)}`;
    else {
      const prev = ptsXY[i-1];
      const dx = p.x - prev.x;
      // Use a soft S-curve for jumps
      const c1x = prev.x + dx * 0.4;
      const c2x = p.x - dx * 0.4;
      path += ` C ${c1x.toFixed(1)},${prev.y.toFixed(1)} ${c2x.toFixed(1)},${p.y.toFixed(1)} ${p.x.toFixed(1)},${p.y.toFixed(1)}`;
    }
  });
  const areaPath = path + ` L ${ptsXY[ptsXY.length-1].x.toFixed(1)},${H} L 0,${H} Z`;
  const linePath = path.replace(`M 0,${H}`, `M ${ptsXY[0].x.toFixed(1)},${ptsXY[0].y.toFixed(1)}`);

  // Target line
  const targetY = H - (target / maxY) * H;
  const nowX = (nowHr / 24) * W;

  // Meal markers
  const markers = entries.map((e, i) => {
    const p = ptsXY[i+1];
    return `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3.5" class="chart-marker"/>`;
  }).join('');

  return `
    <svg class="chart-svg area-path" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="areaGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#FFB347" stop-opacity="0.55"/>
          <stop offset="50%" stop-color="#FF8C00" stop-opacity="0.30"/>
          <stop offset="100%" stop-color="#B92D2D" stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="lineGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#FFB347"/>
          <stop offset="100%" stop-color="#FF8C00"/>
        </linearGradient>
        <filter id="lineGlow1" x="-20%" y="-50%" width="140%" height="200%">
          <feGaussianBlur stdDeviation="2" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <g stroke="#1a1a1a" stroke-width="1">
        <line x1="0" y1="${(H/3).toFixed(0)}" x2="${W}" y2="${(H/3).toFixed(0)}"/>
        <line x1="0" y1="${(2*H/3).toFixed(0)}" x2="${W}" y2="${(2*H/3).toFixed(0)}"/>
      </g>
      ${target ? `<line x1="0" y1="${targetY.toFixed(1)}" x2="${W}" y2="${targetY.toFixed(1)}" stroke="#FF8C00" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.4"/>` : ''}
      <path d="${areaPath}" fill="url(#areaGrad1)"/>
      <path d="${linePath}" fill="none" stroke="url(#lineGrad1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#lineGlow1)"/>
      ${markers}
      ${isToday ? `<line x1="${nowX.toFixed(1)}" y1="0" x2="${nowX.toFixed(1)}" y2="${H}" stroke="#FF8C00" stroke-width="1" stroke-dasharray="2,3" opacity="0.5"/>` : ''}
    </svg>
    <div class="chart-x">
      <span>00H</span><span>06H</span><span>12H</span><span>18H</span><span>24H</span>
    </div>
  `;
}

function headlineFromDate(date) {
  const today = todayStr();
  if (date === today) return `JOUR ${dateFrom(date).getDate()}`;
  const d = dateFrom(date);
  return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}`;
}

function macroBar(label, val, target, unit, klass='') {
  const pct = target ? (val/target)*100 : 0;
  const pctW = Math.min(100, pct);
  let status = 'low';
  if (target > 0) {
    if (pct >= 90 && pct <= 110) status = 'hit';
    else if (pct > 110) status = 'over';
  }
  const pctTxt = target ? Math.round(pct) + '%' : '—';
  return `<div class="macro ${klass} ${status}">
    <div class="macro-label">${label}</div>
    <div class="macro-val tab-num">${fmt(val)}<span class="unit">${unit}</span></div>
    <div class="macro-target mono">/ ${fmt(target)}${unit} · <span class="macro-pct">${pctTxt}</span></div>
    <div class="macro-bar"><div class="macro-bar-fill" style="width:${pctW}%"></div></div>
  </div>`;
}

function objCard(label, val, target, kind, unit='') {
  const pct = target ? Math.min(100, (val/target)*100) : 0;
  return `<div class="obj" data-act="objTap" data-kind="${kind}">
    <div class="obj-label">${label}</div>
    <div class="obj-num tab-num">${fmt1(val)}${unit}<span class="obj-target">/${fmt(target)}${unit}</span></div>
    <div class="obj-bar"><div class="obj-bar-fill" style="width:${pct}%"></div></div>
  </div>`;
}

function muscuCount(day) {
  // Score /4 : nombre de groupes musculaires distincts entraînés
  // sur les 7 derniers jours (incluant le jour courant)
  const refDate = dateFrom(S.date);
  const groups = new Set();
  for (let i = 0; i < 7; i++) {
    const d = new Date(refDate);
    d.setDate(d.getDate() - i);
    const ds = ymd(d);
    const log = S.log[ds];
    if (!log) continue;
    (log.sport || []).forEach(s => {
      if (s.type === 'muscu' && s.group) groups.add(s.group);
    });
  }
  return groups.size;
}
function learnTotal(day) {
  return (day.learning||[]).reduce((a,x) => a + (+x.h||0), 0);
}

function renderCal() {
  const ref = S._calMonth ? dateFrom(S._calMonth+'-01') : dateFrom(S.date.slice(0,7)+'-01');
  const y = ref.getFullYear(), m = ref.getMonth();
  const first = new Date(y, m, 1);
  const offset = (first.getDay()+6)%7; // Mon=0
  const lastDay = new Date(y, m+1, 0).getDate();
  const today = todayStr();

  let cells = '';
  // Aggregate stats for the month summary
  let monthDaysWithData = 0;
  let monthHitDays = 0;
  let monthTotalKcal = 0;
  let monthTotalDelta = 0; // sum of (kcal - target) over days with data

  for (let i=0; i<offset; i++) cells += '<div class="cal-day empty"></div>';
  for (let d=1; d<=lastDay; d++) {
    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const has = S.log[ds] && (Object.values(S.log[ds].meals).flat().length > 0 || (S.log[ds].sport||[]).length > 0);
    const t = has ? dayTotals(ds) : null;
    const isToday = ds === today;
    const isSel = ds === S.date;
    const isFuture = ds > today;
    let score = '';
    if (has && t && S.goals.kcal > 0) {
      const adj = S.goals.kcal + (t.sportKcal||0);
      const pct = (t.kcal / adj) * 100;
      if (pct >= 90 && pct <= 110) score = 'score-hit';
      else if (pct > 110) score = 'score-over';
      else if (pct > 0) score = 'score-low';
      // Aggregate
      if (t.kcal > 0) {
        monthDaysWithData++;
        monthTotalKcal += t.kcal;
        monthTotalDelta += (t.kcal - adj);
        if (pct >= 90 && pct <= 110) monthHitDays++;
      }
    }
    cells += `<div class="cal-day ${isToday?'today':''} ${isSel?'selected':''} ${has?'has-data':''} ${isFuture?'future':''} ${score}" data-act="pickDay" data-d="${ds}">
      <div class="d-num">${d}</div>
      ${t ? `<div class="d-kcal">${fmt(t.kcal)}</div>` : ''}
      ${has ? '<div class="dot"></div>' : ''}
    </div>`;
  }

  const avgKcal = monthDaysWithData ? monthTotalKcal / monthDaysWithData : 0;
  const successPct = monthDaysWithData ? Math.round((monthHitDays / lastDay) * 100) : 0;
  const deltaSign = monthTotalDelta >= 0 ? '+' : '−';
  const deltaAbs = Math.abs(Math.round(monthTotalDelta));
  const deltaClass = monthTotalDelta > 200 ? 'over' : monthTotalDelta < -200 ? 'low' : 'hit';

  return `
    <div class="topbar">
      <div class="brand"><img class="brand-logo" src="Logonutricore.jpeg" alt="" onerror="this.style.display=&quot;none&quot;"/>NUTRI<span class="dot"></span>CAL</div>

function renderStats() {
  const ref = S._statsMonth ? dateFrom(S._statsMonth+'-01') : dateFrom(S.date.slice(0,7)+'-01');
  const y = ref.getFullYear(), m = ref.getMonth();
  const lastDay = new Date(y, m+1, 0).getDate();
  const series = [];
  for (let d=1; d<=lastDay; d++) {
    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if (S.log[ds]) {
      const t = dayTotals(ds);
      series.push({ ds, day: d, kcal: t.kcal, p: t.p, g: t.g, l: t.l, w: S.log[ds].weight, sleep: S.log[ds].sleep||0 });
    } else {
      series.push({ ds, day: d, kcal: 0, p:0, g:0, l:0, w: null, sleep: 0 });
    }
  }
  const valid = series.filter(s => s.kcal > 0);
  const avgKcal = valid.length ? valid.reduce((a,x) => a+x.kcal, 0) / valid.length : 0;
  const avgP = valid.length ? valid.reduce((a,x) => a+x.p, 0) / valid.length : 0;
  const avgG = valid.length ? valid.reduce((a,x) => a+x.g, 0) / valid.length : 0;
  const avgL = valid.length ? valid.reduce((a,x) => a+x.l, 0) / valid.length : 0;

  // 7-day window for sleep analysis
  const last7 = sevenDaySeries();
  const sleep7 = last7.map(s => s.sleep);
  const sleepValid = sleep7.filter(v => v > 0);
  const sleepAvg = sleepValid.length ? sleepValid.reduce((a,b)=>a+b,0)/sleepValid.length : 0;
  const sleepDeficit = Math.max(0, 8 - sleepAvg);
  const sleepGood = sleep7.filter(v => v >= 7).length;
  const sleepInsight = buildSleepInsight(sleep7, sleepAvg, sleepDeficit);

  const weights = series.filter(s => s.w != null).map(s => s.w);
  const lastW = weights.length ? weights[weights.length-1] : null;
  const trendW = weights.length > 1 ? (weights[weights.length-1] - weights[0]) : 0;
  // Today weight (S.log[today].weight)
  const todayW = (S.log[todayStr()] && S.log[todayStr()].weight) || '';

  // Macro % of target for combined chart
  const pPct = series.map(s => S.goals.p ? (s.p / S.goals.p) * 100 : 0);
  const gPct = series.map(s => S.goals.g ? (s.g / S.goals.g) * 100 : 0);
  const lPct = series.map(s => S.goals.l ? (s.l / S.goals.l) * 100 : 0);

    <main class="content">
      <div class="section chart-section">
        <div class="section-h"><h3>Caloric Intake</h3><span class="sub">${valid.length} DAYS LOGGED</span></div>
        <div class="chart-meta">

          <span class="chart-trend">AVG</span>

      <div class="section chart-section">
        <div class="section-h"><h3>Macronutrients</h3><span class="sub">% OF TARGET</span></div>
        <div class="macro-stats">
          <div class="ms-cell ${classifyPct(avgGpct)}"><div class="ms-lab mono">CARBS</div><div class="ms-val tab-num">${Math.round(avgGpct)}%</div><div class="ms-d mono">${avgGpct>=100?'+':''}${Math.round(avgG-S.goals.g)}g</div><div class="ms-sub mono">avg ${fmt(avgG)}g · obj ${S.goals.g}g</div></div>
          <div class="ms-cell ${classifyPct(avgPpct)}"><div class="ms-lab mono">PROTEIN</div><div class="ms-val tab-num">${Math.round(avgPpct)}%</div><div class="ms-d mono">${avgPpct>=100?'+':''}${Math.round(avgP-S.goals.p)}g</div><div class="ms-sub mono">avg ${fmt(avgP)}g · obj ${S.goals.p}g</div></div>

// ===== STATS HELPERS =====

function classifyPct(p) {
  if (p >= 90 && p <= 110) return 'hit';
  if (p > 110) return 'over';
  return 'low';
}

function sevenDaySeries() {
  const today = todayStr();
  const tDate = dateFrom(today);
  const out = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(tDate);
    d.setDate(d.getDate() - i);
    const ds = d.toISOString().slice(0,10);
    const log = S.log[ds] || {};
    const t = S.log[ds] ? dayTotals(ds) : { kcal:0, p:0, g:0, l:0 };
    out.push({ ds, kcal: t.kcal, p: t.p, g: t.g, l: t.l, sleep: log.sleep||0, weight: log.weight||null });
  }
  return out;
}

function buildSleepInsight(sleep7, avg, deficit) {
  const validNights = sleep7.filter(v => v > 0).length;
  if (validNights === 0) return 'Aucune donnée de sommeil cette semaine. Saisis tes heures de sommeil chaque matin pour activer l\'analyse.';
  if (avg >= 7.5) return `Excellente moyenne (${fmt1(avg)}h). Maintiens ce rythme — c\'est l\'un des plus gros leviers sur récupération musculaire et gestion glycémique.`;
  if (avg >= 6.5) return `Tu es à <strong>${fmt1(avg)}h/nuit</strong>, soit <strong>${fmt1(deficit)}h sous la cible</strong>. Sur la semaine, c\'est ${fmt1(deficit*7)}h de dette. Avance ton coucher de 30 min, 5 jours, pour combler.`;
  if (avg >= 5) return `Sommeil critique : <strong>${fmt1(avg)}h/nuit</strong>. À ce niveau, ton TDEE baisse, ton appétit augmente, ton training stagne. Priorité absolue cette semaine.`;
  return `Données très partielles ou très basses. Vérifie ta saisie — le sommeil est non-négociable pour les objectifs body recomp.`;
}

function combinedMacroChart(series) {
  const W = 600, H = 110;
  const pPct = series.map(s => S.goals.p ? (s.p / S.goals.p) * 100 : null);
  const gPct = series.map(s => S.goals.g ? (s.g / S.goals.g) * 100 : null);
  const lPct = series.map(s => S.goals.l ? (s.l / S.goals.l) * 100 : null);
  const all = [...pPct, ...gPct, ...lPct].filter(v => v != null && v > 0);
  if (all.length === 0) {
    return `<svg class="chart-svg area-path" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><text x="${W/2}" y="${H/2}" text-anchor="middle" fill="#5a5a5a" font-family="IBM Plex Mono" font-size="11" letter-spacing="2">NO DATA</text></svg>`;
  }
  const max = Math.max(150, ...all) * 1.05;
  const stepX = series.length > 1 ? W / (series.length-1) : W;

  function smoothLine(vals, color) {
    const segments = [];
    let cur = [];
    vals.forEach((v, i) => {
      if (v == null || (v === 0 && i < series.length-1 && (series[i].kcal||0)===0)) {
        if (cur.length) segments.push(cur);
        cur = [];
      } else {
        cur.push({ x: i*stepX, y: H - (v/max)*H });
      }
    });
    if (cur.length) segments.push(cur);

    return segments.map(seg => {
      if (seg.length === 0) return '';
      if (seg.length === 1) return `<circle cx="${seg[0].x.toFixed(1)}" cy="${seg[0].y.toFixed(1)}" r="3" fill="${color}" filter="url(#cmGlow)"/>`;
      let p = `M ${seg[0].x.toFixed(1)},${seg[0].y.toFixed(1)}`;
      for (let i = 1; i < seg.length; i++) {
        const prev = seg[i-1], curr = seg[i];
        const dx = curr.x - prev.x;
        const c1x = prev.x + dx * 0.4;
        const c2x = curr.x - dx * 0.4;
        p += ` C ${c1x.toFixed(1)},${prev.y.toFixed(1)} ${c2x.toFixed(1)},${curr.y.toFixed(1)} ${curr.x.toFixed(1)},${curr.y.toFixed(1)}`;
      }
      const dots = seg.map(pt => `<circle cx="${pt.x.toFixed(1)}" cy="${pt.y.toFixed(1)}" r="2.5" fill="${color}" filter="url(#cmGlow)"/>`).join('');
      return `<path d="${p}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#cmGlow)"/>${dots}`;
    }).join('');
  }

  // Target 100% reference line
  const targetY = H - (100/max)*H;

  return `<svg class="chart-svg area-path" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs>
      <filter id="cmGlow" x="-20%" y="-50%" width="140%" height="200%">
        <feGaussianBlur stdDeviation="1.5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <g stroke="#1a1a1a" stroke-width="1">
      <line x1="0" y1="${(H/3).toFixed(0)}" x2="${W}" y2="${(H/3).toFixed(0)}"/>
      <line x1="0" y1="${(2*H/3).toFixed(0)}" x2="${W}" y2="${(2*H/3).toFixed(0)}"/>
    </g>
    <line x1="0" y1="${targetY.toFixed(1)}" x2="${W}" y2="${targetY.toFixed(1)}" stroke="#5a5a5a" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.6"/>
    ${smoothLine(gPct, '#FFD37A')}
    ${smoothLine(pPct, '#FF8C00')}
    ${smoothLine(lPct, '#B92D2D')}
  </svg>`;
}

function buildWeeklyGlycemic() {
  // Estimate glycemic response for each of last 7 days based on carb-rich meals
  const today = todayStr();
  const tDate = dateFrom(today);
  const dayCurves = []; // each is array of {x, y} samples at fixed hours
  const peaks = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(tDate);
    d.setDate(d.getDate() - i);
    const ds = d.toISOString().slice(0,10);
    const log = S.log[ds];
    if (!log) { dayCurves.push(null); peaks.push(0); continue; }
    // Build glucose-like curve over 24h
    const samples = new Array(96).fill(80); // baseline 80 mg/dL, sample every 15min
    SLOTS.forEach(s => (log.meals[s.k]||[]).forEach(e => {
      if (e.cheat) {
        // Cheat meal: assume ~80g carbs, high GI
        addGlucoseImpulse(samples, dateFrom(ds), e.t || 0, 80, 70);
      } else {
        const f = getFood(e.fid);
        if (!f) return;
        const carbs = (f.g || 0) * (e.q / (f.isFixed ? 1 : 100));
        if (carbs <= 0) return;
        // GI by actual food category in this app
        const gi = ({
          gluc: 65,    // carbs (rice/bread/pasta)
          fruit: 45,
          lait: 30,    // dairy
          legu: 30,    // legumes
          leg: 25,     // vegetables
          prot: 15,    // protein
          gras: 10,    // fats
          boi: 40,     // drinks (varies)
          fixe: 50,    // fixed meals (avg)
        }[f.cat] || 50);
        addGlucoseImpulse(samples, dateFrom(ds), e.t || 0, carbs, gi);
      }
    }));
    const peak = Math.max(...samples);
    peaks.push(peak);
    dayCurves.push(samples);
  }
  const avgPeak = peaks.filter(p => p > 80).length ? peaks.filter(p => p > 80).reduce((a,b)=>a+b,0)/peaks.filter(p => p > 80).length : 80;
  return { dayCurves, peaks, avgPeak };
}

function addGlucoseImpulse(samples, dayStart, timestamp, carbs, gi) {
  // Returns peak amplitude based on carbs × gi
  // Carbs (g) × GI/100 × 1.2 = approx peak rise mg/dL (very rough)
  const peakRise = carbs * gi / 100 * 1.5;
  if (timestamp <= 0) return;
  const minutesFromStart = (timestamp - dayStart.getTime()) / 60000;
  const startIdx = Math.max(0, Math.floor(minutesFromStart / 15));
  if (startIdx >= 96) return;
  // Curve: rise over 30min, peak at ~45min, decay over 2h
  for (let i = 0; i < 12; i++) { // 12 samples = 3h
    const idx = startIdx + i;
    if (idx >= 96) break;
    let amp;
    if (i < 3) amp = peakRise * (i / 3) * 0.85;
    else if (i < 5) amp = peakRise * (1 - (i-3)*0.1);
    else amp = peakRise * Math.exp(-(i-5)*0.35);
    samples[idx] = Math.min(220, samples[idx] + amp);
  }
}

function glycemicChart(data) {
  const W = 600, H = 110;
  // Concatenate all 7 day curves
  const all = [];
  data.dayCurves.forEach(curve => {
    if (curve) curve.forEach(v => all.push(v));
    else for (let i=0;i<96;i++) all.push(80);
  });
  const max = Math.max(160, ...all);
  const min = 70;
  const range = max - min || 1;
  const stepX = all.length > 1 ? W / (all.length - 1) : W;
  // Build smooth path
  const pts = all.map((v, i) => ({ x: i*stepX, y: H - ((v-min)/range)*H }));
  let path = `M ${pts[0].x.toFixed(1)},${pts[0].y.toFixed(1)}`;
  for (let i = 1; i < pts.length; i++) {
    const prev = pts[i-1], curr = pts[i];
    const dx = curr.x - prev.x;
    const c1x = prev.x + dx * 0.4;
    const c2x = curr.x - dx * 0.4;
    path += ` C ${c1x.toFixed(1)},${prev.y.toFixed(1)} ${c2x.toFixed(1)},${curr.y.toFixed(1)} ${curr.x.toFixed(1)},${curr.y.toFixed(1)}`;
  }
  const areaPath = path + ` L ${pts[pts.length-1].x.toFixed(1)},${H} L 0,${H} Z`;
  // Reference lines: 100 mg/dL (fasting target), 140 mg/dL (post-meal cap)
  const y100 = H - ((100-min)/range)*H;
  const y140 = H - ((140-min)/range)*H;
  // Day separators
  const seps = [];
  for (let i = 1; i < 7; i++) {
    const x = (i * 96) * stepX;
    seps.push(`<line x1="${x.toFixed(1)}" y1="0" x2="${x.toFixed(1)}" y2="${H}" stroke="#1a1a1a" stroke-width="0.5"/>`);
  }
  return `<svg class="chart-svg area-path" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs>
      <linearGradient id="glyArea" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#FFB347" stop-opacity="0.5"/>
        <stop offset="60%" stop-color="#FF8C00" stop-opacity="0.2"/>
        <stop offset="100%" stop-color="#B92D2D" stop-opacity="0"/>
      </linearGradient>
      <filter id="glyGlow" x="-20%" y="-50%" width="140%" height="200%">
        <feGaussianBlur stdDeviation="2" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    ${seps.join('')}
    <line x1="0" y1="${y140.toFixed(1)}" x2="${W}" y2="${y140.toFixed(1)}" stroke="#FF3838" stroke-width="0.6" stroke-dasharray="2,3" opacity="0.4"/>
    <line x1="0" y1="${y100.toFixed(1)}" x2="${W}" y2="${y100.toFixed(1)}" stroke="#5a5a5a" stroke-width="0.6" stroke-dasharray="3,4" opacity="0.5"/>
    <path d="${areaPath}" fill="url(#glyArea)"/>
    <path d="${path}" fill="none" stroke="#FFB347" stroke-width="1.6" filter="url(#glyGlow)"/>
  </svg>`;
}

function sleepChart(sleep7) {
  const W = 600, H = 110;
  const max = 12; // 0-12h scale
  const barW = W / sleep7.length;
  const targetY = H - (8/max)*H;
  const bars = sleep7.map((v, i) => {
    if (!v) return `<g transform="translate(${i*barW + 6}, 0)">
      <rect x="0" y="${(H-2).toFixed(1)}" width="${(barW-12).toFixed(1)}" height="2" fill="#1a1a1a" rx="1"/>
    </g>`;
    const h = (v/max)*H;
    const ok = v >= 7;
    return `<g transform="translate(${i*barW + 6}, 0)">
      <rect x="0" y="${(H-h).toFixed(1)}" width="${(barW-12).toFixed(1)}" height="${h.toFixed(1)}" fill="url(#${ok?'sgGood':'sgWarn'})" rx="3" filter="url(#sgGlow)"/>
    </g>`;
  }).join('');
  return `<svg class="chart-svg area-path" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs>
      <linearGradient id="sgGood" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#FFB347" stop-opacity="0.85"/>
